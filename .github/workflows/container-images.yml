name: Container Images

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**"
      - ".gitbook.yaml"
  pull_request:
    branches:
      - "**"
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "charts/**"
      - ".gitbook.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.component }}
    runs-on: ubuntu-latest
    # Main pushes are published after version-bump.yml updates Chart.yaml.
    if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            context: backend
            image: runai-rca-backend
          - component: agent
            context: agent
            image: runai-rca-agent
          - component: frontend
            context: frontend
            image: runai-rca-frontend
          - component: postgres-mcp
            context: postgres-mcp
            image: runai-rca-postgres-mcp

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Normalize image namespace
        id: namespace
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Read chart app version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version=$(awk -F: '/^appVersion:/{v=$2; sub(/#.*/,"",v); gsub(/"/,"",v); gsub(/^[ \t]+|[ \t\r]+$/,"",v); print v; exit}' charts/runai-rca/Chart.yaml)
          if [[ -z "$version" ]]; then
            echo "ERROR: appVersion not found in charts/runai-rca/Chart.yaml" >&2
            exit 1
          fi
          echo "appVersion=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.namespace.outputs.owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ steps.version.outputs.appVersion }},enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=Run:AI RCA ${{ matrix.component }} service

      - name: Build and optionally push image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.context }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
