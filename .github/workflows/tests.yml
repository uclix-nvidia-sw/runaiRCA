name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Vet
        working-directory: backend
        run: go vet ./...
      - name: Test
        working-directory: backend
        run: go test ./...

  agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/pyproject.toml
      - name: Install
        working-directory: agent
        run: pip install -e ".[dev]"
      - name: Test
        working-directory: agent
        run: pytest -q
      - name: Eval gate
        working-directory: agent
        run: python -m eval.run_eval --fixtures eval/fixtures.jsonl --min-top1 0.8
      - name: Eval holdout report
        working-directory: agent
        continue-on-error: true
        run: python -m eval.run_eval --fixtures eval/fixtures_holdout.jsonl
      - name: NAT config validate
        working-directory: agent
        run: |
          nat validate --config_file configs/runai_rca_engine.yml
          nat validate --config_file configs/runai_rca_eval.yml
      - name: NAT eval gate
        working-directory: agent
        run: python -m eval.check_nat_eval --min-avg 1.0

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Test
        working-directory: frontend
        run: npm test
