name: Helm Chart

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_PATH: charts/runai-rca

jobs:
  chart:
    name: Lint and publish chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image namespace
        id: namespace
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint "$CHART_PATH"

      - name: Package chart
        run: helm package "$CHART_PATH" --destination dist

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "$REGISTRY" --username "${{ github.actor }}" --password-stdin

      - name: Push chart
        if: github.event_name != 'pull_request'
        run: helm push dist/*.tgz "oci://${REGISTRY}/${{ steps.namespace.outputs.owner }}/charts"
