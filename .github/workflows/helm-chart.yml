name: Helm Chart

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitbook.yaml"
  pull_request:
    branches:
      - "**"
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitbook.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_PATH: charts/runai-rca

jobs:
  chart:
    name: Lint and publish chart
    runs-on: ubuntu-latest
    # Main pushes are published after version-bump.yml updates Chart.yaml.
    if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Normalize image namespace
        id: namespace
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Compute chart version
        id: chartver
        shell: bash
        run: |
          base=$(awk -F: '/^version:/{v=$2; gsub(/"/,"",v); gsub(/^[ \t]+|[ \t\r]+$/,"",v); print v; exit}' "$CHART_PATH/Chart.yaml")
          app=$(awk -F: '/^appVersion:/{v=$2; gsub(/"/,"",v); gsub(/^[ \t]+|[ \t\r]+$/,"",v); print v; exit}' "$CHART_PATH/Chart.yaml")
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            ver="${GITHUB_REF#refs/tags/v}"
          else
            ver="${base}-main.${GITHUB_RUN_NUMBER}+sha.${GITHUB_SHA::7}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "appVersion=${app}" >> "$GITHUB_OUTPUT"

      - name: Lint chart
        run: helm lint "$CHART_PATH"

      - name: Package chart
        run: helm package "$CHART_PATH" --destination dist --version "${{ steps.chartver.outputs.version }}" --app-version "${{ steps.chartver.outputs.appVersion }}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "$REGISTRY" --username "${{ github.actor }}" --password-stdin

      - name: Push chart
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        run: helm push dist/*.tgz "oci://${REGISTRY}/${{ steps.namespace.outputs.owner }}/charts"
