name: Version Bump

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitbook.yaml"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: version-bump-main
  cancel-in-progress: false

env:
  CHART_PATH: charts/runai-rca

jobs:
  bump:
    name: Bump chart version and publish artifacts
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          chart_path = Path(os.environ["CHART_PATH"]) / "Chart.yaml"
          text = chart_path.read_text()

          def read_semver(field):
              match = re.search(rf'(?m)^{field}:\s*"?([0-9]+)\.([0-9]+)\.([0-9]+)"?\s*$', text)
              if not match:
                  sys.exit(f"ERROR: {field} must be a plain MAJOR.MINOR.PATCH version")
              return tuple(int(part) for part in match.groups())

          chart_version = read_semver("version")
          app_version = read_semver("appVersion")
          if chart_version != app_version:
              sys.exit("ERROR: version and appVersion must match before an automatic bump")

          major, minor, patch = chart_version
          old_version = f"{major}.{minor}.{patch}"
          new_version = f"{major}.{minor}.{patch + 1}"

          text = re.sub(r'(?m)^version:\s*.*$', f"version: {new_version}", text, count=1)
          text = re.sub(r'(?m)^appVersion:\s*.*$', f'appVersion: "{new_version}"', text, count=1)
          chart_path.write_text(text)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"oldVersion={old_version}\n")
              output.write(f"version={new_version}\n")
          PY

      - name: Commit bumped version
        id: commit
        shell: bash
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CHART_PATH/Chart.yaml"
          git commit -m "chore(release): bump runai-rca chart to v${NEW_VERSION} [skip version bump]"

          read_remote_version() {
            git show "origin/main:$CHART_PATH/Chart.yaml" 2>/dev/null \
              | awk -F: '/^version:/{v=$2; gsub(/"/,"",v); gsub(/^[ \t]+|[ \t\r]+$/,"",v); print v; exit}'
          }

          # Concurrent merges can trigger two bump runs; retry with rebase and
          # skip if another run already published the same (or newer) version.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "pushed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Push rejected (attempt $attempt); reconciling with origin/main..."
            git fetch origin main

            remote_version="$(read_remote_version)"
            if [[ "$remote_version" == "$NEW_VERSION" ]]; then
              echo "origin/main already at v${NEW_VERSION}; another run won the race. Skipping."
              echo "pushed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [[ -n "$remote_version" ]] \
              && [[ "$(printf '%s\n%s\n' "$NEW_VERSION" "$remote_version" | sort -V | tail -1)" == "$remote_version" ]]; then
              echo "origin/main already ahead at v${remote_version}; nothing to publish. Skipping."
              echo "pushed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            git rebase origin/main
          done

          echo "ERROR: failed to push bumped version after multiple attempts" >&2
          exit 1

      - name: Tag bumped release
        if: ${{ steps.commit.outputs.pushed == 'true' }}
        shell: bash
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          tag="v${NEW_VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "${tag} already exists; keeping the existing release tag."
            exit 0
          fi
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"

      - name: Publish artifacts from release tag
        if: ${{ steps.commit.outputs.pushed == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          # Pushes authenticated by GITHUB_TOKEN do not trigger other workflows.
          # Dispatch them explicitly at the immutable release tag instead.
          for workflow in container-images.yml helm-chart.yml; do
            curl -fsSL \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/dispatches" \
              -d "{\"ref\":\"v${NEW_VERSION}\"}"
          done
