nameOverride: ""
fullnameOverride: ""

global:
  imageRegistry: ""

imagePullSecrets: []
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
priorityClassName: ""
topologySpreadConstraints: []

secrets:
  existingSecret: ""
  databaseExistingSecret: ""
  keys:
    databaseUrl: DATABASE_URL
    postgresDsn: POSTGRES_DSN
    runaiClientId: RUNAI_CLIENT_ID
    runaiClientSecret: RUNAI_CLIENT_SECRET
    runaiBearerToken: RUNAI_BEARER_TOKEN
    nvidiaApiKey: NVIDIA_API_KEY
    llmApiKey: LLM_API_KEY
  databaseUrl: ""
  postgresDsn: ""
  runaiClientId: ""
  runaiClientSecret: ""
  runaiBearerToken: ""
  nvidiaApiKey: ""
  llmApiKey: ""

postgresql:
  enabled: false
  # pgvector/pgvector ships Postgres with the pgvector extension preinstalled, so
  # the bundled database can serve real vector similarity search. It is a drop-in
  # replacement for the official postgres image (same env vars, same data dir).
  image:
    # Fully qualified so global.imageRegistry does NOT rewrite this third-party
    # image to a private org (see typedb.image comment).
    repository: docker.io/pgvector/pgvector
    tag: "pg16"
    pullPolicy: IfNotPresent
  auth:
    username: runai_rca
    password: runai_rca
    database: runai_rca
  service:
    annotations: {}
    port: 5432
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  readinessProbe: {}
  livenessProbe: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}

typedb:
  # TypeDB 3.x knowledge-graph store for the RCA ontology. Community Edition is
  # single-node (StatefulSet replica 1); HA/clustering is the paid Enterprise tier.
  # No official Helm chart/operator exists, so this template is self-managed.
  # Installed together with the chart by default; set enabled=false to opt out.
  enabled: true
  # Auto-load the ontology schema (ontology/schema.tql) into TypeDB via a
  # post-install/upgrade Helm hook Job so the graph is queryable immediately.
  loadSchema: true
  # Periodically project resolved incidents into the KG (the "facts" layer).
  ingest:
    enabled: true
    schedule: "17 */3 * * *"    # every 3 hours
    resolvedGraceHours: 6       # only incidents resolved >= N hours ago
    limit: 200
    requireReview: false        # true = only operator-reviewed incidents
  image:
    # Fully qualified (docker.io/...) so global.imageRegistry does NOT rewrite it
    # to a private org. Air-gapped? Point this at your mirror, e.g.
    # my-registry.internal/typedb/typedb (also fully qualified → not re-prefixed).
    repository: docker.io/typedb/typedb
    tag: "3.11.5"
    pullPolicy: IfNotPresent
  auth:
    # CE default credentials; override for anything beyond a local PoC.
    username: admin
    password: password
    database: runai_rca
  service:
    annotations: {}
    port: 1729
    httpPort: 8000
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  readinessProbe: {}
  resources: {}

backend:
  replicaCount: 1
  image:
    repository: runai-rca-backend
    tag: ""
    pullPolicy: IfNotPresent
  env:
    agentUrl: ""
    language: en
    databaseConnectTimeoutSeconds: 5
    agentRequestTimeoutSeconds: 180
    manualAgentRequestTimeoutSeconds: 900
    # Max analyses started per webhook and per 1-minute window. Raise if bursts of
    # alerts get dropped without a report; ultimately bounded by the agent's capacity.
    maxAutoAnalyzeFanout: 50
    # Max analyses running against the agent concurrently.
    maxConcurrentAgentRuns: 50
    # Backfill: periodically re-drive alerts left without a completed RCA (dropped by
    # the caps, or a prior failed run). Pauses while the agent is unhealthy.
    # intervalSeconds: 0 disables it.
    analysisBackfillIntervalSeconds: 300
    analysisBackfillBatch: 10
    analysisBackfillRetryCooldownSeconds: 900
  service:
    annotations: {}
    type: ClusterIP
    port: 8080
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  readinessProbe:
    httpGet:
      path: /healthz
      port: http
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
  extraEnv: []
  resources: {}

agent:
  replicaCount: 1
  image:
    repository: runai-rca-agent
    tag: ""
    pullPolicy: IfNotPresent
  service:
    annotations: {}
    type: ClusterIP
    port: 8000
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  rbac:
    create: true
    clusterWide: true
    namespaces: []
  env:
    language: en
    logLevel: info
    kubernetesApiUrl: https://kubernetes.default.svc
    kubernetesTokenPath: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubernetesCaPath: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    kubernetesTimeoutSeconds: 6
    kubernetesListLimit: 50
    kubernetesNamespaces: ""
    enableNatRuntime: false
    natConfigFile: /app/configs/runai_rca_workflow.yml
    natTimeoutSeconds: 180
    runaiBaseUrl: ""
    runaiTokenUrl: ""
    runaiWorkloadsPath: /api/v1/workloads
    runaiProjectsPath: /api/v1/projects
    runaiQueuesPath: /api/v1/queues
    runaiTimeoutSeconds: 8
    runaiLogNamespaces: runai,runai-backend
    prometheusUrl: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
    prometheusTimeoutSeconds: 6
    prometheusMcpUrl: ""
    lokiUrl: http://loki-read.monitoring.svc.cluster.local:3100
    lokiTimeoutSeconds: 6
    lokiQueryLimit: 20
    lokiMcpUrl: ""
    postgresTimeoutSeconds: 6
    typedbTimeoutSeconds: 6
    troubleshootingCasesFile: knowledge/troubleshooting_cases.md
    agentSoulsFile: prompts/agent_souls.md
    maskingRegexListJson: "[]"
    builtinRedactionEnabled: true
    builtinRedactionHashMode: false
    llmBaseUrl: ""
    llmModel: ""
    llmRequestTimeoutSeconds: 120
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: true
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  readinessProbe:
    httpGet:
      path: /healthz
      port: http
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
  extraEnv: []
  resources: {}

frontend:
  replicaCount: 1
  image:
    repository: runai-rca-frontend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    annotations: {}
    type: ClusterIP
    port: 80
  config:
    apiBaseUrl: ""
  nginx:
    clientMaxBodySize: 10m
    proxyConnectTimeout: 60s
    proxyReadTimeout: 3600s
    proxySendTimeout: 3600s
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  readinessProbe:
    httpGet:
      path: /
      port: http
  livenessProbe:
    httpGet:
      path: /
      port: http
  extraEnv: []
  resources: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: runai-rca.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
