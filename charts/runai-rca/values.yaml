nameOverride: ""
fullnameOverride: ""

global:
  imageRegistry: ""

imagePullSecrets: []
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
priorityClassName: ""
topologySpreadConstraints: []

secrets:
  existingSecret: ""
  databaseExistingSecret: ""
  keys:
    databaseUrl: DATABASE_URL
    postgresDsn: POSTGRES_DSN
    # Optional read-only DSN for the Run:ai control-plane Postgres: enables the
    # postgres agent's drill-down to SELECT platform data (workloads, audit,
    # clusters, ...) during troubleshooting. Provision a read-only DB role.
    runaiDbDsn: RUNAI_DB_DSN
    runaiClientId: RUNAI_CLIENT_ID
    runaiClientSecret: RUNAI_CLIENT_SECRET
    runaiBearerToken: RUNAI_BEARER_TOKEN
    nvidiaApiKey: NVIDIA_API_KEY
    llmApiKey: LLM_API_KEY
    embeddingApiKey: EMBEDDING_API_KEY
    slackBotToken: SLACK_BOT_TOKEN
    slackChannelId: SLACK_CHANNEL_ID
    slackAppToken: SLACK_APP_TOKEN
  databaseUrl: ""
  postgresDsn: ""
  runaiDbDsn: ""
  runaiClientId: ""
  runaiClientSecret: ""
  runaiBearerToken: ""
  nvidiaApiKey: ""
  llmApiKey: ""
  embeddingApiKey: ""
  # Slack incident-analysis notifications: set BOTH to enable. Bot token
  # (xoxb-, chat:write scope, bot invited to the channel) — an incoming webhook
  # can't return the thread_ts needed for re-analysis thread replies.
  slackBotToken: ""
  slackChannelId: ""
  # Optional app-level token (xapp-, connections:write) — enables the
  # in-message Re-analyze button via Socket Mode (no public endpoint needed).
  # Requires Socket Mode + Interactivity toggled on in the Slack app settings.
  slackAppToken: ""

postgresql:
  enabled: false
  # pgvector/pgvector ships Postgres with the pgvector extension preinstalled, so
  # the bundled database can serve real vector similarity search. It is a drop-in
  # replacement for the official postgres image (same env vars, same data dir).
  image:
    # Fully qualified so global.imageRegistry does NOT rewrite this third-party
    # image to a private org (see typedb.image comment).
    repository: docker.io/pgvector/pgvector
    tag: "pg16"
    pullPolicy: IfNotPresent
  auth:
    username: runai_rca
    password: runai_rca
    database: runai_rca
  service:
    annotations: {}
    port: 5432
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  readinessProbe: {}
  livenessProbe: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}

typedb:
  # TypeDB 3.x knowledge-graph store for the RCA ontology. Community Edition is
  # single-node (StatefulSet replica 1); HA/clustering is the paid Enterprise tier.
  # No official Helm chart/operator exists, so this template is self-managed.
  # Installed together with the chart by default; set enabled=false to opt out.
  enabled: true
  # Auto-load the ontology schema (ontology/schema.tql) into TypeDB via a
  # post-install/upgrade Helm hook Job so the graph is queryable immediately.
  loadSchema: true
  # Periodically project resolved incidents into the KG (the "facts" layer).
  ingest:
    enabled: true
    schedule: "17 */3 * * *"    # every 3 hours
    resolvedGraceHours: 6       # only incidents resolved >= N hours ago
    limit: 200
    requireReview: false        # true = only operator-reviewed incidents
    # Close the learning loop: also promote operator-CONFIRMED RCAs (resolved with
    # net-positive feedback) into reusable knowledge (confirmed:<alert> -> family),
    # so the next similar alert matches what operators already validated. This is
    # what makes the agent get smarter over time from real feedback.
    promoteKnowledge: true
  image:
    # Fully qualified (docker.io/...) so global.imageRegistry does NOT rewrite it
    # to a private org. Air-gapped? Point this at your mirror, e.g.
    # my-registry.internal/typedb/typedb (also fully qualified → not re-prefixed).
    repository: docker.io/typedb/typedb
    tag: "3.11.5"
    pullPolicy: IfNotPresent
  auth:
    # CE default credentials; override for anything beyond a local PoC.
    username: admin
    password: password
    database: runai_rca
  service:
    annotations: {}
    port: 1729
    httpPort: 8000
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  readinessProbe: {}
  resources: {}

backend:
  replicaCount: 1
  image:
    repository: runai-rca-backend
    tag: ""
    pullPolicy: IfNotPresent
  env:
    agentUrl: ""
    language: ko
    databaseConnectTimeoutSeconds: 5
    # MUST exceed the agent's analysisDeadlineSeconds (1500): the agent works up to
    # that budget and then returns a graceful degraded report — if the backend hangs
    # up first, the report is lost and the alert gets a useless fallback instead.
    agentRequestTimeoutSeconds: 1560
    manualAgentRequestTimeoutSeconds: 1560
    # Max analyses started per webhook and per 1-minute window. Raise if bursts of
    # alerts get dropped without a report; ultimately bounded by the agent's capacity.
    maxAutoAnalyzeFanout: 50
    # Max analyses running against the agent concurrently.
    maxConcurrentAgentRuns: 50
    # How long (minutes) an alert signature can be QUIET before a recurrence is
    # treated as a NEW incident instead of another occurrence of the flapping one.
    # 30 was too tight — a real recurring alert here (node-exporter memory page
    # faults) fired every ~2h with quiet gaps up to 6h, so each firing spawned a
    # fresh incident. 360 (6h) covers that observed cadence; lower it if you'd
    # rather keep distinct episodes separate, raise it for longer-cycle alerts.
    flappingGroupWindowMinutes: 360
    # Backfill: periodically re-drive alerts left without a completed RCA (dropped by
    # the caps, or a prior failed run). Pauses while the agent is unhealthy.
    # intervalSeconds: 0 disables it.
    analysisBackfillIntervalSeconds: 300
    analysisBackfillBatch: 10
    analysisBackfillRetryCooldownSeconds: 900
    # Semantic embedding for similar-incident search. Empty embeddingUrl => offline
    # hash fallback (default, language-agnostic but lexical). Point at an
    # OpenAI-compatible /embeddings endpoint for real multilingual (incl. Korean)
    # similarity. embeddingDim MUST match the model; changing it requires
    # re-embedding existing rows (mixed-dim vectors can't be compared).
    embeddingUrl: ""
    embeddingModel: ""
    embeddingDim: 384
    # External dashboard URL (e.g. https://rca.example.com). When set, Slack
    # messages carry an "Open Incident" deep-link button.
    dashboardUrl: ""
  service:
    annotations: {}
    type: ClusterIP
    port: 8080
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  readinessProbe:
    httpGet:
      path: /healthz
      port: http
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
  extraEnv: []
  resources: {}

# Run:ai MCP sidecar. When enabled, the agent gathers Run:ai evidence through
# the runai-mcp server (426 APIs, spec-aware) instead of the fixed curls, and the
# runai drill-down agent gets its API search/GET tools. runai-mcp is stdio-only,
# so this runs it behind mcp-proxy (streamable HTTP) as a sidecar in the agent
# pod. The image (runai-rca-mcp) is published by CI alongside the others, so
# global.imageRegistry + the chart appVersion resolve it just like
# backend/agent/frontend. Auth reuses the runai-rca secret's runaiClientId/
# runaiClientSecret. ON by default; the agent falls back to direct HTTP when
# disabled or when the sidecar is unreachable — never breaks analysis.
runaiMcp:
  enabled: true
  image:
    repository: runai-rca-mcp   # prefixed by global.imageRegistry, like the other first-party images
    tag: ""                     # defaults to the chart appVersion
    pullPolicy: IfNotPresent
  port: 8809
  # Override if your mcp-proxy version needs different flags/endpoint.
  command: []
  resources: {}

agent:
  replicaCount: 1
  image:
    repository: runai-rca-agent
    tag: ""
    pullPolicy: IfNotPresent
  service:
    annotations: {}
    type: ClusterIP
    port: 8000
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  rbac:
    create: true
    clusterWide: true
    namespaces: []
  env:
    language: ko
    logLevel: info
    kubernetesApiUrl: https://kubernetes.default.svc
    kubernetesTokenPath: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubernetesCaPath: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    kubernetesTimeoutSeconds: 120
    kubernetesListLimit: 50
    kubernetesNamespaces: ""
    # Allow the Kubernetes agent to run read-only diagnostic commands (nvidia-smi,
    # etc.) via the pod exec subresource. Requires pods/exec RBAC (agent-rbac.yaml).
    enablePodExec: true
    enableNatRuntime: false
    natConfigFile: /app/configs/runai_rca_workflow.yml
    natTimeoutSeconds: 300
    # Human-like iterative investigation: the orchestrator plans, probes the most
    # relevant agent, observes, and re-plans (bounded by maxInvestigationSteps)
    # instead of gathering everything once. Only active when an LLM is configured
    # (no-op otherwise); each step is an extra LLM call, so it costs more per RCA.
    enableInvestigationLoop: true
    maxInvestigationSteps: 12
    # Re-analysis (after a refuted top cause) gets its own investigation budget.
    maxReanalysisSteps: 6
    # Per-collector autonomous drill-down: each evidence agent (kubernetes /
    # prometheus / loki / runai) runs its own bounded LLM loop with ONLY its
    # domain's read-only tools to deepen its own evidence. Only active when an
    # LLM is configured; each step is extra LLM calls (accuracy over latency).
    enableAgentDrilldown: true
    drilldownMaxSteps: 4
    # Stop optional LLM reasoning loops after this many tokens have been used in
    # one analysis. 0 = unlimited; the overall deadline still applies.
    analysisTokenBudget: 0
    # Overall hard cap per analysis: generous per-step time, but the whole run always
    # finishes within this budget (default 25 min). 0 = no overall cap.
    analysisDeadlineSeconds: 1500
    runaiBaseUrl: ""
    runaiTokenUrl: ""
    runaiWorkloadsPath: /api/v1/workloads
    runaiProjectsPath: /api/v1/projects
    runaiQueuesPath: /api/v1/queues
    # Run:ai control-plane version endpoint — enables version-aware suppression of
    # known issues already fixed on this cluster. Best-effort; set to your API's path.
    runaiVersionPath: /api/v1/version
    runaiTimeoutSeconds: 120
    runaiLogNamespaces: runai,runai-backend
    collectors: runai,kubernetes,postgres,prometheus,loki,system,change
    prometheusUrl: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
    prometheusTimeoutSeconds: 120
    prometheusMcpUrl: ""
    lokiUrl: http://loki-read.monitoring.svc.cluster.local:3100
    lokiTimeoutSeconds: 120
    lokiQueryLimit: 20
    lokiMcpUrl: ""
    postgresTimeoutSeconds: 60
    typedbTimeoutSeconds: 60
    troubleshootingCasesFile: knowledge/troubleshooting_cases.md
    familiesFile: knowledge/families.yaml
    agentSoulsFile: prompts/agent_souls.md
    maskingRegexListJson: "[]"
    builtinRedactionEnabled: true
    builtinRedactionHashMode: false
    llmBaseUrl: ""
    llmModel: ""
    llmModelPlanner: ""
    llmModelInvestigation: ""
    llmModelDrilldown: ""
    llmModelSelfCheck: ""
    llmModelSynthesis: ""
    llmModelChat: ""
    # JSON: {"model":{"prompt_per_mtok":0.15,"completion_per_mtok":0.60}}
    llmPricingJson: "{}"
    llmRequestTimeoutSeconds: 300
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: true
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  readinessProbe:
    httpGet:
      path: /healthz
      port: http
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
  extraEnv: []
  resources: {}

frontend:
  replicaCount: 1
  image:
    repository: runai-rca-frontend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    annotations: {}
    type: ClusterIP
    port: 80
  config:
    apiBaseUrl: ""
  nginx:
    clientMaxBodySize: 10m
    proxyConnectTimeout: 60s
    proxyReadTimeout: 3600s
    proxySendTimeout: 3600s
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  readinessProbe:
    httpGet:
      path: /
      port: http
  livenessProbe:
    httpGet:
      path: /
      port: http
  extraEnv: []
  resources: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: runai-rca.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}

# Privileged DaemonSet exposing a read-only node log endpoint (dmesg/journal/syslog)
# so the RCA agent can see host/kernel/GPU-driver events (NVIDIA XID, OOM, MCE, ...).
# Enabled by default (enabled: true below) — note it runs privileged with
# hostNetwork/hostPID on every node; set enabled: false to opt out of node logs.
# The agent reaches each node via http://{node}:port — set the agent's SYSTEM_AGENT_URL
# to "http://{node}:9095" and ENABLE_SYSTEM_AGENT=true. The server runs dmesg/journalctl
# via `nsenter -t 1` into the host, so only the container needs `nsenter` (present in
# python:3.12-slim's util-linux); journalctl/dmesg resolve to the node's own binaries.
systemAgent:
  enabled: true
  # Bearer token the agent must present to read node logs. Leave empty to have Helm
  # auto-generate one and keep it stable across upgrades (recommended). Set a value
  # only if you need a known token (e.g. to curl the endpoint yourself).
  authToken: ""
  image:
    # Fully qualified (docker.io/...) so global.imageRegistry does NOT rewrite this
    # public base image into a private org (where it 403s). See runai-rca.image helper.
    repository: docker.io/library/python
    tag: "3.12-slim"
    pullPolicy: IfNotPresent
  port: 9095
  nodeSelector: {}
  tolerations:
    - operator: Exists
  resources: {}
