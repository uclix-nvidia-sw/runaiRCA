nameOverride: ""
fullnameOverride: ""

global:
  imageRegistry: ""

secrets:
  existingSecret: ""
  databaseUrl: ""
  postgresDsn: ""
  runaiClientId: ""
  runaiClientSecret: ""
  runaiBearerToken: ""
  nvidiaApiKey: ""

postgresql:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: runai_rca
    password: runai_rca
    database: runai_rca
  service:
    port: 5432
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  resources: {}

backend:
  replicaCount: 1
  image:
    repository: runai-rca-backend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources: {}

agent:
  replicaCount: 1
  image:
    repository: runai-rca-agent
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  serviceAccount:
    create: true
    name: ""
  rbac:
    create: true
  env:
    language: en
    logLevel: info
    kubernetesTimeoutSeconds: 6
    enableNatRuntime: false
    natConfigFile: /app/configs/runai_rca_workflow.yml
    runaiBaseUrl: ""
    runaiTokenUrl: ""
    runaiWorkloadsPath: /api/v1/workloads
    runaiProjectsPath: /api/v1/projects
    runaiQueuesPath: /api/v1/queues
    runaiLogNamespaces: runai,runai-backend
    prometheusUrl: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
    prometheusMcpUrl: ""
    lokiUrl: http://loki-gateway.monitoring.svc.cluster.local
    lokiMcpUrl: ""
    troubleshootingCasesFile: knowledge/troubleshooting_cases.md
    agentSoulsFile: prompts/agent_souls.md
    maskingRegexListJson: "[]"
    builtinRedactionEnabled: true
    builtinRedactionHashMode: false
  resources: {}

frontend:
  replicaCount: 1
  image:
    repository: runai-rca-frontend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  config:
    apiBaseUrl: ""
  resources: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: runai-rca.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
