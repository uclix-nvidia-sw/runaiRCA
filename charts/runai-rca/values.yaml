secrets:
  existingSecret: ""
  databaseExistingSecret: ""
  keys:
    databaseUrl: DATABASE_URL
    postgresDsn: POSTGRES_DSN
    # Optional read-only DSN for the Run:ai control-plane Postgres: enables the
    # postgres agent's drill-down to SELECT platform data (workloads, audit,
    # clusters, ...) during troubleshooting. Provision a read-only DB role.
    runaiDbDsn: RUNAI_DB_DSN
    runaiClientId: RUNAI_CLIENT_ID
    runaiClientSecret: RUNAI_CLIENT_SECRET
    runaiBearerToken: RUNAI_BEARER_TOKEN
    grafanaServiceAccountToken: GRAFANA_SERVICE_ACCOUNT_TOKEN
    nvidiaApiKey: NVIDIA_API_KEY
    llmApiKey: LLM_API_KEY
    embeddingApiKey: EMBEDDING_API_KEY
    slackBotToken: SLACK_BOT_TOKEN
    slackChannelId: SLACK_CHANNEL_ID
    slackAppToken: SLACK_APP_TOKEN
  databaseUrl: ""
  postgresDsn: ""
  runaiDbDsn: ""
  runaiClientId: ""
  runaiClientSecret: ""
  runaiBearerToken: ""
  # Grafana service-account token for grafana-mcp. LEAVE EMPTY and grafana-mcp
  # can't list datasources -> the Loki/Prometheus datasource uid stays unresolved
  # -> every MCP query fails "get datasource by uid ... 400 id is invalid" and the
  # collector demotes to the direct API. Set this to make the MCP log/metric path work.
  grafanaServiceAccountToken: ""
  nvidiaApiKey: ""
  llmApiKey: ""
  embeddingApiKey: ""
  # Slack incident-analysis notifications: set BOTH to enable. Bot token
  # (xoxb-, chat:write scope, bot invited to the channel) — an incoming webhook
  # can't return the thread_ts needed for re-analysis thread replies.
  slackBotToken: ""
  slackChannelId: ""
  # Optional app-level token (xapp-, connections:write) — enables the
  # in-message Re-analyze button via Socket Mode (no public endpoint needed).
  # Requires Socket Mode + Interactivity toggled on in the Slack app settings.
  slackAppToken: ""

postgresql:
  enabled: false
  # pgvector/pgvector ships Postgres with the pgvector extension preinstalled, so
  # the bundled database can serve real vector similarity search. It is a drop-in
  # replacement for the official postgres image (same env vars, same data dir).
  image:
    # Fully qualified so global.imageRegistry does NOT rewrite this third-party
    # image to a private org (see typedb.image comment).
    repository: docker.io/pgvector/pgvector
    tag: "pg16"
    pullPolicy: IfNotPresent
  auth:
    username: runai_rca
    password: runai_rca
    database: runai_rca
  service:
    annotations: {}
    port: 5432
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  readinessProbe: {}
  livenessProbe: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}

typedb:
  # TypeDB 3.x knowledge-graph store for the RCA ontology. Community Edition is
  # single-node (StatefulSet replica 1); HA/clustering is the paid Enterprise tier.
  # No official Helm chart/operator exists, so this template is self-managed.
  # Installed together with the chart by default; set enabled=false to opt out.
  enabled: true
  # Auto-load the ontology schema (ontology/schema.tql) into TypeDB via a
  # post-install/upgrade Helm hook Job so the graph is queryable immediately.
  loadSchema: true
  # Load curated EXTERNAL support-case payloads (de-identified, committed under
  # agent/knowledge/external_cases/ and baked into the agent image) as labelled
  # historical priors, chained onto the same schema-load hook. No-ops when the
  # image ships no payloads. `approvedBy` binds the operator accountable for
  # these priors and is REQUIRED when enabled — the load records it on each case
  # and refuses to run unset (approval is an explicit act).
  externalCases:
    enabled: false
    approvedBy: ""
  # Periodically project resolved incidents into the KG (the "facts" layer).
  ingest:
    enabled: true
    schedule: "17 */3 * * *"    # every 3 hours
    resolvedGraceHours: 6       # only incidents resolved >= N hours ago
    limit: 200
    # Only the Dashboard Approve action (incidents.user_approved_at) may enter
    # the graph. `requireReview` used upvotes/comments and is intentionally
    # replaced by this stronger, unambiguous gate.
    requireApproval: true
    # Deprecated compatibility setting. It is not consulted by new chart logic.
    requireReview: null
    # Promote only approved, non-abstained RCA knowledge. Recommended actions are
    # still curated guidance; an action becomes verified only after an operator
    # records an effective resolution outcome.
    promoteKnowledge: true
    # Also accumulate confirmed/pending incident rows into the rca_dataset store
    # (durable answer-key for eval), chained onto this same job so it runs right
    # after the KG refresh. Approval status comes from incidents.user_approved_at;
    # materialize the measured set later with `gen_dataset --export-curated`.
    generateDataset: true
  # A separate idempotent, approval-gated job projects existing trace-v3
  # records. It never upgrades legacy/v2 traces.
  traceV3Backfill:
    enabled: true
    batchSize: 200
    # 0 drains all pages. Set a positive value to deliberately pause after a
    # bounded number of persisted/idempotent keyset pages.
    maxBatches: 0
  packageMirror:
    enabled: true
    # Reconcile independently of Helm upgrades; backend lifecycle remains the
    # runtime authority, and this mirror is advisory.
    schedule: "0 * * * *"
    limit: 1000
  image:
    # Fully qualified (docker.io/...) so global.imageRegistry does NOT rewrite it
    # to a private org. Air-gapped? Point this at your mirror, e.g.
    # my-registry.internal/typedb/typedb (also fully qualified → not re-prefixed).
    repository: docker.io/typedb/typedb
    tag: "3.11.5"
    pullPolicy: IfNotPresent
  auth:
    # CE default credentials; override for anything beyond a local PoC.
    username: admin
    password: password
    database: runai_rca
  service:
    annotations: {}
    port: 1729
    httpPort: 8000
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  readinessProbe: {}
  resources: {}

backend:
  replicaCount: 1
  image:
    repository: runai-rca-backend
    tag: ""
    pullPolicy: IfNotPresent
  env:
    agentUrl: ""
    # Agent service base URL for approval-time validation. Empty uses the
    # in-cluster Agent service; the backend appends /knowledge/validate.
    knowledgeValidatorUrl: ""
    language: ko
    databaseConnectTimeoutSeconds: 5
    # MUST exceed the agent's analysisDeadlineSeconds (1500): the agent works up to
    # that budget and then returns a graceful degraded report — if the backend hangs
    # up first, the report is lost and the alert gets a useless fallback instead.
    agentRequestTimeoutSeconds: 1560
    manualAgentRequestTimeoutSeconds: 1560
    # Defense-in-depth ceiling for the Agent HTTP response. The Agent compacts
    # responses to analysisResponseMaxBytes before sending them; this larger cap
    # also provides headroom during rolling upgrades from older Agent images.
    agentMaxResponseBodyBytes: 4194304
    # Max analyses started per webhook and per 1-minute window. Raise if bursts of
    # alerts get dropped without a report; ultimately bounded by the agent's capacity.
    maxAutoAnalyzeFanout: 50
    # Only these severities are AUTO-analyzed (webhook + backfill), so noise like the
    # Watchdog (severity "none") is tracked but never burns tokens. Manual/comment
    # re-analysis is always allowed regardless. "all" (or empty) = analyze every
    # ingested severity (info is dropped earlier by ignoredAlert).
    autoAnalyzeSeverities: "warning,critical"
    # Max analyses running against the agent concurrently.
    maxConcurrentAgentRuns: 50
    # How long (minutes) an alert signature can be QUIET before a recurrence is
    # treated as a NEW incident instead of another occurrence of the flapping one.
    # 30 was too tight — a real recurring alert here (node-exporter memory page
    # faults) fired every ~2h with quiet gaps up to 6h, so each firing spawned a
    # fresh incident. 360 (6h) covers that observed cadence; lower it if you'd
    # rather keep distinct episodes separate, raise it for longer-cycle alerts.
    flappingGroupWindowMinutes: 360
    # Backfill: periodically re-drive alerts left without a completed RCA (dropped by
    # the caps, or a prior failed run). Pauses while the agent is unhealthy.
    # intervalSeconds: 0 disables it.
    analysisBackfillIntervalSeconds: 300
    analysisBackfillBatch: 10
    analysisBackfillRetryCooldownSeconds: 900
    # Semantic embedding for similar-incident search. Empty embeddingUrl => offline
    # hash fallback (default, language-agnostic but lexical). Point at an
    # OpenAI-compatible /embeddings endpoint for real multilingual (incl. Korean)
    # similarity. embeddingDim MUST match the model; changing it requires
    # re-embedding existing rows (mixed-dim vectors can't be compared).
    embeddingUrl: ""
    embeddingModel: ""
    embeddingDim: 384
    # External dashboard URL (e.g. https://rca.example.com). When set, Slack
    # messages carry an "Open Incident" deep-link button.
    dashboardUrl: ""
  service:
    annotations: {}
    type: ClusterIP
    port: 8080
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  readinessProbe:
    httpGet:
      path: /healthz
      port: http
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
  extraEnv: []
  resources: {}

# Optional shared trust bundle for a Run:ai control plane that uses a private
# CA. The referenced Secret must contain a combined PEM bundle so both the
# Agent (OAuth/direct fallback) and official MCP server use the same trust.
runaiTls:
  caBundleSecretName: ""
  caBundleSecretKey: ca.crt

# NVIDIA's official Run:ai MCP server. It natively exposes authenticated
# streamable HTTP on /mcp, so no stdio bridge or locally built image is needed.
# The server stays read-only unless --allow-write-tools is explicitly added.
# The agent forwards its Run:ai bearer/client-credential token to this protected
# endpoint and falls back to direct HTTP if it is unavailable.
runaiMcp:
  enabled: true
  image:
    # Fully qualified: global.imageRegistry must NOT rewrite NGC's image path.
    repository: nvcr.io/nvidia/runai/runai-mcp-server
    tag: "2.26.13"
    pullPolicy: IfNotPresent
  # Registry credentials are used by the kubelet before the container starts;
  # put an nvcr.io docker-registry Secret name here, never NGC_API_KEY in the
  # application Secret. Empty inherits the chart-wide imagePullSecrets.
  imagePullSecrets: []
  port: 8080
  metricsPort: 9090
  # Some managed Run:ai ingress configurations serve the UI at
  # `/.well-known/openid-configuration` instead of the JSON document required
  # by the official MCP's JWKS verifier. Set this to the token `iss` URL to
  # enable an in-pod proxy: only discovery is routed to the issuer, while API
  # calls still use agent.env.runaiBaseUrl.
  oidcIssuerUrl: ""
  oidcProxy:
    image:
      repository: docker.io/nginxinc/nginx-unprivileged
      tag: "1.27-alpine"
      pullPolicy: IfNotPresent
    port: 8081
    resources: {}
  args:
    - serve
    - --transport
    - http
  # /mcp is OAuth protected and returns 401 to unauthenticated HTTP probes, so
  # use TCP probes. Agent startup performs an authenticated tools/list check.
  readinessProbe:
    tcpSocket:
      port: mcp
    initialDelaySeconds: 2
    periodSeconds: 5
  livenessProbe:
    tcpSocket:
      port: mcp
    initialDelaySeconds: 10
    periodSeconds: 10
  # Optional deployment-specific settings, for example a combined CA bundle
  # mounted below and selected with SSL_CERT_FILE for a private Run:ai PKI.
  extraEnv: []
  extraVolumeMounts: []
  extraVolumes: []
  service:
    annotations: {}
    type: ClusterIP
  resources: {}

grafanaMcp:
  enabled: true
  image:
    repository: docker.io/grafana/mcp-grafana
    tag: "0.14.0"
    pullPolicy: IfNotPresent
  service:
    annotations: {}
    type: ClusterIP
    port: 9901
  grafanaUrl: http://prometheus-grafana.monitoring.svc.cluster.local:80
  # Grafana org for datasource lookups. Grafana's default org id is 1; leaving
  # this empty makes mcp-grafana warn "No org ID found ... using default org"
  # on every request and can miss datasources on multi-org installs.
  grafanaOrgId: "1"
  # Optional explicit UIDs avoid datasource discovery and disambiguate installs
  # with several same-type datasources. Empty values use list_datasources.
  prometheusDatasourceUid: ""
  lokiDatasourceUid: ""
  command: []
  args: []
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}

