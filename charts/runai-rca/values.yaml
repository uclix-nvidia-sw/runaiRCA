nameOverride: ""
fullnameOverride: ""

global:
  imageRegistry: ""

imagePullSecrets: []
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
priorityClassName: ""
topologySpreadConstraints: []

secrets:
  existingSecret: ""
  databaseExistingSecret: ""
  keys:
    databaseUrl: DATABASE_URL
    postgresDsn: POSTGRES_DSN
    runaiClientId: RUNAI_CLIENT_ID
    runaiClientSecret: RUNAI_CLIENT_SECRET
    runaiBearerToken: RUNAI_BEARER_TOKEN
    lokiBearerToken: LOKI_BEARER_TOKEN
    lokiBasicUsername: LOKI_BASIC_USERNAME
    lokiBasicPassword: LOKI_BASIC_PASSWORD
    nvidiaApiKey: NVIDIA_API_KEY
    llmApiKey: LLM_API_KEY
  databaseUrl: ""
  postgresDsn: ""
  runaiClientId: ""
  runaiClientSecret: ""
  runaiBearerToken: ""
  lokiBearerToken: ""
  lokiBasicUsername: ""
  lokiBasicPassword: ""
  nvidiaApiKey: ""
  llmApiKey: ""

postgresql:
  enabled: false
  # pgvector/pgvector ships Postgres with the pgvector extension preinstalled, so
  # the bundled database can serve real vector similarity search. It is a drop-in
  # replacement for the official postgres image (same env vars, same data dir).
  image:
    repository: pgvector/pgvector
    tag: "pg16"
    pullPolicy: IfNotPresent
  auth:
    username: runai_rca
    password: runai_rca
    database: runai_rca
  service:
    annotations: {}
    port: 5432
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  readinessProbe: {}
  livenessProbe: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  resources: {}

backend:
  replicaCount: 1
  image:
    repository: runai-rca-backend
    tag: ""
    pullPolicy: IfNotPresent
  env:
    agentUrl: ""
    language: en
    databaseConnectTimeoutSeconds: 5
    agentRequestTimeoutSeconds: 180
  service:
    annotations: {}
    type: ClusterIP
    port: 8080
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  readinessProbe:
    httpGet:
      path: /healthz
      port: http
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
  extraEnv: []
  resources: {}

agent:
  replicaCount: 1
  image:
    repository: runai-rca-agent
    tag: ""
    pullPolicy: IfNotPresent
  service:
    annotations: {}
    type: ClusterIP
    port: 8000
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  rbac:
    create: true
    clusterWide: true
    namespaces: []
  env:
    language: en
    logLevel: info
    kubernetesApiUrl: https://kubernetes.default.svc
    kubernetesTokenPath: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubernetesCaPath: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    kubernetesTimeoutSeconds: 6
    kubernetesListLimit: 50
    kubernetesNamespaces: ""
    enableNatRuntime: false
    natConfigFile: /app/configs/runai_rca_workflow.yml
    natTimeoutSeconds: 180
    runaiBaseUrl: ""
    runaiTokenUrl: ""
    runaiWorkloadsPath: /api/v1/workloads
    runaiProjectsPath: /api/v1/projects
    runaiQueuesPath: /api/v1/queues
    runaiTimeoutSeconds: 8
    runaiLogNamespaces: runai,runai-backend
    prometheusUrl: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
    prometheusTimeoutSeconds: 6
    prometheusMcpUrl: ""
    lokiUrl: http://loki-gateway.monitoring.svc.cluster.local
    lokiTenantId: ""
    lokiTimeoutSeconds: 6
    lokiQueryLimit: 20
    lokiMcpUrl: ""
    postgresTimeoutSeconds: 6
    troubleshootingCasesFile: knowledge/troubleshooting_cases.md
    agentSoulsFile: prompts/agent_souls.md
    maskingRegexListJson: "[]"
    builtinRedactionEnabled: true
    builtinRedactionHashMode: false
    llmBaseUrl: ""
    llmModel: ""
    llmRequestTimeoutSeconds: 120
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: true
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  readinessProbe:
    httpGet:
      path: /healthz
      port: http
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
  extraEnv: []
  resources: {}

frontend:
  replicaCount: 1
  image:
    repository: runai-rca-frontend
    tag: ""
    pullPolicy: IfNotPresent
  service:
    annotations: {}
    type: ClusterIP
    port: 80
  config:
    apiBaseUrl: ""
    enableMockData: false
  nginx:
    clientMaxBodySize: 10m
    proxyConnectTimeout: 60s
    proxyReadTimeout: 3600s
    proxySendTimeout: 3600s
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: false
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  readinessProbe:
    httpGet:
      path: /
      port: http
  livenessProbe:
    httpGet:
      path: /
      port: http
  extraEnv: []
  resources: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: runai-rca.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

nodeSelector: {}
tolerations: []
affinity: {}
