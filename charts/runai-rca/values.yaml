agent:
  replicaCount: 1
  image:
    repository: runai-rca-agent
    tag: ""
    pullPolicy: IfNotPresent
  service:
    annotations: {}
    type: ClusterIP
    port: 8000
  serviceAccount:
    create: true
    name: ""
    annotations: {}
  rbac:
    create: true
    clusterWide: true
    namespaces: []
  env:
    language: ko
    logLevel: warning
    kubernetesApiUrl: https://kubernetes.default.svc
    kubernetesTokenPath: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubernetesCaPath: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    kubernetesTimeoutSeconds: 120
    kubernetesListLimit: 50
    kubernetesNamespaces: ""
    # Allow the Kubernetes agent to run read-only diagnostic commands (nvidia-smi,
    # etc.) via the pod exec subresource. Requires pods/exec RBAC (agent-rbac.yaml).
    enablePodExec: true
    # Helm v3 history lives in Secrets. Enabling this ALSO grants the agent
    # ServiceAccount get/list on Secrets (agent-rbac.yaml, gated on this flag).
    # RBAC cannot scope a secrets LIST to just Helm releases, so this is BROAD
    # Secret read within the agent's RBAC scope. Keep off (least privilege)
    # unless Helm rollout / value-diff evidence is deliberately wanted.
    enableHelmChangeDetection: false
    enableNatRuntime: true
    natConfigFile: /app/configs/runai_rca_engine.yml
    # Human-like iterative investigation: cap LLM reasoning rounds at 3. Each
    # round can batch many independent read-only queries.
    # instead of gathering everything once. Only active when an LLM is configured
    # (no-op otherwise); each step is an extra LLM call, so it costs more per RCA.
    enableInvestigationLoop: true
    maxInvestigationSteps: 3
    # Re-analysis (after a refuted top cause) gets its own investigation budget.
    maxReanalysisSteps: 3
    # off | shadow | assist | authoritative. Shadow is the safe default: it
    # records evidence-gated novel hypotheses but never changes the headline.
    openWorldRcaMode: "shadow"
    # Per-collector autonomous drill-down: each evidence agent (kubernetes /
    # prometheus / loki / runai) runs its own adaptive LLM loop with ONLY its
    # domain's read-only tools to deepen its own evidence. Only active when an
    # LLM is configured; each step is extra LLM calls (accuracy over latency).
    enableAgentDrilldown: true
    # Overall hard cap per analysis: generous per-step time, but the whole run always
    # finishes within this budget (default 25 min). 0 = no overall cap.
    analysisDeadlineSeconds: 1500
    # Complete /analyze JSON budget. Oversized raw evidence and internal traces
    # are compacted before the Korean RCA report text. Keep below the backend cap.
    analysisResponseMaxBytes: 1572864
    # Final RCA output guard: cites collected evidence, calibrates confidence,
    # and converts an unsafe unresolved conclusion into an honest abstention.
    enableRcaOutputHarness: true
    maxRcaRepairAttempts: 3
    rcaHarnessPassScore: 70
    runaiBaseUrl: ""
    runaiTokenUrl: ""
    runaiWorkloadsPath: /api/v1/workloads
    runaiProjectsPath: /api/v1/projects
    runaiQueuesPath: /api/v1/queues
    # Run:ai control-plane version endpoint — enables version-aware suppression of
    # known issues already fixed on this cluster. Best-effort; set to your API's path.
    runaiVersionPath: /api/v1/version
    runaiTimeoutSeconds: 120
    runaiLogNamespaces: runai,runai-backend
    collectors: runai,kubernetes,postgres,prometheus,loki,system,change
    backendUrl: ""
    # Approved incident-derived knowledge is read-only at runtime. Empty
    # runtimeKnowledgeUrl derives the backend runtime-snapshot endpoint from
    # backendUrl; leave the token empty unless that endpoint is protected.
    # assist: approved-case confirming probes are injected into matching
    # incidents (bounded, evidence-gated — never forces a conclusion). Inert
    # until the first case is approved. Set to shadow to keep replay off.
    dynamicKnowledgeMode: assist
    runtimeKnowledgeUrl: ""
    runtimeKnowledgeToken: ""
    runtimeKnowledgeRefreshSeconds: 30
    runtimeKnowledgeTimeoutSeconds: 10
    prometheusUrl: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
    prometheusTimeoutSeconds: 120
    prometheusMcpUrl: ""
    prometheusDatasourceUid: ""
    kubernetesMcpUrl: ""
    lokiUrl: http://loki-read.monitoring.svc.cluster.local:3100
    lokiTimeoutSeconds: 120
    lokiQueryLimit: 20
    lokiMcpUrl: ""
    lokiDatasourceUid: ""
    postgresMcpUrl: ""
    postgresTimeoutSeconds: 60
    typedbTimeoutSeconds: 60
    troubleshootingCasesFile: knowledge/troubleshooting_cases.md
    familiesFile: knowledge/families.yaml
    agentSoulsFile: prompts/agent_souls.md
    maskingRegexListJson: "[]"
    builtinRedactionEnabled: true
    builtinRedactionHashMode: false
    llmBaseUrl: ""
    llmModel: ""
    llmModelPlanner: ""
    llmModelInvestigation: ""
    llmModelDrilldown: ""
    llmModelSelfCheck: ""
    llmModelSynthesis: ""
    llmModelChat: ""
    llmModelInsight: ""
    # Output budget for 1-2 sentence collector insights. Reasoning models may
    # consume part of this internally before emitting visible content.
    llmInsightMaxTokens: 512
    # JSON: {"model":{"prompt_per_mtok":0.15,"completion_per_mtok":0.60}}
    llmPricingJson: "{}"
    llmRequestTimeoutSeconds: 300
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  automountServiceAccountToken: true
  priorityClassName: ""
  topologySpreadConstraints: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
  readinessProbe:
    httpGet:
      path: /healthz
      port: http
  livenessProbe:
    httpGet:
      path: /healthz
      port: http
  extraEnv: []
  extraVolumeMounts: []
  extraVolumes: []
  resources: {}

