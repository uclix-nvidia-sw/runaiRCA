apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runai-rca.backend.fullname" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "runai-rca.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "runai-rca.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: {{ include "runai-rca.image" (dict "root" . "image" .Values.backend.image) | quote }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
          env:
            - name: PORT
              value: {{ .Values.backend.service.port | quote }}
            - name: AGENT_URL
              value: http://{{ include "runai-rca.agent.fullname" . }}:{{ .Values.agent.service.port }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "runai-rca.secretName" . }}
                  key: DATABASE_URL
                  optional: true
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "runai-rca.secretName" . }}
                  key: POSTGRES_DSN
                  optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "runai-rca.backend.fullname" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
  selector:
    {{- include "runai-rca.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
