{{- $podAnnotations := mergeOverwrite (deepCopy (default (dict) .Values.podAnnotations)) (default (dict) .Values.backend.podAnnotations) -}}
{{- $podLabels := mergeOverwrite (deepCopy (default (dict) .Values.podLabels)) (default (dict) .Values.backend.podLabels) -}}
{{- $podSecurityContext := default .Values.podSecurityContext .Values.backend.podSecurityContext -}}
{{- $securityContext := default .Values.securityContext .Values.backend.securityContext -}}
{{- $priorityClassName := default .Values.priorityClassName .Values.backend.priorityClassName -}}
{{- $topologySpreadConstraints := default .Values.topologySpreadConstraints .Values.backend.topologySpreadConstraints -}}
{{- $nodeSelector := default .Values.nodeSelector .Values.backend.nodeSelector -}}
{{- $affinity := default .Values.affinity .Values.backend.affinity -}}
{{- $tolerations := default .Values.tolerations .Values.backend.tolerations -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runai-rca.backend.fullname" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "runai-rca.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "runai-rca.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        {{- with $podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Roll the pod when the secret changes so rotated credentials (Slack bot
        # token, LLM/Run:ai keys) are picked up — env from secretKeyRef is frozen
        # at pod start, so without this a `helm upgrade` that only changes the
        # secret leaves the running pod authenticating with the old value.
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with $podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.backend.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with $topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "runai-rca.image" (dict "root" . "image" .Values.backend.image) | quote }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          {{- with $securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
          env:
            - name: PORT
              value: {{ .Values.backend.service.port | quote }}
            - name: AGENT_URL
              value: {{ default (printf "http://%s:%v" (include "runai-rca.agent.fullname" .) .Values.agent.service.port) .Values.backend.env.agentUrl | quote }}
            - name: LANGUAGE
              value: {{ .Values.backend.env.language | quote }}
            - name: DATABASE_CONNECT_TIMEOUT_SECONDS
              value: {{ .Values.backend.env.databaseConnectTimeoutSeconds | quote }}
            - name: AGENT_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.backend.env.agentRequestTimeoutSeconds | quote }}
            - name: MANUAL_AGENT_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.backend.env.manualAgentRequestTimeoutSeconds | quote }}
            - name: MAX_AUTO_ANALYZE_FANOUT
              value: {{ .Values.backend.env.maxAutoAnalyzeFanout | quote }}
            - name: AUTO_ANALYZE_SEVERITIES
              value: {{ .Values.backend.env.autoAnalyzeSeverities | quote }}
            - name: MAX_CONCURRENT_AGENT_RUNS
              value: {{ .Values.backend.env.maxConcurrentAgentRuns | quote }}
            - name: FLAPPING_GROUP_WINDOW_MINUTES
              value: {{ .Values.backend.env.flappingGroupWindowMinutes | quote }}
            - name: ANALYSIS_BACKFILL_INTERVAL_SECONDS
              value: {{ .Values.backend.env.analysisBackfillIntervalSeconds | quote }}
            - name: ANALYSIS_BACKFILL_BATCH
              value: {{ .Values.backend.env.analysisBackfillBatch | quote }}
            - name: ANALYSIS_BACKFILL_RETRY_COOLDOWN_SECONDS
              value: {{ .Values.backend.env.analysisBackfillRetryCooldownSeconds | quote }}
            - name: EMBEDDING_URL
              value: {{ .Values.backend.env.embeddingUrl | quote }}
            - name: EMBEDDING_MODEL
              value: {{ .Values.backend.env.embeddingModel | quote }}
            - name: EMBEDDING_DIM
              value: {{ .Values.backend.env.embeddingDim | quote }}
            - name: EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "runai-rca.secretName" . }}
                  key: {{ .Values.secrets.keys.embeddingApiKey | quote }}
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "runai-rca.databaseSecretName" . }}
                  key: {{ .Values.secrets.keys.databaseUrl | quote }}
                  optional: true
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "runai-rca.databaseSecretName" . }}
                  key: {{ .Values.secrets.keys.postgresDsn | quote }}
                  optional: true
            - name: DASHBOARD_URL
              value: {{ .Values.backend.env.dashboardUrl | quote }}
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "runai-rca.secretName" . }}
                  key: {{ .Values.secrets.keys.slackBotToken | quote }}
                  optional: true
            - name: SLACK_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "runai-rca.secretName" . }}
                  key: {{ .Values.secrets.keys.slackChannelId | quote }}
                  optional: true
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "runai-rca.secretName" . }}
                  key: {{ .Values.secrets.keys.slackAppToken | quote }}
                  optional: true
            {{- with .Values.backend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.backend.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- with $nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "runai-rca.backend.fullname" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- with .Values.backend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
  selector:
    {{- include "runai-rca.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
