{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "runai-rca.secretName" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.keys.databaseUrl | quote }}: {{ include "runai-rca.databaseUrl" . | quote }}
  {{ .Values.secrets.keys.postgresDsn | quote }}: {{ include "runai-rca.postgresDsn" . | quote }}
  {{ .Values.secrets.keys.runaiClientId | quote }}: {{ .Values.secrets.runaiClientId | quote }}
  {{ .Values.secrets.keys.runaiClientSecret | quote }}: {{ .Values.secrets.runaiClientSecret | quote }}
  {{ .Values.secrets.keys.runaiBearerToken | quote }}: {{ .Values.secrets.runaiBearerToken | quote }}
  {{ .Values.secrets.keys.nvidiaApiKey | quote }}: {{ .Values.secrets.nvidiaApiKey | quote }}
{{- end }}
