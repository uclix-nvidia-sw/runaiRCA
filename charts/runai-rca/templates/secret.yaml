{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "runai-rca.secretName" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "runai-rca.databaseUrl" . | quote }}
  POSTGRES_DSN: {{ include "runai-rca.postgresDsn" . | quote }}
  RUNAI_CLIENT_ID: {{ .Values.secrets.runaiClientId | quote }}
  RUNAI_CLIENT_SECRET: {{ .Values.secrets.runaiClientSecret | quote }}
  RUNAI_BEARER_TOKEN: {{ .Values.secrets.runaiBearerToken | quote }}
  NVIDIA_API_KEY: {{ .Values.secrets.nvidiaApiKey | quote }}
{{- end }}
