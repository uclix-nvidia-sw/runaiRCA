{{- if .Values.runaiMcp.enabled }}
{{- $runaiBaseUrl := required "agent.env.runaiBaseUrl is required when runaiMcp.enabled=true (sets RUNAI_BASE_URL for the official NVIDIA Run:ai MCP)" .Values.agent.env.runaiBaseUrl }}
{{- $runaiMcpPullSecrets := default .Values.imagePullSecrets .Values.runaiMcp.imagePullSecrets }}
{{- $runaiMcpIssuerUrl := trimSuffix "/" .Values.runaiMcp.oidcIssuerUrl }}
{{- $runaiMcpOidcProxyEnabled := ne $runaiMcpIssuerUrl "" }}
{{- if $runaiMcpOidcProxyEnabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "runai-rca.runaiMcp.fullname" . }}-oidc-proxy
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: runai-mcp
data:
  default.conf: |
    server {
      listen {{ .Values.runaiMcp.oidcProxy.port }};
      location = /.well-known/openid-configuration {
        proxy_ssl_server_name on;
        {{- if .Values.runaiTls.caBundleSecretName }}
        proxy_ssl_trusted_certificate /etc/runai/tls/ca-bundle.pem;
        proxy_ssl_verify on;
        {{- end }}
        proxy_pass {{ $runaiMcpIssuerUrl }}/.well-known/openid-configuration;
      }
      location / {
        proxy_ssl_server_name on;
        {{- if .Values.runaiTls.caBundleSecretName }}
        proxy_ssl_trusted_certificate /etc/runai/tls/ca-bundle.pem;
        proxy_ssl_verify on;
        {{- end }}
        proxy_pass {{ $runaiBaseUrl }};
      }
    }
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runai-rca.runaiMcp.fullname" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: runai-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "runai-rca.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: runai-mcp
  template:
    metadata:
      labels:
        {{- include "runai-rca.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: runai-mcp
    spec:
      automountServiceAccountToken: false
      {{- with $runaiMcpPullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: runai-mcp
          image: {{ include "runai-rca.image" (dict "root" . "image" .Values.runaiMcp.image) | quote }}
          imagePullPolicy: {{ .Values.runaiMcp.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.runaiMcp.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: mcp
              containerPort: {{ .Values.runaiMcp.port }}
            - name: metrics
              containerPort: {{ .Values.runaiMcp.metricsPort }}
          env:
            - name: RUNAI_BASE_URL
              value: {{ if $runaiMcpOidcProxyEnabled }}{{ printf "http://127.0.0.1:%v" .Values.runaiMcp.oidcProxy.port | quote }}{{ else }}{{ $runaiBaseUrl | quote }}{{ end }}
            - name: RUNAI_MCP_LISTEN_PORT
              value: {{ .Values.runaiMcp.port | quote }}
            - name: RUNAI_MCP_METRICS_PORT
              value: {{ .Values.runaiMcp.metricsPort | quote }}
            {{- if .Values.runaiTls.caBundleSecretName }}
            - name: SSL_CERT_FILE
              value: /etc/runai/tls/ca-bundle.pem
            {{- end }}
            {{- with .Values.runaiMcp.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or .Values.runaiTls.caBundleSecretName .Values.runaiMcp.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.runaiTls.caBundleSecretName }}
            - name: runai-ca-bundle
              mountPath: /etc/runai/tls
              readOnly: true
            {{- end }}
            {{- with .Values.runaiMcp.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.runaiMcp.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.runaiMcp.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.runaiMcp.resources | nindent 12 }}
        {{- if $runaiMcpOidcProxyEnabled }}
        - name: oidc-proxy
          image: {{ include "runai-rca.image" (dict "root" . "image" .Values.runaiMcp.oidcProxy.image) | quote }}
          imagePullPolicy: {{ .Values.runaiMcp.oidcProxy.image.pullPolicy }}
          ports:
            - name: oidc-proxy
              containerPort: {{ .Values.runaiMcp.oidcProxy.port }}
          volumeMounts:
            - name: runai-mcp-oidc-proxy-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            {{- if .Values.runaiTls.caBundleSecretName }}
            - name: runai-ca-bundle
              mountPath: /etc/runai/tls
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.runaiMcp.oidcProxy.resources | nindent 12 }}
        {{- end }}
      {{- if or .Values.runaiTls.caBundleSecretName .Values.runaiMcp.extraVolumes $runaiMcpOidcProxyEnabled }}
      volumes:
        {{- if $runaiMcpOidcProxyEnabled }}
        - name: runai-mcp-oidc-proxy-config
          configMap:
            name: {{ include "runai-rca.runaiMcp.fullname" . }}-oidc-proxy
        {{- end }}
        {{- if .Values.runaiTls.caBundleSecretName }}
        - name: runai-ca-bundle
          secret:
            secretName: {{ .Values.runaiTls.caBundleSecretName | quote }}
            items:
              - key: {{ .Values.runaiTls.caBundleSecretKey | quote }}
                path: ca-bundle.pem
        {{- end }}
        {{- with .Values.runaiMcp.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "runai-rca.runaiMcp.fullname" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: runai-mcp
  {{- with .Values.runaiMcp.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.runaiMcp.service.type | default "ClusterIP" }}
  ports:
    - name: mcp
      port: {{ .Values.runaiMcp.port }}
      targetPort: mcp
    - name: metrics
      port: {{ .Values.runaiMcp.metricsPort }}
      targetPort: metrics
  selector:
    {{- include "runai-rca.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: runai-mcp
{{- end }}
{{- if .Values.grafanaMcp.enabled }}
