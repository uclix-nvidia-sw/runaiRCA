{{- if and .Values.typedb.enabled .Values.typedb.ingest.enabled }}
{{- /* requireApproval=true -> ingest only Dashboard-approved incidents. */ -}}
{{- $allFlag := ternary "" "--all " .Values.typedb.ingest.requireApproval }}
{{- /* promoteKnowledge -> also learn confirmed RCAs into reusable knowledge (closes the loop) */ -}}
{{- $promoteFlag := ternary "--promote-knowledge " "" .Values.typedb.ingest.promoteKnowledge }}
{{- /* generateDataset -> after ingest, accumulate confirmed/pending incident rows into the
       rca_dataset store (approve status from incidents.user_approved_at). Same job so it shares
       env + runs right after the KG is refreshed, matching the ingest timing. */ -}}
{{- $ingestCmd := printf "python -m ontology.ingest --approved-only %s%s--resolved-grace-hours %v --limit %v" $allFlag $promoteFlag .Values.typedb.ingest.resolvedGraceHours .Values.typedb.ingest.limit }}
{{- $genCmd := "" }}
{{- if .Values.typedb.ingest.generateDataset }}
{{- $genCmd = printf " && python -m eval.gen_dataset --from-incidents --resolved-grace-hours %v --limit %v" .Values.typedb.ingest.resolvedGraceHours .Values.typedb.ingest.limit }}
{{- end }}
# Periodic projection of resolved incidents (resolved >= resolvedGraceHours ago)
# into the TypeDB knowledge graph. The grace window lets late feedback / re-analysis
# settle; re-fired incidents flip back to 'firing' and are excluded automatically.
# Uses the agent image (ships ontology/ + drivers) and is idempotent (replace-in-place).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "runai-rca.typedb.fullname" . }}-ingest
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: typedb-ingest
spec:
  schedule: {{ .Values.typedb.ingest.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "runai-rca.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: typedb-ingest
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: ingest
              image: {{ include "runai-rca.image" (dict "root" . "image" .Values.agent.image) | quote }}
              imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
              command: ["sh", "-c"]
              args:
                - "{{ $ingestCmd }}{{ $genCmd }}"
              env:
                - name: ENABLE_TYPEDB
                  value: "true"
                - name: TYPEDB_ADDRESS
                  value: {{ include "runai-rca.typedb.address" . | quote }}
                - name: TYPEDB_DATABASE
                  value: {{ .Values.typedb.auth.database | quote }}
                - name: TYPEDB_USERNAME
                  value: {{ .Values.typedb.auth.username | quote }}
                - name: TYPEDB_PASSWORD
                  value: {{ .Values.typedb.auth.password | quote }}
                - name: TYPEDB_TIMEOUT_SECONDS
                  value: {{ .Values.agent.env.typedbTimeoutSeconds | quote }}
                - name: POSTGRES_DSN
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "runai-rca.databaseSecretName" . }}
                      key: {{ .Values.secrets.keys.postgresDsn | quote }}
                      optional: true
{{- end }}
