{{- $podAnnotations := mergeOverwrite (deepCopy (default (dict) .Values.podAnnotations)) (default (dict) .Values.agent.podAnnotations) -}}
{{- $podLabels := mergeOverwrite (deepCopy (default (dict) .Values.podLabels)) (default (dict) .Values.agent.podLabels) -}}
{{- $podSecurityContext := default .Values.podSecurityContext .Values.agent.podSecurityContext -}}
{{- $securityContext := default .Values.securityContext .Values.agent.securityContext -}}
{{- $priorityClassName := default .Values.priorityClassName .Values.agent.priorityClassName -}}
{{- $topologySpreadConstraints := default .Values.topologySpreadConstraints .Values.agent.topologySpreadConstraints -}}
{{- $nodeSelector := default .Values.nodeSelector .Values.agent.nodeSelector -}}
{{- $affinity := default .Values.affinity .Values.agent.affinity -}}
{{- $tolerations := default .Values.tolerations .Values.agent.tolerations -}}
{{- $rbacNamespaces := default (list .Release.Namespace) .Values.agent.rbac.namespaces -}}
{{- $kubernetesNamespaces := .Values.agent.env.kubernetesNamespaces -}}
{{- if and (not .Values.agent.rbac.clusterWide) (not $kubernetesNamespaces) -}}
{{- $kubernetesNamespaces = join "," $rbacNamespaces -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runai-rca.agent.fullname" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  replicas: {{ .Values.agent.replicaCount }}
  selector:
    matchLabels:
      {{- include "runai-rca.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        {{- include "runai-rca.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
        {{- with $podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "runai-rca.agent.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.agent.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with $topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: {{ include "runai-rca.image" (dict "root" . "image" .Values.agent.image) | quote }}
          imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
          {{- with $securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.agent.service.port }}
          env:
            - name: PORT
              value: {{ .Values.agent.service.port | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.agent.env.logLevel | quote }}
            - name: LANGUAGE
              value: {{ .Values.agent.env.language | quote }}
            - name: KUBERNETES_API_URL
              value: {{ .Values.agent.env.kubernetesApiUrl | quote }}
            - name: KUBERNETES_TOKEN_PATH
              value: {{ .Values.agent.env.kubernetesTokenPath | quote }}
            - name: KUBERNETES_CA_PATH
              value: {{ .Values.agent.env.kubernetesCaPath | quote }}
            - name: KUBERNETES_TIMEOUT_SECONDS
              value: {{ .Values.agent.env.kubernetesTimeoutSeconds | quote }}
            - name: KUBERNETES_LIST_LIMIT
              value: {{ .Values.agent.env.kubernetesListLimit | quote }}
            - name: KUBERNETES_NAMESPACES
              value: {{ $kubernetesNamespaces | quote }}
            - name: KUBERNETES_CLUSTER_SCOPE_ENABLED
              value: {{ .Values.agent.rbac.clusterWide | quote }}
            - name: ENABLE_NAT_RUNTIME
              value: {{ .Values.agent.env.enableNatRuntime | quote }}
            - name: NAT_CONFIG_FILE
              value: {{ .Values.agent.env.natConfigFile | quote }}
            - name: NAT_TIMEOUT_SECONDS
              value: {{ .Values.agent.env.natTimeoutSeconds | quote }}
            - name: RUNAI_BASE_URL
              value: {{ .Values.agent.env.runaiBaseUrl | quote }}
            - name: RUNAI_TOKEN_URL
              value: {{ .Values.agent.env.runaiTokenUrl | quote }}
            - name: RUNAI_WORKLOADS_PATH
              value: {{ .Values.agent.env.runaiWorkloadsPath | quote }}
            - name: RUNAI_PROJECTS_PATH
              value: {{ .Values.agent.env.runaiProjectsPath | quote }}
            - name: RUNAI_QUEUES_PATH
              value: {{ .Values.agent.env.runaiQueuesPath | quote }}
            - name: RUNAI_TIMEOUT_SECONDS
              value: {{ .Values.agent.env.runaiTimeoutSeconds | quote }}
            - name: RUNAI_LOG_NAMESPACES
              value: {{ .Values.agent.env.runaiLogNamespaces | quote }}
            - name: PROMETHEUS_URL
              value: {{ .Values.agent.env.prometheusUrl | quote }}
            - name: PROMETHEUS_TIMEOUT_SECONDS
              value: {{ .Values.agent.env.prometheusTimeoutSeconds | quote }}
            - name: PROMETHEUS_MCP_URL
              value: {{ .Values.agent.env.prometheusMcpUrl | quote }}
            - name: LOKI_URL
              value: {{ .Values.agent.env.lokiUrl | quote }}
            - name: LOKI_TIMEOUT_SECONDS
              value: {{ .Values.agent.env.lokiTimeoutSeconds | quote }}
            - name: LOKI_QUERY_LIMIT
              value: {{ .Values.agent.env.lokiQueryLimit | quote }}
            - name: LOKI_MCP_URL
              value: {{ .Values.agent.env.lokiMcpUrl | quote }}
            - name: POSTGRES_TIMEOUT_SECONDS
              value: {{ .Values.agent.env.postgresTimeoutSeconds | quote }}
            - name: TROUBLESHOOTING_CASES_FILE
              value: {{ .Values.agent.env.troubleshootingCasesFile | quote }}
            - name: AGENT_SOULS_FILE
              value: {{ .Values.agent.env.agentSoulsFile | quote }}
            - name: MASKING_REGEX_LIST_JSON
              value: {{ .Values.agent.env.maskingRegexListJson | quote }}
            - name: BUILTIN_REDACTION_ENABLED
              value: {{ .Values.agent.env.builtinRedactionEnabled | quote }}
            - name: BUILTIN_REDACTION_HASH_MODE
              value: {{ .Values.agent.env.builtinRedactionHashMode | quote }}
            - name: LLM_BASE_URL
              value: {{ .Values.agent.env.llmBaseUrl | quote }}
            - name: LLM_MODEL
              value: {{ .Values.agent.env.llmModel | quote }}
            - name: LLM_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.agent.env.llmRequestTimeoutSeconds | quote }}
            - name: ENABLE_TYPEDB
              value: {{ .Values.typedb.enabled | quote }}
            - name: TYPEDB_ADDRESS
              value: {{ include "runai-rca.typedb.address" . | quote }}
            - name: TYPEDB_DATABASE
              value: {{ .Values.typedb.auth.database | quote }}
            - name: TYPEDB_USERNAME
              value: {{ .Values.typedb.auth.username | quote }}
            - name: TYPEDB_PASSWORD
              value: {{ .Values.typedb.auth.password | quote }}
            - name: TYPEDB_TIMEOUT_SECONDS
              value: {{ .Values.agent.env.typedbTimeoutSeconds | quote }}
            - name: ENABLE_POD_EXEC
              value: {{ .Values.agent.env.enablePodExec | quote }}
            {{- if .Values.systemAgent.enabled }}
            - name: ENABLE_SYSTEM_AGENT
              value: "true"
            # The system collector substitutes {node} per alert; the DaemonSet serves
            # node logs on this port (hostNetwork), so the node name resolves directly.
            - name: SYSTEM_AGENT_URL
              value: "http://{node}:{{ .Values.systemAgent.port }}"
            {{- end }}
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "runai-rca.databaseSecretName" . }}
                  key: {{ .Values.secrets.keys.postgresDsn | quote }}
                  optional: true
            - name: RUNAI_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "runai-rca.secretName" . }}
                  key: {{ .Values.secrets.keys.runaiClientId | quote }}
                  optional: true
            - name: RUNAI_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "runai-rca.secretName" . }}
                  key: {{ .Values.secrets.keys.runaiClientSecret | quote }}
                  optional: true
            - name: RUNAI_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "runai-rca.secretName" . }}
                  key: {{ .Values.secrets.keys.runaiBearerToken | quote }}
                  optional: true
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "runai-rca.secretName" . }}
                  key: {{ .Values.secrets.keys.nvidiaApiKey | quote }}
                  optional: true
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "runai-rca.secretName" . }}
                  key: {{ .Values.secrets.keys.llmApiKey | quote }}
                  optional: true
            {{- with .Values.agent.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.agent.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.agent.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
      {{- with $nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "runai-rca.agent.fullname" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
  {{- with .Values.agent.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.agent.service.type | default "ClusterIP" }}
  ports:
    - name: http
      port: {{ .Values.agent.service.port }}
      targetPort: http
  selector:
    {{- include "runai-rca.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: agent
