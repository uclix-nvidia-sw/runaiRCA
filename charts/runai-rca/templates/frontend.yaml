{{- $podAnnotations := mergeOverwrite (deepCopy (default (dict) .Values.podAnnotations)) (default (dict) .Values.frontend.podAnnotations) -}}
{{- $podLabels := mergeOverwrite (deepCopy (default (dict) .Values.podLabels)) (default (dict) .Values.frontend.podLabels) -}}
{{- $podSecurityContext := default .Values.podSecurityContext .Values.frontend.podSecurityContext -}}
{{- $securityContext := default .Values.securityContext .Values.frontend.securityContext -}}
{{- $priorityClassName := default .Values.priorityClassName .Values.frontend.priorityClassName -}}
{{- $topologySpreadConstraints := default .Values.topologySpreadConstraints .Values.frontend.topologySpreadConstraints -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runai-rca.frontend.fullname" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "runai-rca.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "runai-rca.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
        {{- with $podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.frontend.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with $topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "runai-rca.image" (dict "root" . "image" .Values.frontend.image) | quote }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          {{- with $securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 80
          {{- with .Values.frontend.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: frontend-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: frontend-config
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
          {{- with .Values.frontend.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.frontend.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      volumes:
        - name: frontend-config
          configMap:
            name: {{ include "runai-rca.frontend.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "runai-rca.frontend.fullname" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  {{- with .Values.frontend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
  selector:
    {{- include "runai-rca.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
