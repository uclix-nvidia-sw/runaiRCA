{{- if .Values.agent.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "runai-rca.agent.serviceAccountName" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
  {{- with .Values.agent.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.agent.rbac.create }}
{{- $rbacNamespaces := default (list .Release.Namespace) .Values.agent.rbac.namespaces -}}
{{- if .Values.agent.rbac.clusterWide }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "runai-rca.agent.fullname" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - endpoints
      - events
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - pods
      - resourcequotas
      - services
    verbs: ["get", "list", "watch"]
  # Ad-hoc read-only queries from the investigation loop (k8s_read kind allowlist).
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
  # Read-only container log inspection (pods/log subresource).
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  {{- if .Values.agent.env.enablePodExec }}
  # pods/exec is read-only-by-policy: the agent only runs an allowlisted set of
  # non-mutating diagnostic commands (nvidia-smi, cat /proc/meminfo, free -m, ...).
  # `env`/shells are deliberately NOT allowed (secret leak). Enforced in code
  # (exec_command_allowed); RBAC cannot scope by argv.
  # Gated on enablePodExec so turning the feature off also drops the permission.
  - apiGroups: [""]
    resources: ["pods/exec"]
    # aiohttp opens the WebSocket upgrade with HTTP GET. Kubernetes authorizes
    # that connect endpoint as `get`; keep `create` for POST-based exec clients.
    verbs: ["get", "create"]
  {{- end }}
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["get", "list", "watch"]
  # Run:ai CRDs — exactly the k8s_read allowlist (_RUNAI_CRD_KINDS), read-only;
  # kubectl parity for the scheduler RCA path. Kept least-privilege on purpose
  # (no accessrules/applications/policies).
  - apiGroups: ["run.ai"]
    resources:
      - distributedworkloads
      - distributedinferenceworkloads
      - externalworkloads
      - inferenceworkloads
      - interactiveworkloads
      - nodepools
      - projects
      - runaiconfigs
      - runaijobs
      - workloadrunners
      - trainingworkloads
    verbs: ["get", "list", "watch"]
  - apiGroups: ["scheduling.run.ai"]
    resources:
      - bindrequests
      - departments
      - podgroups
      - queues
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "runai-rca.agent.fullname" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "runai-rca.agent.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "runai-rca.agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else }}
{{- range $namespace := $rbacNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "runai-rca.agent.fullname" $ }}
  namespace: {{ $namespace | quote }}
  labels:
    {{- include "runai-rca.labels" $ | nindent 4 }}
    app.kubernetes.io/component: agent
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - endpoints
      - events
      - persistentvolumeclaims
      - pods
      - resourcequotas
      - services
    verbs: ["get", "list", "watch"]
  # Read-only container log inspection (pods/log subresource).
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  {{- if $.Values.agent.env.enablePodExec }}
  # pods/exec is read-only-by-policy: the agent only runs an allowlisted set of
  # non-mutating diagnostic commands (nvidia-smi, cat /proc/meminfo, free -m, ...).
  # `env`/shells are deliberately NOT allowed (secret leak). Enforced in code
  # (exec_command_allowed); RBAC cannot scope by argv.
  # Gated on enablePodExec so turning the feature off also drops the permission.
  - apiGroups: [""]
    resources: ["pods/exec"]
    # aiohttp opens the WebSocket upgrade with HTTP GET. Kubernetes authorizes
    # that connect endpoint as `get`; keep `create` for POST-based exec clients.
    verbs: ["get", "create"]
  {{- end }}
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["get", "list", "watch"]
  # Run:ai CRDs — the NAMESPACED subset of the k8s_read allowlist only: a Role
  # cannot authorize cluster-scoped resources (projects/queues/departments/
  # nodepools need rbac.clusterWide, same as nodes/storageclasses).
  - apiGroups: ["run.ai"]
    resources:
      - distributedworkloads
      - distributedinferenceworkloads
      - externalworkloads
      - inferenceworkloads
      - interactiveworkloads
      - runaiconfigs
      - runaijobs
      - workloadrunners
      - trainingworkloads
    verbs: ["get", "list", "watch"]
  - apiGroups: ["scheduling.run.ai"]
    resources:
      - bindrequests
      - podgroups
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "runai-rca.agent.fullname" $ }}
  namespace: {{ $namespace | quote }}
  labels:
    {{- include "runai-rca.labels" $ | nindent 4 }}
    app.kubernetes.io/component: agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "runai-rca.agent.fullname" $ }}
subjects:
  - kind: ServiceAccount
    name: {{ include "runai-rca.agent.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
{{- end }}
