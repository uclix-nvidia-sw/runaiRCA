apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "runai-rca.frontend.fullname" . }}
  labels:
    {{- include "runai-rca.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  config.js: |
    window.__RUNAI_RCA_CONFIG__ = {
      apiBaseUrl: {{ .Values.frontend.config.apiBaseUrl | quote }}
    };
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;
      {{- with .Values.frontend.nginx.clientMaxBodySize }}
      client_max_body_size {{ . }};
      {{- end }}

      location = /config.js {
        add_header Cache-Control "no-store";
        try_files /config.js =404;
      }

      location /api/ {
        proxy_http_version 1.1;
        {{- with .Values.frontend.nginx.proxyConnectTimeout }}
        proxy_connect_timeout {{ . }};
        {{- end }}
        {{- with .Values.frontend.nginx.proxyReadTimeout }}
        proxy_read_timeout {{ . }};
        {{- end }}
        {{- with .Values.frontend.nginx.proxySendTimeout }}
        proxy_send_timeout {{ . }};
        {{- end }}
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_pass http://{{ include "runai-rca.backend.fullname" . }}:{{ .Values.backend.service.port }};
      }

      location /webhook/ {
        proxy_http_version 1.1;
        {{- with .Values.frontend.nginx.proxyConnectTimeout }}
        proxy_connect_timeout {{ . }};
        {{- end }}
        {{- with .Values.frontend.nginx.proxyReadTimeout }}
        proxy_read_timeout {{ . }};
        {{- end }}
        {{- with .Values.frontend.nginx.proxySendTimeout }}
        proxy_send_timeout {{ . }};
        {{- end }}
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://{{ include "runai-rca.backend.fullname" . }}:{{ .Values.backend.service.port }};
      }

      location = /api-docs {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://{{ include "runai-rca.backend.fullname" . }}:{{ .Values.backend.service.port }};
      }

      location = /api-docs/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://{{ include "runai-rca.backend.fullname" . }}:{{ .Values.backend.service.port }};
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
