<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Run:AI RCA architecture</title>
  <desc id="desc">Alertmanager sends webhooks to the Backend, while operators use the Frontend to review results. The Backend owns PostgreSQL and calls the Agent. The Agent uses individually shown RunAI, Kubernetes, Prometheus, Loki, Postgres, System, and Change read-only investigation agents, plus an optional LLM provider. Approved trace-v3 records and knowledge packages are copied asynchronously from PostgreSQL to TypeDB.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
    <style>
      .edge { fill: none; stroke: #555; stroke-width: 1.7; marker-end: url(#arrow); }
      .edge-both { fill: none; stroke: #555; stroke-width: 1.7; marker-start: url(#arrow); marker-end: url(#arrow); }
      .edge-dashed { fill: none; stroke: #555; stroke-width: 1.7; stroke-dasharray: 4 5; marker-end: url(#arrow); }
      .group { fill: #fffef0; stroke: #d9d9a6; stroke-width: 1.5; }
      .node { fill: #efedff; stroke: #8b6cf6; stroke-width: 1.7; }
      .tag { fill: #f0f0f0; }
      .title { font: 700 17px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #5b5b1e; }
      .label { font: 500 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #1f2430; }
      .small { font: 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #30343b; }
      .agent { font: 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #30343b; }
      .tag-text { font: 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #3f3f46; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="#ffffff"/>

  <!-- Core deployment -->
  <rect x="220" y="48" width="900" height="530" rx="12" class="group"/>
  <text x="670" y="78" text-anchor="middle" class="title">Run:AI RCA</text>

  <!-- External actors -->
  <rect x="28" y="77" width="170" height="56" rx="7" class="node"/>
  <text x="113" y="111" text-anchor="middle" class="label">Alertmanager</text>

  <rect x="1175" y="332" width="150" height="56" rx="7" class="node"/>
  <text x="1250" y="366" text-anchor="middle" class="label">Slack</text>

  <!-- Runtime services -->
  <rect x="586" y="121" width="158" height="58" rx="7" class="node"/>
  <text x="665" y="156" text-anchor="middle" class="label">Backend</text>

  <rect x="872" y="83" width="150" height="58" rx="7" class="node"/>
  <text x="947" y="118" text-anchor="middle" class="label">Frontend</text>

  <rect x="586" y="346" width="158" height="58" rx="7" class="node"/>
  <text x="665" y="381" text-anchor="middle" class="label">Agent</text>

  <!-- Stores -->
  <g class="node">
    <path d="M270 281 a98 15 0 0 1 196 0 v48 a98 15 0 0 1 -196 0z"/>
    <path d="M270 281 a98 15 0 0 0 196 0" fill="none"/>
  </g>
  <text x="368" y="315" text-anchor="middle" class="label">PostgreSQL + pgvector</text>

  <g class="node">
    <path d="M270 431 a98 15 0 0 1 196 0 v48 a98 15 0 0 1 -196 0z"/>
    <path d="M270 431 a98 15 0 0 0 196 0" fill="none"/>
  </g>
  <text x="368" y="465" text-anchor="middle" class="label">TypeDB (ontology)</text>

  <!-- Runtime edges -->
  <path d="M198 105 C335 122 478 140 586 150" class="edge"/>
  <rect x="350" y="107" width="75" height="23" rx="3" class="tag"/>
  <text x="387" y="123" text-anchor="middle" class="tag-text">Webhook</text>

  <path d="M744 145 C790 132 832 121 872 112" class="edge-both"/>
  <rect x="770" y="102" width="77" height="23" rx="3" class="tag"/>
  <text x="808" y="118" text-anchor="middle" class="tag-text">REST + SSE</text>

  <path d="M586 164 C534 205 498 252 465 300" class="edge-both"/>
  <rect x="386" y="225" width="205" height="23" rx="3" class="tag"/>
  <text x="488" y="241" text-anchor="middle" class="tag-text">incidents · RCA · approvals · packages</text>

  <path d="M665 179 V346" class="edge-both"/>
  <rect x="676" y="251" width="151" height="23" rx="3" class="tag"/>
  <text x="751" y="267" text-anchor="middle" class="tag-text">analyze · RCA · snapshot</text>

  <path d="M744 156 C890 210 1030 290 1175 350" class="edge"/>
  <rect x="893" y="235" width="120" height="23" rx="3" class="tag"/>
  <text x="953" y="251" text-anchor="middle" class="tag-text">analysis summary</text>

  <path d="M586 375 C545 405 505 434 466 452" class="edge-both"/>
  <rect x="438" y="399" width="155" height="23" rx="3" class="tag"/>
  <text x="515" y="415" text-anchor="middle" class="tag-text">enrich · remediation</text>

  <path d="M368 344 C325 370 320 401 339 432" class="edge-dashed"/>
  <rect x="255" y="365" width="205" height="42" rx="3" class="tag"/>
  <text x="358" y="382" text-anchor="middle" class="tag-text">approved trace-v3 · package mirror</text>
  <text x="358" y="399" text-anchor="middle" class="tag-text">asynchronous CronJobs</text>

  <!-- Investigation agents -->
  <rect x="100" y="625" width="1200" height="150" rx="12" class="group"/>
  <text x="700" y="653" text-anchor="middle" class="title">Read-only investigation agents</text>

  <rect x="115" y="700" width="130" height="54" rx="7" class="node"/>
  <text x="180" y="724" text-anchor="middle" class="agent">RunAI Agent</text>
  <text x="180" y="744" text-anchor="middle" class="agent">workloads · quota</text>

  <rect x="260" y="700" width="130" height="54" rx="7" class="node"/>
  <text x="325" y="724" text-anchor="middle" class="agent">Kubernetes</text>
  <text x="325" y="744" text-anchor="middle" class="agent">Agent · events</text>

  <rect x="405" y="700" width="130" height="54" rx="7" class="node"/>
  <text x="470" y="724" text-anchor="middle" class="agent">Prometheus</text>
  <text x="470" y="744" text-anchor="middle" class="agent">Agent · metrics</text>

  <rect x="550" y="700" width="130" height="54" rx="7" class="node"/>
  <text x="615" y="724" text-anchor="middle" class="agent">Loki Agent</text>
  <text x="615" y="744" text-anchor="middle" class="agent">logs</text>

  <rect x="695" y="700" width="130" height="54" rx="7" class="node"/>
  <text x="760" y="724" text-anchor="middle" class="agent">Postgres</text>
  <text x="760" y="744" text-anchor="middle" class="agent">Agent · RCA store</text>

  <rect x="840" y="700" width="130" height="54" rx="7" class="node"/>
  <text x="905" y="724" text-anchor="middle" class="agent">System Agent</text>
  <text x="905" y="744" text-anchor="middle" class="agent">node · GPU</text>

  <rect x="985" y="700" width="130" height="54" rx="7" class="node"/>
  <text x="1050" y="724" text-anchor="middle" class="agent">Change Agent</text>
  <text x="1050" y="744" text-anchor="middle" class="agent">recent changes</text>

  <rect x="1130" y="700" width="130" height="54" rx="7" class="node"/>
  <text x="1195" y="724" text-anchor="middle" class="agent">LLM Provider</text>
  <text x="1195" y="744" text-anchor="middle" class="agent">optional inference</text>

  <path d="M603 404 C500 510 300 620 180 700" class="edge"/>
  <path d="M620 404 C535 510 390 620 325 700" class="edge"/>
  <path d="M638 404 C590 510 500 620 470 700" class="edge"/>
  <path d="M656 404 C640 510 625 620 615 700" class="edge"/>
  <path d="M674 404 C700 510 745 620 760 700" class="edge"/>
  <path d="M692 404 C765 510 865 620 905 700" class="edge"/>
  <path d="M710 404 C835 510 975 620 1050 700" class="edge"/>
  <path d="M728 404 C925 510 1110 620 1195 700" class="edge"/>
</svg>
