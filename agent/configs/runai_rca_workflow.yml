# NeMo Agent Toolkit workflow for Run:AI RCA.
#
# Custom functions are registered by the `runai_rca` nat.components entrypoint in
# app.nat_tools. The FastAPI service can delegate to this workflow with
# ENABLE_NAT_RUNTIME=true; when NAT is disabled it uses the same collectors
# directly as a deterministic fallback.

general:
  telemetry:
    enabled: false

functions:
  runai_context:
    _type: runai_context
  kubernetes_context:
    _type: kubernetes_context
  postgres_context:
    _type: postgres_context
  prometheus_context:
    _type: prometheus_context
  loki_context:
    _type: loki_context
  system_context:
    _type: system_context
  change_context:
    _type: change_context
  troubleshooting_cases:
    _type: troubleshooting_cases
  analysis_memory:
    _type: analysis_memory
  evidence_parallel:
    _type: parallel_executor
    description: Parallel read-only evidence collection for Run:ai RCA. RunAI owns API workload/project/queue context; Kubernetes owns workload and Run:ai control-plane pods/events/nodes; Prometheus owns queue/project GPU and pod metrics; Loki owns workload and runai/runai-backend logs; Postgres owns RCA memory health.
    tool_list:
      - runai_context
      - kubernetes_context
      - postgres_context
      - prometheus_context
      - loki_context
      - system_context
      - change_context
      - troubleshooting_cases
      - analysis_memory
    detailed_logs: true
    return_error_on_exception: true
  analysis_agent:
    _type: analysis_agent

workflow:
  _type: sequential_executor
  description: Run:ai RCA workflow with component evidence collection followed by the Analysis Agent.
  tool_list: [evidence_parallel, analysis_agent]
  return_error_on_exception: true
