# NeMo Agent Toolkit workflow variant with LiteLLM/OpenAI-compatible synthesis.
#
# The Agent materializes this file at runtime by replacing the
# __RUNAI_RCA_LLM_*__ placeholders from LLM_* environment variables. Keep the
# committed config free of real API keys.

general:
  telemetry:
    enabled: false

llms:
  litellm_llm:
    _type: litellm
    model_name: __RUNAI_RCA_LLM_MODEL__
    base_url: __RUNAI_RCA_LLM_BASE_URL__
    api_key: __RUNAI_RCA_LLM_API_KEY__
    request_timeout: __RUNAI_RCA_LLM_REQUEST_TIMEOUT_SECONDS__
    temperature: 0.0

functions:
  runai_context:
    _type: runai_context
  kubernetes_context:
    _type: kubernetes_context
  postgres_context:
    _type: postgres_context
  prometheus_context:
    _type: prometheus_context
  loki_context:
    _type: loki_context
  system_context:
    _type: system_context
  change_context:
    _type: change_context
  troubleshooting_cases:
    _type: troubleshooting_cases
  analysis_memory:
    _type: analysis_memory
  evidence_parallel:
    _type: parallel_executor
    description: Parallel read-only evidence collection for Run:ai RCA. RunAI owns API workload/project/queue context; Kubernetes owns workload and Run:ai control-plane pods/events/nodes; Prometheus owns queue/project GPU and pod metrics; Loki owns workload and runai/runai-backend logs; Postgres owns RCA memory health.
    tool_list:
      - runai_context
      - kubernetes_context
      - postgres_context
      - prometheus_context
      - loki_context
      - system_context
      - change_context
      - troubleshooting_cases
      - analysis_memory
    detailed_logs: true
    return_error_on_exception: true
  analysis_agent:
    _type: analysis_agent
  deterministic_rca:
    _type: sequential_executor
    description: Deterministic RCA path through the Analysis Agent.
    tool_list: [evidence_parallel, analysis_agent]
    return_error_on_exception: true
  final_synthesis:
    _type: react_agent
    description: LLM Analysis Agent with direct Run:ai RCA evidence tools.
    tool_names:
      - runai_context
      - kubernetes_context
      - postgres_context
      - prometheus_context
      - loki_context
      - system_context
      - change_context
      - troubleshooting_cases
      - analysis_memory
    llm_name: litellm_llm
    max_tool_calls: 8
    system_prompt: >
      You are the Run:ai RCA Analysis Agent inspired by KubeRCA. Produce the
      final analysis for the dashboard: root cause, impact, evidence, confidence,
      missing data, recommended manual actions, prevention, and similar incident
      reuse. Keep the response operational, evidence-backed, read-only, masked
      for sensitive values, and explicit about uncertainty. Treat RunAI context
      as Run:ai API workload, project, queue, quota, priority, and scheduling
      evidence, not a runai CLI shell session. Treat Kubernetes context as
      workload pod/event, Run:ai control-plane pod/event, node, and
      scheduling-blocker evidence. Treat Prometheus as queue/project GPU and pod
      metric evidence. Treat Loki as workload plus runai/runai-backend log
      evidence. Treat Postgres as RCA store, pgvector, feedback, comments, and
      memory health evidence. Treat System as node-level kernel/GPU/runtime
      evidence. Treat Change as the recent rollout/event timeline. Use similar
      incidents and feedback hints as memory only after checking live evidence.

workflow:
  _type: sequential_executor
  description: Run:ai RCA Analysis Dashboard workflow with deterministic collection followed by LiteLLM review.
  tool_list: [deterministic_rca, final_synthesis]
  return_error_on_exception: true
