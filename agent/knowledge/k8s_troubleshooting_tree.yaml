runbook_id: k8s_troubleshooting
root: incident_scope
sources:
  - "https://kubernetes.io/docs/tasks/debug/debug-application/debug-pods/"
  - "https://kubernetes.io/docs/tasks/debug/debug-application/debug-service/"
  - "https://kubernetes.io/docs/tasks/debug/debug-cluster/"
  - "https://docs.nvidia.com/datacenter/cloud-native/gpu-operator/latest/troubleshooting.html"
  - "https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/troubleshooting.html"
  - "https://run-ai-docs.nvidia.com/self-hosted/platform-management/runai-scheduler/scheduling/concepts-and-principles"
diagnostic_defaults:
  node_pressure: &node_pressure
    verify: "Read the target Node conditions and the incident-era eviction events; a healthy node reports Ready with no MemoryPressure, DiskPressure, or PIDPressure condition. If a condition changed first, trace the evicted pod or kubelet threshold; otherwise return to the pod-local failure."
    interpretation: "A pressure condition is causal only when it predates the affected pod's disruption on the same node; a rollout mentioning kubelet or device-plugin is not node-pressure evidence."
    avoid: "Do not attribute a GPU Operator or DaemonSet rollout to node pressure without the target node's condition transition and eviction evidence."
    probes:
      - &probe_node_pressure
        tool: k8s_read
        arguments_template: {kind: nodes, name: "{{node}}"}
        incident_time_window: incident
        expected_result_shape: "target Node conditions and pressure transition timestamps"
        supports_when: ["the target Node reports MemoryPressure, DiskPressure, or PIDPressure during the incident"]
        refutes_when: ["the target Node remains Ready with all pressure conditions False"]
        support_signal_any: ["MemoryPressure=True", "DiskPressure=True", "PIDPressure=True"]
        refute_signal_any: ["MemoryPressure=False", "DiskPressure=False", "PIDPressure=False"]
        source_group: kubernetes_api
    alternatives:
      - {family: workload_startup_error, reason: "A container can restart locally while the node stays healthy.", discriminator: "Compare the target node pressure transition with the container's terminated reason and previous logs."}
      - {family: gpu_hardware_error, reason: "GPU driver faults can make GPU workloads fail on one otherwise healthy node.", discriminator: "Check node-scoped NVIDIA XID or runtime-handler evidence; it is absent in a resource-pressure eviction."}
  runai_scheduling: &runai_scheduling
    verify: "Read the Run:ai scheduler event and the workload/project allocation state at the incident time. Healthy placement has a bound workload with quota headroom; a policy decision names preemption, reclaim, gang, queue, or fair-share before the pod remains pending."
    interpretation: "Run:ai policy is causal only when its scheduler/controller records the decision before Kubernetes placement or termination symptoms."
    avoid: "Do not call every Pending GPU pod a Run:ai quota incident; default-scheduler predicates and Kubernetes ResourceQuota are separate controls."
    probes:
      - &probe_runai_scheduling
        tool: k8s_describe
        arguments_template: {kind: pods, name: "{{pod}}", namespace: "{{namespace}}"}
        incident_time_window: incident
        expected_result_shape: "pod events including scheduler name and preemption or binding reason"
        supports_when: ["the event names runai-scheduler-default with a quota, gang, reclaim, or preemption reason"]
        refutes_when: ["the event names default-scheduler or a Kubernetes-only predicate"]
        support_signal_any: ["PreemptLowerPriority", "Reclaimed", "PodGroup", "runai-scheduler-default"]
        refute_signal_any: ["FailedScheduling", "default-scheduler"]
        source_group: kubernetes_api
    alternatives:
      - {family: k8s_scheduling_error, reason: "The same Pending state can be caused by Kubernetes taints, affinity, capacity, or ResourceQuota.", discriminator: "The pod event's scheduler name and first FailedScheduling predicate separate the two."}
      - {family: platform_lifecycle_change, reason: "A scheduler rollout can temporarily interrupt otherwise valid placement.", discriminator: "Confirm a scheduler/controller revision change at the incident time before treating policy as a steady-state constraint."}
  k8s_scheduling: &k8s_scheduling
    verify: "Read the complete FailedScheduling event and compare it with pod constraints and eligible nodes. Healthy placement has at least one node satisfying every predicate; abnormal placement has one first, exact predicate that explains all excluded candidates."
    interpretation: "Only the first scheduler predicate is the current blocker; total cluster capacity and later warning text do not override it."
    avoid: "Do not change requests, taints, affinity, or quotas until the complete predicate breakdown identifies which constraint fails first."
    probes:
      - &probe_k8s_scheduling
        tool: k8s_describe
        arguments_template: {kind: pods, name: "{{pod}}", namespace: "{{namespace}}"}
        incident_time_window: incident
        expected_result_shape: "scheduler name, pod requests, and complete FailedScheduling event"
        supports_when: ["a FailedScheduling event names the first unsatisfied predicate"]
        refutes_when: ["the pod is scheduled or a non-scheduler event predates Pending"]
        support_signal_any: ["FailedScheduling", "Unschedulable"]
        refute_signal_any: ["PodScheduled=True"]
        source_group: kubernetes_api
    alternatives:
      - {family: runai_scheduling_quota, reason: "Run:ai queue policy can produce an indistinguishable Pending workload.", discriminator: "Check whether runai-scheduler-default, rather than default-scheduler, emitted the first event."}
      - {family: k8s_storage_error, reason: "Unbound PVCs also keep pods Pending before application startup.", discriminator: "A PVC Binding or ProvisioningFailed event separates storage binding from placement predicates."}
  runai_control_plane: &runai_control_plane
    verify: "Correlate the affected Run:ai controller error with cluster-sync and backend health during the incident. Healthy controllers reconcile the same resource without retrying; an abnormal control-plane fault has a scoped reconcile, dependency, or authorization error before workload symptoms."
    interpretation: "A shared Run:ai control-plane error can fan out across workloads, while an isolated pod failure is usually downstream or unrelated."
    avoid: "Do not infer a platform outage from one workload event without a controller-side error for the same incident window."
    probes:
      - &probe_runai_control_plane
        tool: logql_query
        arguments_template: {query: '{namespace="runai"} |~ "(?i)(reconcile|cluster-sync|runai-backend|database error)"'}
        incident_time_window: incident
        expected_result_shape: "timestamped Run:ai controller log entries"
        supports_when: ["a Run:ai controller reports a reconcile or backend dependency failure during the incident"]
        refutes_when: ["no scoped controller failure exists while Kubernetes reports the first failure"]
        support_signal_any: ["reconcile failed", "cluster-sync", "database error"]
        refute_signal_any: ["reconcile succeeded"]
        source_group: loki
    alternatives:
      - {family: k8s_control_plane_error, reason: "API server or admission failures can make Run:ai reconciliation fail secondarily.", discriminator: "Check whether an apiserver, etcd, or webhook error predates the Run:ai retry."}
      - {family: platform_auth_error, reason: "Expired platform credentials can surface as controller reconciliation errors.", discriminator: "An Unauthorized or certificate validation reason identifies identity failure instead of backend availability."}
  k8s_control_plane: &k8s_control_plane
    verify: "Inspect the incident-era API server, etcd, or admission evidence and compare blast radius. Healthy control-plane calls succeed for unrelated namespaces; a real failure has a specific API, quorum, or webhook reason before affected workload events."
    interpretation: "Control-plane faults are shared dependencies, so timestamp and scope must establish them before labeling pod failures as cluster-wide."
    avoid: "Do not treat a pod's generic timeout as API-server evidence without a matching control-plane error or failed request."
    probes:
      - &probe_k8s_control_plane
        tool: k8s_read
        arguments_template: {kind: events, namespace: "{{namespace}}"}
        incident_time_window: incident
        expected_result_shape: "timestamped API, admission, or controller events"
        supports_when: ["a scoped event names apiserver, etcd, or admission webhook failure"]
        refutes_when: ["API operations succeed and no control-plane event predates the symptom"]
        support_signal_any: ["FailedCallingWebhookError", "EtcdMemberCommunicationError", "APIServerNotReady"]
        refute_signal_any: ["PodScheduled=True"]
        source_group: kubernetes_api
    alternatives:
      - {family: runai_control_plane_error, reason: "Run:ai controller outages can look like Kubernetes orchestration failures.", discriminator: "A Run:ai controller log failure without API/etcd evidence points to the platform control plane."}
      - {family: platform_auth_error, reason: "Admission and API requests can fail because the caller is unauthorized rather than unavailable.", discriminator: "Forbidden or Unauthorized with a named subject distinguishes identity/RBAC from availability."}
  workload_startup: &workload_startup
    verify: "Read current and previous container states plus the earliest pod event. Healthy startup reaches Running with successful init and probe transitions; abnormal startup has a typed waiting or terminated reason before application readiness."
    interpretation: "Startup evidence identifies kubelet, image, volume, init, probe, or process setup ownership before application runtime diagnosis."
    avoid: "Do not call a restart an application bug until previous-container state and startup events rule out image, volume, and node-side setup failures."
    probes:
      - &probe_workload_startup
        tool: k8s_describe
        arguments_template: {kind: pods, name: "{{pod}}", namespace: "{{namespace}}"}
        incident_time_window: incident
        expected_result_shape: "container waiting/terminated reasons, restart count, and pod events"
        supports_when: ["a typed container startup reason or startup event predates Running"]
        refutes_when: ["the container reached Running and only later application logs fail"]
        support_signal_any: ["CrashLoopBackOff", "ContainerCannotRun", "CreateContainerConfigError", "RunContainerError"]
        refute_signal_any: ["Running"]
        source_group: kubernetes_api
    alternatives:
      - {family: workload_runtime_error, reason: "A process can start successfully and fail later in its own code.", discriminator: "Running state followed by application traceback separates runtime from startup failure."}
      - {family: k8s_storage_error, reason: "Mount and attach failures prevent startup before a container process exists.", discriminator: "FailedMount or FailedAttachVolume preceding container creation identifies the storage path."}
  image_pull: &image_pull
    verify: "Read the exact image pull event and image reference. Healthy nodes resolve and authenticate the requested digest; abnormal events distinguish registry authorization, manifest, rate limit, and DNS/transport errors before container creation."
    interpretation: "ImagePullBackOff is a kubelet retry state, not a diagnosis; the original ErrImagePull text owns the next check."
    avoid: "Do not rebuild or retag an image until the exact registry response distinguishes an absent image from credentials or network reachability."
    probes:
      - &probe_image_pull
        tool: k8s_describe
        arguments_template: {kind: pods, name: "{{pod}}", namespace: "{{namespace}}"}
        incident_time_window: incident
        expected_result_shape: "ErrImagePull or ImagePullBackOff event with registry response"
        supports_when: ["the event names an image pull, manifest, authentication, or registry response"]
        refutes_when: ["the image was pulled and a later startup event is first"]
        support_signal_any: ["ImagePullBackOff", "ErrImagePull", "ErrImageNeverPull"]
        refute_signal_any: ["Pulled"]
        source_group: kubernetes_api
    alternatives:
      - {family: cluster_network_error, reason: "Registry DNS or transport failure can appear inside an ErrImagePull event.", discriminator: "A lookup, no-route, or timeout response separates network reachability from image metadata/auth."}
      - {family: platform_auth_error, reason: "Registry credential rejection can look like an image availability problem.", discriminator: "No basic auth credentials, authentication required, or insufficient_scope identifies authorization."}
  gpu_hardware: &gpu_hardware
    verify: "Correlate the affected node's NVIDIA/XID evidence with pod and driver state. Healthy nodes advertise GPUs and have no incident-era XID; a hardware or driver fault has a typed NVIDIA signal before workload failure."
    interpretation: "GPU symptoms are node-scoped only when the same node's driver, runtime, or XID evidence predates the workload failure."
    avoid: "Do not blame GPU hardware for a healthy node merely because a GPU workload failed or a device-plugin rollout occurred."
    probes:
      - &probe_gpu_hardware
        tool: logql_query
        arguments_template: {query: '{namespace="gpu-operator"} |~ "(?i)(NVRM: Xid|driver/library version mismatch|no runtime for \\"nvidia\\")"'}
        incident_time_window: incident
        expected_result_shape: "timestamped NVIDIA driver or GPU Operator diagnostic entries"
        supports_when: ["an XID or typed NVIDIA runtime/driver failure occurs on the affected node"]
        refutes_when: ["no typed NVIDIA fault exists and Kubernetes reports a different first failure"]
        support_signal_any: ["NVRM: Xid", "XidCriticalError", "DriverNotReady"]
        refute_signal_any: ["NVIDIA driver initialized"]
        source_group: loki
    alternatives:
      - {family: network_fabric_error, reason: "Distributed GPU jobs can fail because the fabric fails while each GPU remains healthy.", discriminator: "NCCL transport, IB, or NVLink errors without XID separate fabric from local GPU hardware."}
      - {family: node_kubelet_pressure, reason: "Node pressure can evict GPU workloads without a GPU fault.", discriminator: "A MemoryPressure/DiskPressure transition or eviction event separates pressure from XID evidence."}
  network_fabric: &network_fabric
    verify: "Find the first failed rank and compare NCCL bootstrap, transport, and local GPU evidence. Healthy ranks establish the selected interface and complete collectives; abnormal fabric faults have an IB/RDMA/NVLink/NCCL transport signature before downstream timeout."
    interpretation: "A collective timeout is downstream until a first rank, link, registration, or bootstrap error proves the fabric layer."
    avoid: "Do not classify a generic NCCL timeout as fabric failure when an earlier rank exit or CUDA OOM explains the collective abort."
    probes:
      - &probe_network_fabric
        tool: k8s_logs
        arguments_template: {pod: "{{pod}}", namespace: "{{namespace}}", previous: true, tail: 300}
        incident_time_window: incident
        expected_result_shape: "previous container logs containing NCCL rank and transport diagnostics"
        supports_when: ["logs identify NCCL transport, IB, RDMA, or NVLink failure before collective timeout"]
        refutes_when: ["logs identify an earlier application exit, CUDA OOM, or bootstrap credential failure"]
        support_signal_any: ["NCCL_SYSTEM_ERROR", "NCCL_INTERNAL_ERROR", "ibv_create_qp", "ibv_reg_mr"]
        refute_signal_any: ["CUDA out of memory", "Traceback (most recent call last)"]
        source_group: kubernetes_logs
    alternatives:
      - {family: workload_runtime_error, reason: "One crashed rank can make healthy peers report a collective timeout.", discriminator: "The first rank's traceback, exit code, or OOM before NCCL errors identifies runtime failure."}
      - {family: cluster_network_error, reason: "Pod DNS/CNI or service reachability can block NCCL bootstrap.", discriminator: "Sandbox, DNS, or NetworkPolicy evidence before rank connection separates cluster networking from fabric transport."}
  cluster_network: &cluster_network
    verify: "Check whether the failure is sandbox/CNI, DNS, Service endpoints, or policy/route after the affected pod is identified. Healthy peers resolve the same name and reach ready endpoints; the first failed network control point decides the owner."
    interpretation: "Network errors must be tied to the affected namespace, pod, and incident window; a generic timeout alone does not prove CNI or DNS failure."
    avoid: "Do not use a healthy healthcheck or an unscoped ping as proof that the failing pod's DNS, endpoints, policy, and route are healthy."
    probes:
      - &probe_cluster_network
        tool: k8s_describe
        arguments_template: {kind: pods, name: "{{pod}}", namespace: "{{namespace}}"}
        incident_time_window: incident
        expected_result_shape: "pod sandbox events and network-related status"
        supports_when: ["a sandbox, CNI, DNS, endpoint, or policy error is scoped to the pod"]
        refutes_when: ["the pod network is ready and a non-network event predates the failure"]
        support_signal_any: ["FailedCreatePodSandBox", "NetworkPluginNotReady", "NXDOMAIN"]
        refute_signal_any: ["PodReadyToStartContainers=True"]
        source_group: kubernetes_api
    alternatives:
      - {family: image_pull_error, reason: "Registry lookup failures look like cluster DNS failures but happen before the image is available.", discriminator: "ErrImagePull with a registry hostname separates image acquisition from running-pod connectivity."}
      - {family: network_fabric_error, reason: "RDMA/NCCL transport can fail after ordinary pod networking is healthy.", discriminator: "NCCL IB/RDMA diagnostics with successful DNS/endpoints identify the fabric path."}
  k8s_storage: &k8s_storage
    verify: "Read PVC, PV, VolumeAttachment, and pod events in order. Healthy objects bind, attach, and mount before container startup; the first failed Kubernetes object transition distinguishes provisioner, attachment, and node-side mount ownership."
    interpretation: "Kubernetes storage errors are object/control-path failures; backend health is only implicated when CSI or mount evidence names a server-side failure."
    avoid: "Do not delete PVCs, force detach, or restart stateful workloads before the exact binding, attachment, or mount transition is captured."
    probes:
      - &probe_k8s_storage
        tool: k8s_describe
        arguments_template: {kind: persistentvolumeclaims, name: "{{storage_claim}}", namespace: "{{namespace}}"}
        incident_time_window: incident
        expected_result_shape: "PVC status and provisioning or binding events"
        supports_when: ["PVC, provisioner, attachment, or mount events identify a Kubernetes storage object failure"]
        refutes_when: ["PVC is Bound and a backend server error is the first storage signal"]
        support_signal_any: ["ProvisioningFailed", "FailedAttachVolume", "FailedMount"]
        refute_signal_any: ["Bound"]
        source_group: kubernetes_api
    alternatives:
      - {family: storage_backend_error, reason: "An NFS, Ceph, or filesystem server can cause CSI/mount failures after objects are healthy.", discriminator: "A stale handle, read-only filesystem, server access denial, or backend latency signal separates backend from object state."}
      - {family: k8s_scheduling_error, reason: "Unbound Immediate PVCs leave pods Pending alongside ordinary scheduler errors.", discriminator: "A PVC binding event, rather than FailedScheduling predicate, identifies storage as the first blocker."}
  storage_backend: &storage_backend
    verify: "Compare Kubernetes object state with the exact backend/server error from the affected node or CSI path. Healthy PVC/PV objects can still fail if NFS/Ceph/filesystem access is stale, denied, read-only, or slow; confirm the backend signal before changing Kubernetes objects."
    interpretation: "This family is server-side storage health, not Kubernetes PVC/PV lifecycle: object failures are k8s_storage_error, while backend signatures explain failures after or beneath a valid object transition."
    avoid: "Do not treat a Bound PVC as proof that the backend is healthy, and do not use generic pod timeout text as storage-backend evidence."
    probes:
      - &probe_storage_backend
        tool: k8s_logs
        arguments_template: {pod: "{{pod}}", namespace: "{{namespace}}", previous: true, tail: 300}
        incident_time_window: incident
        expected_result_shape: "CSI or workload log lines with exact backend filesystem/server error"
        supports_when: ["logs contain a stale handle, read-only filesystem, server access denial, Ceph error, or I/O error"]
        refutes_when: ["logs show a Kubernetes PVC/PV object transition without backend server error"]
        support_signal_any: ["stale file handle", "read-only file system", "access denied", "Input/output error"]
        refute_signal_any: ["ProvisioningFailed", "FailedAttachVolume"]
        source_group: kubernetes_logs
    alternatives:
      - {family: k8s_storage_error, reason: "PVC binding, attachment, and CSI object errors can prevent the same pod from starting.", discriminator: "ProvisioningFailed, FailedAttachVolume, or FailedMount before backend error identifies the Kubernetes storage layer."}
      - {family: workload_startup_error, reason: "An application can fail its own file initialization without shared storage failure.", discriminator: "A container startup reason or local traceback without a CSI/backend signature identifies workload startup."}
  workload_runtime: &workload_runtime
    verify: "Read the previous-container logs and termination state from the first failing replica. Healthy startup followed by stable Running shifts ownership to the application; abnormal runtime has a traceback, signal, CUDA OOM, or exit code before peer/downstream errors."
    interpretation: "The first failing process/rank is causal; retries, CrashLoopBackOff, and peer timeouts are usually downstream observations."
    avoid: "Do not treat a probe command string or a later healthy retry as evidence against the incident-era process failure."
    probes:
      - &probe_workload_runtime
        tool: k8s_logs
        arguments_template: {pod: "{{pod}}", namespace: "{{namespace}}", previous: true, tail: 300}
        incident_time_window: incident
        expected_result_shape: "previous container logs from the failing process"
        supports_when: ["previous logs show a traceback, CUDA OOM, segmentation fault, or application exit before downstream errors"]
        refutes_when: ["container state shows a pre-runtime image, mount, or sandbox failure"]
        support_signal_any: ["Traceback (most recent call last)", "CUDA out of memory", "Segmentation fault"]
        refute_signal_any: ["ImagePullBackOff", "FailedMount", "FailedCreatePodSandBox"]
        source_group: kubernetes_logs
    alternatives:
      - {family: workload_startup_error, reason: "A container may never reach stable Running because setup fails first.", discriminator: "Typed kubelet startup events before application logs identify startup failure."}
      - {family: gpu_hardware_error, reason: "Driver or XID faults can surface as CUDA errors in application logs.", discriminator: "A node-scoped XID or NVIDIA runtime failure before the CUDA exception identifies GPU hardware."}
  observability: &observability
    verify: "Compare the exact alert query and raw series with direct Kubernetes/GPU state at the same incident timestamp. Healthy measurement has fresh source samples and matching live state; a mismatch must identify the first scrape, transport, storage, query, or dashboard hop that diverges."
    interpretation: "An observability incident is causal only when direct scoped state contradicts stale or missing derived telemetry; it does not prove a workload outage."
    avoid: "Do not restart a healthy workload or accept an unrelated healthcheck as evidence while the alert target and timestamp remain unverified."
    probes:
      - &probe_observability
        tool: promql_query
        arguments_template: {query: 'kube_pod_status_phase{namespace="{{namespace}}",pod="{{pod}}"}'}
        incident_time_window: incident
        expected_result_shape: "timestamped pod phase series for the alert target"
        supports_when: ["the target series is stale, missing, or contradicts direct target state"]
        refutes_when: ["fresh raw series matches direct target state at the alert timestamp"]
        support_signal_any: ["stale", "absent"]
        refute_signal_any: ["Running"]
        source_group: prometheus
    alternatives:
      - {family: platform_lifecycle_change, reason: "A rollout can create expected short telemetry gaps without a broken pipeline.", discriminator: "A controller/exporter revision change aligned with the gap separates lifecycle from persistent collection failure."}
      - {family: node_kubelet_pressure, reason: "A true node outage can make both metrics and workload state unhealthy.", discriminator: "Direct Node Ready/pressure evidence matching the alert separates real infrastructure failure from measurement error."}
  platform_auth: &platform_auth
    verify: "Capture the exact API/authentication response, authenticated subject, target resource, and credential validity without exposing secrets. Healthy credentials authenticate and authorize the scoped request; abnormal evidence distinguishes Unauthorized/authentication from Forbidden/RBAC authorization."
    interpretation: "Identity failures happen before authorization, while RBAC failures name an authenticated subject and denied verb/resource."
    avoid: "Do not broaden permissions or rotate credentials until the exact response class and target subject are confirmed."
    probes:
      - &probe_platform_auth
        tool: k8s_read
        arguments_template: {kind: events, namespace: "{{namespace}}"}
        incident_time_window: incident
        expected_result_shape: "scoped API event with authorization or authentication reason"
        supports_when: ["the same subject/request reports Forbidden, Unauthorized, token, or certificate validation failure"]
        refutes_when: ["the request is authorized and a later control-plane or workload failure occurs"]
        support_signal_any: ["Forbidden", "Unauthorized", "InvalidToken", "CertificateExpired"]
        refute_signal_any: ["Authorized"]
        source_group: kubernetes_api
    alternatives:
      - {family: k8s_control_plane_error, reason: "Unavailable API or admission services can fail requests before RBAC is evaluated.", discriminator: "A connection/quorum/webhook availability error instead of a named auth response identifies control-plane failure."}
      - {family: runai_control_plane_error, reason: "Run:ai backend/controller failures can reject or time out platform operations.", discriminator: "A Run:ai reconcile/backend error without a credential response identifies platform control-plane failure."}
  lifecycle: &lifecycle
    verify: "Correlate the first workload symptom with deployment, DaemonSet, Helm, scheduler, or platform revision timestamps. Healthy rollouts progress within their declared availability budget; abnormal evidence is a revision-specific failure that persists after the transition settles."
    interpretation: "A change is explanatory only when it precedes the symptom and matches its scope; coincidence with any recent rollout is not root cause evidence."
    avoid: "Do not roll back or blame node pressure merely because a rollout is mentioned; verify target-specific state before remediation."
    probes:
      - &probe_lifecycle
        tool: k8s_read
        arguments_template: {kind: pods, name: "{{pod}}", namespace: "{{namespace}}"}
        incident_time_window: incident
        expected_result_shape: "pod owner revision, creation time, and state transitions"
        supports_when: ["the affected pod revision changed immediately before the scoped symptom"]
        refutes_when: ["no relevant revision/change predates the symptom"]
        support_signal_any: ["ReplicaSetUpdated", "DaemonSetRollout"]
        refute_signal_any: ["Available=True"]
        source_group: kubernetes_api
    alternatives:
      - {family: workload_startup_error, reason: "A new revision can expose a real image, config, or process startup fault.", discriminator: "A typed startup event persisting after rollout stabilization identifies workload startup rather than expected lifecycle behavior."}
      - {family: observability_accuracy, reason: "Exporter/dashboard rollouts can create a measurement-only incident.", discriminator: "Live target state remaining healthy while the revised telemetry path is stale identifies observability."}
  insufficient: &insufficient
    verify: "Preserve one scoped pod/node event, state transition, previous log, and change timeline before choosing a failure family. Healthy evidence has a timestamped first control point; if none exists, the correct result remains insufficient evidence rather than a keyword-based diagnosis."
    interpretation: "Sparse or generic state alerts require target-verified evidence; probe command text, summaries, and unrelated healthy resources are not confirmation."
    avoid: "Do not promote a generic alert title, probe command, or healthy peer into root-cause evidence without an incident-era signal for the affected target."
    probes:
      - &probe_insufficient
        tool: k8s_describe
        arguments_template: {kind: pods, name: "{{pod}}", namespace: "{{namespace}}"}
        incident_time_window: incident
        expected_result_shape: "pod state, events, and container history for the alert target"
        supports_when: ["no incident-era typed event or state transition identifies a failure layer"]
        refutes_when: ["a scoped typed event identifies the first failure layer"]
        support_signal_any: ["Unknown"]
        refute_signal_any: ["FailedScheduling", "OOMKilled", "ImagePullBackOff", "FailedMount"]
        source_group: kubernetes_api
    alternatives:
      - {family: workload_startup_error, reason: "A missing describe/log history can conceal a local startup failure.", discriminator: "A typed container state or startup event identifies workload startup."}
      - {family: node_kubelet_pressure, reason: "Generic availability alerts can hide node pressure or eviction.", discriminator: "A target Node pressure transition or eviction event identifies the node path."}
principles:
  - "Preserve the oldest event, previous-container logs, and recent-change timeline before restarting anything."
  - "Use blast radius to choose the layer: one container, one pod, one node, one node pool, one namespace, or the whole cluster."
  - "Compare the affected target with a healthy peer; differences are usually more useful than a large unscoped log dump."
  - "A downstream timeout is a symptom: find the first failed rank, dependency, controller, or node by timestamp."
  - "Prefer checks that can disprove a hypothesis; do not accumulate only confirming keywords."
  - "Separate expected scheduler/lifecycle behavior from faults before applying remediation."
nodes:
  # The tree starts at the control point that failed, not at a presumed cause.
  # Branch order is intentional: preserve cluster-wide / node-wide evidence
  # before treating a pod-local error as an application problem.
  - id: incident_scope
    question: "What is the first failing control point in the incident timeline: scheduler, kubelet, storage, network, controller, or application? Healthy peers should not share the same first Warning event. Preserve the oldest scoped event, then follow the branch that owns it rather than the alert title."
    verify: "Build a short timeline: recent rollout/change, oldest Warning event, pod phase, node condition, and whether unrelated workloads share the failure."
    interpretation: "The same error text can be a pod-local failure or a cluster-wide symptom; blast radius decides which layer to investigate first."
    avoid: "Do not accept a component name in the alert title as the root cause without checking the event timeline."
    probes:
      - id: k8s_troubleshooting:incident_scope:p01
        tool: k8s_read
        arguments_template:
          kind: events
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "timestamped Warning events for the affected target"
        supports_when: ["oldest warning identifies a failed control point"]
        refutes_when: ["no scoped warning event or warning follows the downstream alert"]
        source_group: kubernetes_api
    match:
      always: true
    branches:
      - match:
          any: [apiserver, kube-apiserver, etcd, etcdserver, webhook, "admission webhook", "failed calling webhook", leaderelection]
          literal_any: ["failed calling webhook"]
        next: control_plane_failure
      # Alertmanager's node/control-plane/observability alerts often have no pod
      # label. Keep their signatures explicit so they enter the right runbook
      # branch instead of falling into a pod-only diagnosis.
      - match:
          any: ["KubeAPIDown", "KubeControllerManagerDown", "KubeSchedulerDown", "etcd quorum", "etcd member"]
        next: control_plane_failure
      - match:
          any: [runai-backend, cluster-sync, "runai scheduler unavailable", "database error", "reconcile failed"]
        next: runai_control_plane_failure
      - match:
          any: ["RunaiSchedulerDown", "RunaiBackendDown", "runai controller unavailable", "runai platform alert"]
        next: runai_control_plane_failure
      - match:
          any: ["nvrm: xid", "xidcriticalerror", "fallen off the bus", "failed to initialize nvml", "driver/library version mismatch", "no runtime for \"nvidia\"", "nvidia.com/gpu: 0", "system not yet initialized", clusterpolicy]
          literal_any: ["no runtime for \"nvidia\"", "nvidia.com/gpu: 0"]
        next: gpu_stack_failure
      - match:
          any: ["nccl warn", "nccl error", "collective operation timeout", "allreduce timed out", infiniband, rdma, "ibv_reg_mr failed", "ibv_create_qp failed", nvlink]
        next: distributed_training_failure
      - match:
          any: [diskpressure, memorypressure, pidpressure, notready, "node is not ready", "node_ready: false", "node ready=false"]
        next: node_not_ready
      - match:
          any: ["KubeNodeNotReady", "NodeFilesystemSpaceFillingUp", "NodeMemoryPressure", "NodePIDPressure", "kube_node_status_condition"]
        next: node_not_ready
      - match:
          any: ["runai-scheduler-default", "pod group", podgroup, "gang schedul", fairshare, "over-quota", "over quota", reclaimed, preemptor, "failed to bind"]
        next: runai_scheduling_failure
      - match:
          any: [forbidden, unauthorized, "cannot list resource", "cannot create resource", saml, oidc, "invalid token", "certificate has expired"]
        next: authorization_failure
      - match:
          any: ["no metrics", "metrics missing", "stale metrics", "thanos-receive", "dcgm_fi_dev", "target down", "dashboard shows"]
        next: observability_failure
      - match:
          any: ["PrometheusTargetMissing", "PrometheusTargetDown", "ThanosReceiveDown", "KubeStateMetricsDown", "DCGMExporterDown"]
        next: observability_failure
      - match:
          any: [failedmount, failedattachvolume, "unable to attach or mount volumes", "unbound immediate persistentvolumeclaims", volumebinding, provisioningfailed]
        next: storage_failure
      - match:
          any: ["stale file handle", "read-only file system", "nfs server", cephfs, "ceph health", "input/output error", "mount access denied", "storage latency"]
        next: storage_backend_failure
      - match:
          any: ["failed to create pod sandbox", "failed to setup network for sandbox", "cni plugin", "network plugin", ipam]
        next: pod_network_failure
      - match:
          any: [imagepullbackoff, errimagepull, "failed to pull image", "pull access denied", "manifest unknown", toomanyrequests]
        next: image_pull_failure
      - match:
          any: [pending, failedscheduling, unschedulable]
        next: pod_or_node_symptom
      - match:
          any: ["init:crashloopbackoff", "init:errimagepull", "init container", "initcontainer"]
        next: init_container_failure
      - match:
          any: ["startup probe failed", "liveness probe failed", "readiness probe failed"]
        next: probe_failure
      - match:
          any: [crashloopbackoff, "back-off restarting", oomkilled, runcontainererror, containercannotrun, starterror, createcontainerconfigerror, createcontainererror]
        next: pod_crashing
      - match:
          any: ["no such host", nxdomain, "no endpoints available", "connection refused", "networkpolicy", "i/o timeout"]
        next: service_connectivity_failure
      - match:
          any: ["traceback", "panic:", "segmentation fault", importerror, "permission denied", "exit code 1"]
        next: workload_runtime_failure
      - match:
          any: [rollout, rollingupdate, "helm upgrade", "revision change", "container creating"]
        next: rollout_or_lifecycle
      - match:
          always: true
        next: insufficient_k8s_evidence

  - id: pod_or_node_symptom
    question: "Which typed Kubernetes symptom occurs first for the affected target: Pending, image pull, mount, sandbox, restart, probe, or node state? Healthy state has no earlier Warning for this pod or node. Use the first timestamped state transition to select the next branch."
    verify: "Start with the oldest Warning event and the pod/node state at that timestamp; do not treat the alert title as the cause."
    interpretation: "Classify the first failing control point before inspecting every subsystem."
    avoid: "Do not restart or reschedule the workload before preserving Events and previous-container logs."
    match:
      any:
        - pending
        - failedscheduling
        - unschedulable
        - schedulinggated
        - crashloopbackoff
        - back-off restarting
        - oomkilled
        - starterror
        - createcontainerconfigerror
        - createcontainererror
        - runcontainererror
        - containercannotrun
        - imagepullbackoff
        - errimagepull
        - failedmount
        - failedattachvolume
        - notready
        - ready=false
        - readiness probe failed
        - liveness probe failed
        - failed to create pod sandbox
    branches:
      - match:
          any: [pending, failedscheduling, unschedulable, schedulinggated]
          fields:
            pod_phase: Pending
        next: pod_pending
      - match:
          any: [crashloopbackoff, back-off restarting, oomkilled, backoff, starterror, createcontainerconfigerror, createcontainererror]
        next: pod_crashing
      - match:
          any: [imagepullbackoff, errimagepull, failed to pull image]
        next: image_pull_failure
      - match:
          any: [failedmount, failedattachvolume, unable to attach or mount volumes]
        next: volume_failure
      - match:
          any: [notready, ready=false, node is not ready]
        next: node_not_ready
      - match:
          any: [readiness probe failed, liveness probe failed, startup probe failed]
        next: probe_failure
      - match:
          any: [failed to create pod sandbox, cni plugin, network plugin]
        next: pod_network_failure

  - id: pod_pending
    question: "Which prerequisite keeps this exact pod Pending: scheduler placement, PVC binding, image retrieval, or node readiness? A healthy Pending-to-Running transition has a successful scheduler and bound prerequisites. Read the first event and pursue its named owner rather than guessing from total cluster capacity."
    verify: "Read `kubectl describe pod` Events and identify the scheduler name plus the complete `0/N nodes are available` predicate breakdown."
    interpretation: "Pending is a placement or prerequisite problem; the first failed predicate is the next diagnostic branch."
    avoid: "Do not increase GPU quota until the event rules out taints, affinity, PVC binding, and topology constraints."
    probes:
      - id: k8s_troubleshooting:pod_pending:p01
        tool: k8s_describe
        arguments_template:
          kind: pods
          name: "{{pod}}"
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "pod scheduler name, resource requests, and complete FailedScheduling event"
        supports_when: ["a scheduling or PVC-binding event predates the Pending state"]
        refutes_when: ["the pod is not Pending or has no scheduler/prerequisite event"]
        source_group: kubernetes_api
    match:
      any: [pending, failedscheduling, unschedulable]
      fields:
        pod_phase: Pending
    branches:
      - match:
          any:
            - failedscheduling
            - unschedulable
            - insufficient cpu
            - insufficient memory
            - insufficient nvidia.com/gpu
            - untolerated taint
            - node affinity
            - node selector
            - topology spread
            - 0/
        next: pending_failed_scheduling
      - match:
          any:
            - unbound immediate persistentvolumeclaims
            - volumebinding
            - persistentvolumeclaim
            - storageclass
            - provisioningfailed
        next: pending_volume_binding
      - match:
          any: [imagepullbackoff, errimagepull, failed to pull image]
        next: image_pull_failure
      - match:
          any: [notready, node is not ready, ready=false]
        next: node_not_ready

  - id: pending_failed_scheduling
    question: "Does the earliest Pending event contain a complete FailedScheduling predicate from kube-scheduler? Healthy placement either schedules or identifies no blocking predicate. If present, split capacity, taint, affinity, topology, quota, and unknown predicates; otherwise check PVC binding and other prerequisites."
    match:
      any:
        - failedscheduling
        - unschedulable
        - insufficient nvidia.com/gpu
        - untolerated taint
        - node affinity
        - node selector
        - topology spread
        - 0/
      fields:
        event_reason: FailedScheduling
    branches:
      - match:
          any: ["insufficient cpu", "insufficient memory", "insufficient nvidia.com/gpu"]
        next: scheduling_capacity
      - match:
          any: ["untolerated taint", "had taint"]
        next: scheduling_taint
      - match:
          any: ["node affinity", "node selector", "didn't match node selector", "didn't match pod affinity"]
        next: scheduling_affinity
      - match:
          any: ["topology spread", "maxskew", "topologyspreadconstraint"]
        next: scheduling_topology
      - match:
          any: ["exceeded quota", "resourcequota"]
        next: scheduling_quota
      - match:
          any: [failedscheduling, unschedulable, "0/"]
        next: scheduling_unknown_predicate

  - id: scheduling_capacity
    <<: *k8s_scheduling
    question: "After taints, affinity, topology, and selectors are applied, does any eligible node lack the requested CPU, memory, or GPU? Healthy placement needs one node with allocatable headroom for the exact request. If capacity is available, return to the first non-capacity predicate instead of changing requests."
    verify: "Compare the pod's requests with allocatable and already-requested CPU, memory, and GPU only on nodes that pass selector, affinity, taint, and topology filters."
    interpretation: "This is real capacity pressure only after eligibility filters are applied; total cluster free capacity is not placement capacity."
    avoid: "Do not drain healthy nodes or lower requests blindly; confirm whether a matching node pool can ever satisfy the request."
    probes:
      - id: k8s_troubleshooting:scheduling_capacity:p01
        tool: k8s_read
        arguments_template:
          kind: nodes
          name: "{{node}}"
        incident_time_window: incident
        expected_result_shape: "target node allocatable CPU, memory, and nvidia.com/gpu capacity"
        supports_when: ["the selected node lacks a requested allocatable resource"]
        refutes_when: ["the target node has capacity and the event identifies a different predicate"]
        support_signal_any: ["Insufficient cpu", "Insufficient memory", "Insufficient nvidia.com/gpu"]
        refute_signal_any: ["PodScheduled=True"]
        source_group: kubernetes_api
    match:
      any: ["insufficient cpu", "insufficient memory", "insufficient nvidia.com/gpu"]
    conclusion:
      family: k8s_scheduling_error
      summary: "An eligible node lacks a resource requested by the pod."
      confidence: "high only when the complete FailedScheduling predicate names the missing resource for this pod"
      disconfirm:
        - "A taint, affinity, PVC, quota, or Run:ai policy predicate—not resource capacity—is the first failed condition."
      next_steps:
        - "Capture the full FailedScheduling predicate breakdown and the pod resource requests."
        - "Compare requests against allocatable capacity on eligible nodes, including GPU fragmentation on the target pool."
        - "Add matching capacity, release the blocking allocation, or resize the request only after validating the workload requirement."

  - id: scheduling_taint
    <<: *k8s_scheduling
    probes: [{<<: *probe_k8s_scheduling, id: k8s_troubleshooting:scheduling_taint:p01}]
    question: "Does the first scheduler event name an untolerated taint on otherwise eligible nodes? Healthy placement has a matching toleration with the same key, value, and effect. If tolerations match, continue with the next predicate rather than removing a protective taint."
    verify: "Compare every taint on candidate nodes with the pod's tolerations, including effect (NoSchedule/NoExecute) and value."
    interpretation: "The scheduler found nodes, but policy deliberately excludes this pod."
    avoid: "Do not remove a taint cluster-wide; it often protects dedicated, unhealthy, or GPU-specialized nodes."
    match:
      any: ["untolerated taint", "had taint"]
    conclusion:
      family: k8s_scheduling_error
      summary: "A node taint excludes the pod from otherwise candidate nodes."
      confidence: "high only when FailedScheduling names an untolerated taint on otherwise eligible nodes"
      disconfirm:
        - "The pod tolerates the taint or another scheduler predicate excludes candidates first."
      next_steps:
        - "Read the exact taint/effect in the FailedScheduling event and list tolerations from the pod spec."
        - "Add the narrow matching toleration only when this workload is allowed on that node class."
        - "Otherwise change the selector/node pool or leave the taint intact."

  - id: scheduling_affinity
    <<: *k8s_scheduling
    probes: [{<<: *probe_k8s_scheduling, id: k8s_troubleshooting:scheduling_affinity:p01}]
    question: "Do the pod's required selector, affinity, or anti-affinity rules leave zero eligible nodes? Healthy candidate nodes satisfy each required term, not merely total capacity. Identify the first zero-match rule; if one node matches, investigate the next scheduler predicate."
    verify: "List the pod's nodeSelector, required node/pod affinity, and anti-affinity; then count nodes satisfying each constraint one by one."
    interpretation: "The request may fit the cluster, but the declared placement contract leaves no eligible node."
    avoid: "Do not weaken anti-affinity without checking whether it protects availability or distributed-training topology."
    match:
      any: ["node affinity", "node selector", "didn't match node selector", "didn't match pod affinity"]
    conclusion:
      family: k8s_scheduling_error
      summary: "Required selector or affinity rules eliminate every candidate node."
      confidence: "high only when the event names the selector or required affinity mismatch and node labels confirm it"
      disconfirm:
        - "A matching node exists and resource, taint, topology, or volume evidence blocks placement first."
      next_steps:
        - "Identify the first selector or required-affinity term with zero matching nodes."
        - "Correct stale labels or relax only the constraint that is not a workload requirement."
        - "Re-check placement after the change rather than assuming cluster capacity is sufficient."

  - id: scheduling_topology
    <<: *k8s_scheduling
    probes: [{<<: *probe_k8s_scheduling, id: k8s_troubleshooting:scheduling_topology:p01}]
    question: "Does current distribution violate this pod's topology key, maxSkew, or whenUnsatisfiable policy? Healthy placement can add the pod without exceeding the declared skew across labeled domains. If labels and skew are valid, continue to the next scheduler predicate."
    verify: "Inspect topology keys, maxSkew, whenUnsatisfiable, and the current pod distribution across domains."
    interpretation: "Capacity exists, but placement would violate the workload's requested failure-domain balance."
    avoid: "Do not change maxSkew before checking missing node labels or an empty topology domain."
    match:
      any: ["topology spread", "maxskew", "topologyspreadconstraint"]
    conclusion:
      family: k8s_scheduling_error
      summary: "A topology spread constraint prevents the pod from being placed."
      confidence: "high only when FailedScheduling names the topology spread constraint and current skew exceeds its limit"
      disconfirm:
        - "The topology constraint is satisfied or another scheduler predicate appears earlier."
      next_steps:
        - "Verify that every intended node has the topology label and that enough domains are available."
        - "Correct label drift or expand the eligible node pool first."
        - "Relax maxSkew/whenUnsatisfiable only if the workload can safely accept the weaker distribution."

  - id: scheduling_quota
    <<: *k8s_scheduling
    question: "Does the namespace ResourceQuota reject the exact requested CPU, memory, GPU, pod, or storage dimension? Healthy quota has headroom for that dimension at admission time. If it does, distinguish this Kubernetes quota from a Run:ai queue policy before changing either budget."
    verify: "Read the quota object and compare hard versus used CPU, memory, GPU, pod-count, and storage limits in the pod namespace."
    interpretation: "The request is valid for nodes but not permitted for this namespace's budget."
    avoid: "Do not confuse Kubernetes ResourceQuota with Run:ai project quota; they are enforced by different control paths."
    probes:
      - id: k8s_troubleshooting:scheduling_quota:p01
        tool: k8s_read
        arguments_template:
          kind: resourcequotas
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "namespace ResourceQuota hard and used dimensions"
        supports_when: ["the event's resource dimension is exhausted in quota status.used"]
        refutes_when: ["no relevant ResourceQuota exists or the cited dimension has remaining headroom"]
        support_signal_any: ["ExceededQuota"]
        refute_signal_any: ["PodScheduled=True"]
        source_group: kubernetes_api
    match:
      any: ["exceeded quota", "resourcequota"]
    conclusion:
      family: k8s_scheduling_error
      summary: "A Kubernetes ResourceQuota blocks the pod request."
      confidence: "high only when the admission error identifies the exceeded ResourceQuota and requested dimension"
      disconfirm:
        - "Quota has headroom or scheduling, image, storage, or Run:ai policy fails before quota admission."
      next_steps:
        - "Capture the exact quota dimension that is exhausted."
        - "Release stale namespace usage or adjust the approved quota budget."
        - "If the event came from runai-scheduler rather than default-scheduler, continue on the Run:ai quota path instead."

  - id: scheduling_unknown_predicate
    <<: *k8s_scheduling
    probes: [{<<: *probe_k8s_scheduling, id: k8s_troubleshooting:scheduling_unknown_predicate:p01}]
    question: "Is the complete FailedScheduling predicate missing or outside the known branches? Healthy diagnosis preserves the scheduler name and full event before remediation. Capture that exact text, then decide whether it is a Kubernetes predicate, PVC prerequisite, or Run:ai policy rather than inferring from Pending alone."
    verify: "Preserve the full event message and scheduler name; inspect admission and scheduler logs only after the event is captured."
    interpretation: "The pod is unschedulable, but the current evidence does not justify selecting a specific predicate."
    match:
      any: [failedscheduling, unschedulable, "0/"]
    conclusion:
      family: k8s_scheduling_error
      summary: "The pod is Pending because kube-scheduler could not place it on any node."
      confidence: "provisional until the full FailedScheduling predicate is captured"
      disconfirm:
        - "The first blocking event is PVC binding, image pull, sandbox creation, or a non-scheduler error."
      next_steps:
        - "Read the FailedScheduling event breakdown in kubectl describe pod."
        - "Compare requested CPU, memory, GPU, taints, tolerations, selectors, and affinity against schedulable nodes."
        - "Fix the blocking predicate or add capacity in the matching node pool."

  - id: pending_volume_binding
    <<: *k8s_storage
    question: "Did PVC binding or the StorageClass provisioner become the first prerequisite failure for this Pending pod? Healthy claims become Bound and provisioned before scheduling completes. If the claim is already Bound, return to scheduler, attachment, or mount evidence instead of treating storage as causal."
    probes:
      - id: k8s_troubleshooting:pending_volume_binding:p01
        tool: k8s_read
        arguments_template:
          kind: persistentvolumeclaims
          namespace: "{{namespace}}"
          name: "{{storage_claim}}"
        incident_time_window: incident
        expected_result_shape: "namespace PVC phase, StorageClass, and provisioning events"
        supports_when: ["a referenced PVC remains Pending or reports a provisioning failure"]
        refutes_when: ["referenced PVCs are Bound before the pod became Pending"]
        support_signal_any: ["Pending", "ProvisioningFailed"]
        refute_signal_any: ["Bound"]
        source_group: kubernetes_api
    match:
      any:
        - unbound immediate persistentvolumeclaims
        - persistentvolumeclaim
        - storageclass
        - volumebinding
        - provisioningfailed
    conclusion:
      family: k8s_storage_error
      summary: "The pod is Pending because Kubernetes cannot bind or provision its volume."
      confidence: "high only when PVC or provisioner events show the claim cannot bind or provision during the incident"
      disconfirm:
        - "The claim is Bound before the incident and a scheduler, attachment, mount, or application failure occurs first."
      next_steps:
        - "Run kubectl describe pvc and read the provisioning or binding event."
        - "Confirm the StorageClass exists and its provisioner is healthy."
        - "Check storage capacity and topology constraints for the requested volume."

  - id: storage_failure
    question: "Does the first storage event occur before any container process starts, and does it name binding, attachment, or mounting? Healthy storage progresses PVC to PV to attachment to mount in order. Follow that failed verb; backend/server symptoms need the separate storage-backend branch."
    verify: "Separate PVC binding (scheduler/provisioner), volume attach (controller/cloud), and mount (node CSI/kubelet) using the exact Event reason."
    interpretation: "Storage failures occur before application code executes; the failing verb identifies the owner to inspect."
    avoid: "Do not delete a PVC or restart a stateful workload before confirming attachment state and backend health."
    probes:
      - id: k8s_troubleshooting:storage_failure:p01
        tool: k8s_describe
        arguments_template:
          kind: pod
          name: "{{pod}}"
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "Pod event reasons including binding, attach, or mount failure"
        supports_when: ["FailedAttachVolume, FailedMount, or provisioning event precedes workload failure"]
        refutes_when: ["volume events are absent and the container fails after successful mount"]
        support_signal_any: ["FailedAttachVolume", "FailedMount", "ProvisioningFailed"]
        refute_signal_any: ["volume mounted successfully"]
        source_group: kubernetes_api
    match:
      any: [failedmount, failedattachvolume, "unable to attach or mount volumes", "unbound immediate persistentvolumeclaims", volumebinding, provisioningfailed]
    branches:
      - match:
          any: ["unbound immediate persistentvolumeclaims", volumebinding, provisioningfailed, storageclass]
        next: pending_volume_binding
      - match:
          any: [failedattachvolume, "multi-attach error", attachvolume]
        next: volume_attach_failure
      - match:
          any: [failedmount, "mountvolume.setup failed", "unable to attach or mount volumes"]
        next: volume_mount_failure

  - id: volume_attach_failure
    <<: *k8s_storage
    probes: [{<<: *probe_k8s_storage, id: k8s_troubleshooting:volume_attach_failure:p01}]
    question: "Did VolumeAttachment or CSI controller evidence fail before the volume reached the selected node? Healthy volumes attach once to the intended node and then proceed to mount. If attachment succeeds, inspect node-side mount or backend access rather than force-detaching."
    verify: "Check VolumeAttachment, the CSI controller log, the selected node/zone, and whether the volume remains attached elsewhere."
    interpretation: "Attach is a controller/backend operation, so kubelet logs alone cannot prove the cause."
    avoid: "Do not force-detach a volume until the prior node is confirmed unreachable or detached; that risks data corruption."
    match:
      any: [failedattachvolume, "multi-attach error", attachvolume]
    conclusion:
      family: k8s_storage_error
      summary: "The volume cannot attach to the selected node."
      confidence: "high only when FailedAttachVolume or CSI controller events identify the same volume and node"
      disconfirm:
        - "The volume attaches successfully or binding, node readiness, or mount execution fails first."
      next_steps:
        - "Identify the active VolumeAttachment and the node holding the volume."
        - "Resolve zone/topology mismatch or safely detach the stale attachment."
        - "Validate CSI controller and backend health before re-scheduling the workload."

  - id: volume_mount_failure
    <<: *k8s_storage
    probes: [{<<: *probe_k8s_storage, id: k8s_troubleshooting:volume_mount_failure:p01}]
    question: "After the volume attaches, did kubelet or the CSI node plugin report the first mount failure for this node and volume? Healthy mounts expose the volume before container creation. Use the exact mount error to distinguish credentials, filesystem, NFS/Ceph backend access, and object lifecycle problems."
    verify: "Read the full mount error and inspect the CSI node pod plus node kernel logs for the target volume."
    interpretation: "The volume may be provisioned and attached correctly while node-side credentials, filesystem, or network access still prevent a mount."
    avoid: "Do not format or recreate a persistent volume to recover a mount error."
    match:
      any: [failedmount, "mountvolume.setup failed", "unable to attach or mount volumes"]
    conclusion:
      family: k8s_storage_error
      summary: "Node-side CSI or kubelet mounting prevents the pod from starting."
      confidence: "high only when FailedMount or CSI node logs identify the target volume after attachment"
      disconfirm:
        - "The volume mounts successfully or an earlier attach, binding, credentials, or sandbox failure explains startup."
      next_steps:
        - "Capture the mount command/error, CSI node logs, and backend reachability from the affected node."
        - "Fix credentials, filesystem, export policy, or node connectivity indicated by that error."
        - "Retry only after the VolumeAttachment/PVC state is healthy."

  - id: pod_crashing
    question: "What typed state ended the previous container instance before the restart: OOMKilled, exit, probe, image, mount, or creation failure? Healthy containers reach stable Running without an earlier terminated reason. Read previous state and logs first, then follow the cause that predates CrashLoopBackOff."
    probes:
      - id: k8s_troubleshooting:pod_crashing:p01
        tool: k8s_describe
        arguments_template:
          kind: pods
          name: "{{pod}}"
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "container current/last state, exit code, restart count, and Events"
        supports_when: ["last terminated state or restart event precedes the alert"]
        refutes_when: ["the pod has no restart/termination signal in the incident window"]
        support_signal_any: ["CrashLoopBackOff", "OOMKilled", "Back-off restarting"]
        refute_signal_any: ["restart count: 0"]
        source_group: kubernetes_api
    match:
      any: [crashloopbackoff, back-off restarting, backoff, oomkilled, starterror, createcontainerconfigerror, createcontainererror, runcontainererror, containercannotrun]
    branches:
      - match:
          any: [oomkilled, out of memory, exit code 137]
          fields:
            terminated_reason: OOMKilled
        next: crash_oomkilled
      - match:
          any: [runcontainererror, containercannotrun, executable file not found, starterror, createcontainerconfigerror, createcontainererror]
        next: container_start_error
      - match:
          any: [startup probe failed, liveness probe failed, readiness probe failed]
        next: probe_failure
      - match:
          any: [crashloopbackoff, back-off restarting, backoff]
        next: crashloop_backoff

  - id: init_container_failure
    <<: *workload_startup
    question: "Is an init container the first component failing before every application container remains blocked? Healthy init containers complete sequentially and hand off to the app. Capture its previous state and logs; if init succeeds, continue with the application container's first failure."
    verify: "Inspect each init container's state, previous logs, and Events; identify the first one that did not complete."
    interpretation: "The main container has not started, so its logs and probes are downstream noise."
    avoid: "Do not debug the application container until every required init container completes."
    probes:
      - id: k8s_troubleshooting:init_container_failure:p01
        tool: k8s_logs
        arguments_template:
          pod: "{{pod}}"
          namespace: "{{namespace}}"
          tail: 200
        incident_time_window: incident
        expected_result_shape: "scoped pod log tail containing the first init-container error when retained"
        supports_when: ["an init failure appears before the main container starts"]
        refutes_when: ["all init containers completed and the first error is in the main container"]
        support_signal_any: ["Init:CrashLoopBackOff", "Init:ErrImagePull"]
        refute_signal_any: ["Initialized=True"]
        source_group: workload_logs
    match:
      any: ["init:crashloopbackoff", "init:errimagepull", "init container", initcontainer]
    conclusion:
      family: workload_startup_error
      summary: "An init container is blocking workload startup."
      confidence: "high only when an init-container state, previous log, or event fails before the main container starts"
      disconfirm:
        - "All init containers completed and the earliest failing signal belongs to the main container or platform."
      next_steps:
        - "Read logs from the failing init container, including `--previous` when it restarted."
        - "Route image-pull, mount, permission, and exit-code errors to their matching lower-level evidence."
        - "Verify the init container completes once before judging the main workload."

  - id: crash_oomkilled
    <<: *workload_startup
    probes: [{<<: *probe_workload_startup, id: k8s_troubleshooting:crash_oomkilled:p01}]
    question: "Does the previous container state record OOMKilled before the restart, and was memory use near its cgroup limit? Healthy termination has a deliberate exit or no forced kill. If no typed OOM state exists, investigate the actual exit, probe, node pressure, or GPU/runtime error instead."
    match:
      any: [oomkilled, out of memory, exit code 137]
      fields:
        terminated_reason: OOMKilled
    conclusion:
      family: workload_runtime_error
      summary: "The workload restarts because the target container exceeded its memory limit and was OOMKilled; CrashLoopBackOff is downstream."
      confidence: "high when the target container's terminated reason is OOMKilled; distinguish a node-wide OOM only with separate incident-era node evidence"
      disconfirm:
        - "The termination reason is different or an application exit, probe, or node eviction occurs first."
      next_steps:
        - "Compare `resources.limits.memory` with the configured and observed working set; a configured target above the limit is a direct sizing error."
        - "Raise the limit above legitimate usage with headroom, or reduce the working set and fix any leak; align the request with realistic steady usage for scheduling."
        - "Roll out the change and verify OOMKilled, restart-count growth, and CrashLoopBackOff stop recurring."

  - id: crashloop_backoff
    <<: *workload_startup
    question: "Does the container reach process start and repeatedly exit with the same incident-era reason? Healthy startup remains Running after initialization. Compare previous logs and exit code with image, mount, probe, and node evidence; follow the earliest typed failure rather than the BackOff retry."
    probes:
      - id: k8s_troubleshooting:crashloop_backoff:p01
        tool: k8s_logs
        arguments_template:
          pod: "{{pod}}"
          namespace: "{{namespace}}"
          tail: 200
        incident_time_window: incident
        expected_result_shape: "scoped application log tail around the restart"
        supports_when: ["an application error or explicit exit cause precedes BackOff"]
        refutes_when: ["logs contain no process failure and pod state identifies a platform-side failure first"]
        support_signal_any: ["CrashLoopBackOff", "Back-off restarting failed container"]
        refute_signal_any: ["ImagePullBackOff", "FailedMount"]
        source_group: workload_logs
    match:
      any: [crashloopbackoff, back-off restarting, backoff]
    conclusion:
      family: workload_startup_error
      summary: "The workload process starts and exits repeatedly, causing CrashLoopBackOff."
      confidence: "provisional until previous-container logs or termination state identify the first process failure"
      disconfirm:
        - "OOMKilled, probes, image pull, mount, or node-side failure predates process exit."
      next_steps:
        - "Read current and previous container logs for the first application error."
        - "Check command, args, env, ConfigMap, Secret, and recent image changes."
        - "Fix the workload-level crash before changing platform scheduling."

  - id: container_start_error
    <<: *workload_startup
    probes: [{<<: *probe_workload_startup, id: k8s_troubleshooting:container_start_error:p01}]
    question: "Did kubelet fail before the container process could execute, and what exact ContainerCannotRun or CreateContainer error was recorded? Healthy setup creates the process after image and mount success. If process creation succeeds, move to runtime logs rather than treating later exits as setup errors."
    match:
      any: [runcontainererror, containercannotrun, executable file not found, starterror, createcontainerconfigerror, createcontainererror]
    conclusion:
      family: workload_startup_error
      summary: "The container cannot start because its command or runtime setup is invalid."
      confidence: "high only when kubelet reports RunContainerError, ContainerCannotRun, or a command/runtime error"
      disconfirm:
        - "The process starts and a later application, probe, image, or platform signal is the first failure."
      next_steps:
        - "Inspect the pod event message for the exact missing executable or permission error."
        - "Compare command and args with the image contents."
        - "Fix the image, entrypoint, file mode, or securityContext."

  - id: image_pull_failure
    <<: *image_pull
    question: "Did kubelet fail to resolve, authenticate, fetch, or validate the requested image before container creation? Healthy pulls resolve the exact digest and report Pulled. Use the original ErrImagePull response to separate manifest, credentials, rate limit, and registry DNS/transport causes."
    probes:
      - id: k8s_troubleshooting:image_pull_failure:p01
        tool: k8s_describe
        arguments_template:
          kind: pods
          name: "{{pod}}"
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "image name and ErrImagePull/ImagePullBackOff event details"
        supports_when: ["the image pull event gives an auth, tag, registry, DNS, TLS, or rate-limit error"]
        refutes_when: ["the image was pulled and the container reached process startup"]
        support_signal_any: ["ImagePullBackOff", "ErrImagePull", "pull access denied", "manifest unknown"]
        refute_signal_any: ["Successfully pulled image"]
        source_group: kubernetes_api
    match:
      any:
        - imagepullbackoff
        - errimagepull
        - failed to pull image
        - pull access denied
        - manifest unknown
        - toomanyrequests
    conclusion:
      family: image_pull_error
      summary: "The pod cannot start because the node cannot pull the container image."
      confidence: "high only when ErrImagePull or ImagePullBackOff names the image, registry, or credentials failure"
      disconfirm:
        - "The image pulls successfully and another lifecycle failure occurs first."
      next_steps:
        - "Read the image pull event for tag, auth, DNS, TLS, rate limit, or registry 5xx details."
        - "Confirm the image tag exists and imagePullSecrets are present in the same namespace."
        - "Test a manual pull from the affected node or mirror the image to a reachable registry."

  - id: volume_failure
    <<: *k8s_storage
    probes: [{<<: *probe_k8s_storage, id: k8s_troubleshooting:volume_failure:p01}]
    question: "Did the earliest storage event name attachment or mounting after the PVC was selected for this pod? Healthy volumes attach and mount before process start. If neither event exists, return to binding, image, sandbox, or runtime evidence rather than assuming storage."
    match:
      any:
        - failedmount
        - failedattachvolume
        - unable to attach or mount volumes
        - mountvolume.setup failed
        - multi-attach error
    conclusion:
      family: k8s_storage_error
      summary: "The pod is blocked because Kubernetes cannot attach or mount a volume."
      confidence: "provisional until the first storage event distinguishes binding, attachment, or mount failure"
      disconfirm:
        - "PVC, attachment, and mount events are healthy and scheduler, image, sandbox, or workload evidence starts earlier."
      next_steps:
        - "Check the PVC is Bound and describe the pod for the exact mount or attach event."
        - "Inspect the CSI node and controller pods for the affected volume."
        - "Check backend storage health and volume topology before restarting the workload."

  - id: node_not_ready
    question: "Did the target node become NotReady or enter MemoryPressure, DiskPressure, or PIDPressure before the affected workload failed? Healthy peer nodes retain Ready and false pressure conditions. Compare the transition time with pod events; if it follows them, continue with the pod-local path."
    probes:
      - id: k8s_troubleshooting:node_not_ready:p01
        tool: k8s_read
        arguments_template:
          kind: nodes
          name: "{{node}}"
        incident_time_window: incident
        expected_result_shape: "target node Ready and pressure conditions with transition timestamps"
        supports_when: ["Ready is False or a pressure condition becomes True before the workload symptom"]
        refutes_when: ["the target node remained Ready without pressure through the incident window"]
        support_signal_any: ["Ready=False", "NotReady", "DiskPressure", "MemoryPressure", "PIDPressure"]
        refute_signal_any: ["Ready=True"]
        source_group: kubernetes_api
    match:
      any: [notready, node is not ready, ready=false, diskpressure, memorypressure, pidpressure]
      fields:
        node_ready: "False"
    branches:
      - match:
          any: [diskpressure, memorypressure, pidpressure, evicted, low on resource]
        next: node_pressure
      - match:
          any:
            - container runtime network not ready
            - failed to create pod sandbox
            - cni plugin
            - network plugin
        next: pod_network_failure
      - match:
          any: [notready, node is not ready, ready=false]
        next: node_condition_failure

  - id: control_plane_failure
    question: "Is there a scoped API server, etcd, controller, or admission failure that predates the affected request and affects comparable targets? Healthy control-plane calls succeed across unrelated namespaces. If evidence is isolated to one pod, keep tracing its first local event instead of declaring a cluster outage."
    verify: "Check whether the same API/admission error affects multiple namespaces and clients; then read apiserver and the named dependency's health."
    interpretation: "A shared API, etcd, or admission failure can make healthy workloads look like independent pod failures."
    avoid: "Do not restart workload pods to fix a cluster-wide API or webhook failure."
    match:
      any: [apiserver, kube-apiserver, etcd, etcdserver, webhook, "admission webhook", "failed calling webhook", leaderelection]
      literal_any: ["failed calling webhook"]
    branches:
      - match:
          any: [etcd, etcdserver, "no leader", "request timed out"]
        next: etcd_failure
      - match:
          any: ["admission webhook", "failed calling webhook", webhook]
          literal_any: ["failed calling webhook"]
        next: admission_webhook_failure
      - match:
          any: [apiserver, kube-apiserver, leaderelection]
        next: api_server_failure

  - id: etcd_failure
    <<: *k8s_control_plane
    probes: [{<<: *probe_k8s_control_plane, id: k8s_troubleshooting:etcd_failure:p01}]
    question: "Did etcd report quorum, member communication, latency, or availability failure before API operations degraded? Healthy members form quorum and API writes complete. If the error starts at a webhook or caller credential instead, follow that earlier control point."
    verify: "Confirm etcd endpoint health, leader/quorum status, latency, disk latency, and member logs before changing Kubernetes objects."
    interpretation: "etcd timeout or leader loss is a control-plane availability incident, not a workload configuration error."
    match:
      any: [etcd, etcdserver, "no leader", "request timed out"]
    conclusion:
      family: k8s_control_plane_error
      summary: "etcd availability, quorum, or latency is disrupting Kubernetes control-plane requests."
      confidence: "high only when etcd health, quorum, or latency evidence overlaps the failed API operations"
      disconfirm:
        - "etcd is healthy and API failures are isolated to admission, authentication, or one client workload."
      next_steps:
        - "Preserve etcd member health and latency evidence from every control-plane node."
        - "Investigate quorum, disk saturation, and network reachability before member recovery."
        - "Avoid speculative member deletion or restore actions during a live quorum incident."

  - id: admission_webhook_failure
    <<: *k8s_control_plane
    probes: [{<<: *probe_k8s_control_plane, id: k8s_troubleshooting:admission_webhook_failure:p01}]
    question: "Did the API response name an admission webhook denial, timeout, or TLS failure for this create/update? Healthy admission completes within the request and identifies no rejecting webhook. If the object was admitted, trace the next scheduler or kubelet event instead."
    verify: "Use the exact webhook service/name in the API error, then check its endpoints, certificate, timeout, and recent rollout."
    interpretation: "Admission happens before persistence/scheduling; a failing webhook can block every matching workload."
    match:
      any: ["admission webhook", "failed calling webhook", webhook]
      literal_any: ["failed calling webhook"]
    conclusion:
      family: k8s_control_plane_error
      summary: "A validating or mutating admission webhook blocks Kubernetes API requests."
      confidence: "high only when the API response names the webhook and its endpoint or TLS failure"
      disconfirm:
        - "The request reaches admission or API-server, RBAC, DNS, or workload evidence precedes webhook handling."
      next_steps:
        - "Identify the named webhook and verify its Service has ready endpoints."
        - "Check webhook TLS/certificate, failurePolicy, timeout, and deployment rollout state."
        - "Use an emergency bypass only under the platform's change-control procedure."

  - id: api_server_failure
    <<: *k8s_control_plane
    probes: [{<<: *probe_k8s_control_plane, id: k8s_troubleshooting:api_server_failure:p01}]
    question: "Did the first failed request show API server unavailability, timeout, TLS failure, or an authentication response? Healthy API calls succeed for the same scoped operation. Separate a named Unauthorized/Forbidden identity failure from an API availability failure before escalating control plane."
    verify: "Compare API health, latency, audit/auth errors, and load-balancer reachability from more than one client."
    interpretation: "If independent clients fail the same API operation, investigate the shared control plane before individual resources."
    match:
      any: [apiserver, kube-apiserver, leaderelection]
    conclusion:
      family: k8s_control_plane_error
      summary: "Kubernetes API-server availability, leadership, or access is affecting workload operations."
      confidence: "high only when API-server logs, readiness, or client errors show the same incident-era failure"
      disconfirm:
        - "The API server is healthy and etcd, admission, credentials, or a downstream controller fails first."
      next_steps:
        - "Confirm API endpoint health and scope the impact across namespaces and clients."
        - "Inspect apiserver, controller-manager, and load-balancer evidence for the first shared failure."
        - "Recover the implicated control-plane component before retrying workload operations."

  - id: node_pressure
    <<: *node_pressure
    probes: [{<<: *probe_node_pressure, id: k8s_troubleshooting:node_pressure:p01}]
    question: "Which target-node condition changed first—MemoryPressure, DiskPressure, or PIDPressure—and did it precede eviction or workload disruption? Healthy nodes report each condition False. If no transition or eviction exists for this node, return to the workload's own termination reason."
    match:
      any: [diskpressure, memorypressure, pidpressure, evicted, low on resource]
    conclusion:
      family: node_kubelet_pressure
      summary: "The node is under kubelet pressure and is disrupting pods."
      confidence: "high only when the target node condition and eviction or kubelet event overlap affected pods"
      disconfirm:
        - "Node pressure is absent or a pod-local, storage, GPU, or control-plane failure occurs first."
      next_steps:
        - "Cordon the node if unrelated workloads are affected."
        - "Inspect kubelet conditions, evictions, disk, memory, PID usage, and image or log growth."
        - "Remove the pressure source before uncordoning."

  - id: node_condition_failure
    <<: *node_pressure
    probes: [{<<: *probe_node_pressure, id: k8s_troubleshooting:node_condition_failure:p01}]
    question: "Did kubelet set the target node NotReady before this workload's event, and which Ready condition reason explains it? Healthy nodes stay Ready while peers continue scheduling. If NotReady follows the pod failure or affects no comparable workload, investigate the earlier local control point."
    match:
      any: [notready, node is not ready, ready=false]
      fields:
        node_ready: "False"
    conclusion:
      family: node_kubelet_pressure
      summary: "The node is NotReady, so pod placement or running pods on that node are unreliable."
      confidence: "high only when the same node transitions NotReady before the affected pod symptoms"
      disconfirm:
        - "The node remains Ready or workloads fail on healthy nodes for a different earlier reason."
      next_steps:
        - "Check kubelet and container runtime status on the node."
        - "Read node conditions and recent kubelet events for heartbeat, runtime, disk, memory, or PID failures."
        - "Cordon or drain the node while recovering kubelet or the runtime."

  - id: probe_failure
    <<: *workload_startup
    probes: [{<<: *probe_workload_startup, id: k8s_troubleshooting:probe_failure:p01}]
    question: "Did the actual probe result fail for this container before readiness loss or restart, and was the process otherwise running? Healthy probes succeed with the configured endpoint and timing. Inspect response/error evidence, not the probe command text; if probes are healthy, trace the real exit or dependency failure."
    match:
      any: [readiness probe failed, liveness probe failed, startup probe failed, unhealthy]
    conclusion:
      family: workload_startup_error
      summary: "The workload is failing Kubernetes health probes."
      confidence: "high only when kubelet events identify a failed startup, readiness, or liveness probe"
      disconfirm:
        - "Probe state is healthy or process, network, dependency, or node failure occurs before probe evaluation."
      next_steps:
        - "Check probe path, port, timeout, period, and failureThreshold against real startup time."
        - "Read application logs around the probe failures."
        - "Fix the app endpoint or tune the probe only after confirming the app is otherwise healthy."

  - id: service_connectivity_failure
    question: "After the workload is Running, does the affected pod fail first at DNS, Service endpoints, or policy/route reachability? Healthy peers resolve the same name and reach ready endpoints in the incident window. Test the named control point next; a generic timeout alone is not network proof."
    verify: "Test DNS resolution, Service endpoints, NetworkPolicy, and TCP reachability from the affected pod and a known-good peer in that order."
    interpretation: "`connection refused`, `no endpoints`, and DNS errors have different owners; do not label all of them CNI failures."
    avoid: "Do not restart CoreDNS or relax NetworkPolicy until the failed hop is identified."
    probes:
      - id: k8s_troubleshooting:service_connectivity_failure:p01
        tool: k8s_read
        arguments_template:
          kind: endpoints
          namespace: "{{namespace}}"
          name: "{{service}}"
        incident_time_window: incident
        expected_result_shape: "namespace Endpoints with ready/notReady backend addresses"
        supports_when: ["the target Service has no ready addresses"]
        refutes_when: ["ready backend addresses exist and the failure is DNS or a later traffic hop"]
        support_signal_any: ["notReadyAddresses", "subsets: []"]
        refute_signal_any: ["addresses"]
        source_group: kubernetes_api
    match:
      any: ["no such host", nxdomain, "no endpoints available", "connection refused", "networkpolicy", "i/o timeout"]
    branches:
      - match:
          any: ["no such host", nxdomain, coredns]
        next: dns_failure
      - match:
          any: ["no endpoints available", endpointslice, "service has no endpoints"]
        next: service_endpoint_failure
      - match:
          any: [networkpolicy, "i/o timeout", "connection refused"]
        next: traffic_policy_failure

  - id: dns_failure
    <<: *cluster_network
    probes: [{<<: *probe_cluster_network, id: k8s_troubleshooting:dns_failure:p01}]
    question: "Does the affected pod receive NXDOMAIN, lookup failure, or timeout for the required name while a healthy peer uses the same resolver? Healthy DNS returns the expected Service or endpoint records. If name resolution succeeds, continue to endpoints, policy, or application protocol evidence."
    verify: "Resolve the exact Service FQDN from the affected pod, then inspect CoreDNS readiness/errors and the pod's resolv.conf."
    interpretation: "DNS failure is distinct from a service without endpoints and from an application refusing a connection."
    match:
      any: ["no such host", nxdomain, coredns]
    conclusion:
      family: cluster_network_error
      summary: "Cluster DNS cannot resolve a required name for the workload."
      confidence: "high only when target-pod lookup failures correlate with CoreDNS or resolver evidence"
      disconfirm:
        - "DNS resolves the dependency and connection, endpoint, policy, or application behavior fails later."
      next_steps:
        - "Confirm whether the failing name is a valid Kubernetes Service/namespace FQDN."
        - "Check CoreDNS health, upstream reachability, and the affected pod's DNS configuration."
        - "Repair the failed DNS layer before changing application retries."

  - id: service_endpoint_failure
    <<: *cluster_network
    probes: [{<<: *probe_cluster_network, id: k8s_troubleshooting:service_endpoint_failure:p01}]
    question: "Does the requested Service select zero ready endpoints at the incident timestamp, and why are its pods unready? Healthy Services expose endpoints matching their selector. If endpoints are ready, inspect DNS, NetworkPolicy, route, port, or application protocol rather than blaming selection."
    verify: "Compare Service selectors, EndpointSlice addresses, and readiness of the selected pods."
    interpretation: "Service discovery can work while the Service has zero usable endpoints."
    match:
      any: ["no endpoints available", endpointslice, "service has no endpoints"]
    conclusion:
      family: cluster_network_error
      summary: "The Service has no ready endpoints for the requested traffic."
      confidence: "high only when EndpointSlice or Endpoints data shows no ready backend at failure time"
      disconfirm:
        - "Ready endpoints exist and DNS, policy, dataplane, TLS, or backend application behavior explains the failure."
      next_steps:
        - "Verify selector labels and EndpointSlice membership."
        - "Fix pod readiness or selector drift; do not focus on CNI until endpoints exist."
        - "Retest the Service from the affected namespace after endpoints become ready."

  - id: traffic_policy_failure
    <<: *cluster_network
    probes: [{<<: *probe_cluster_network, id: k8s_troubleshooting:traffic_policy_failure:p01}]
    question: "After DNS resolves and ready endpoints exist, does traffic still fail for the same source pod, destination, port, and time window? Healthy peers complete that exact path. Next inspect NetworkPolicy, route, MTU, TLS, or application listener evidence rather than inferring from a generic connection timeout."
    verify: "Test the target IP/port from both sides and inspect NetworkPolicy, CNI dataplane, kube-proxy, and MTU only for the failed hop."
    interpretation: "A timeout suggests a dropped path; refusal usually means the destination is reachable but not accepting the port."
    match:
      any: [networkpolicy, "i/o timeout", "connection refused"]
    conclusion:
      family: cluster_network_error
      summary: "Traffic policy or the cluster dataplane blocks a reachable dependency."
      confidence: "high only when endpoints are ready and policy, routing, or dataplane evidence blocks the same path"
      disconfirm:
        - "DNS, endpoints, application health, or an external dependency fails first."
      next_steps:
        - "Confirm DNS and EndpointSlice are healthy first."
        - "Identify the blocked source/destination/port and evaluate matching ingress/egress policy."
        - "Inspect the CNI/kube-proxy path only when policy and application listener state do not explain it."

  - id: workload_runtime_failure
    <<: *workload_runtime
    question: "Did the container reach Running and then emit the first traceback, signal, CUDA OOM, or application exit? Healthy process logs remain stable after startup. Use previous logs from the first failing replica; if a kubelet/image/mount event came first, return to the startup path."
    verify: "Find the first error by timestamp across application logs, dependency errors, deployment revision, and resource signals."
    interpretation: "A running container with an application exception is not automatically a Kubernetes or node fault."
    avoid: "Do not raise resource limits or roll back blindly until the first error and recent change are correlated."
    probes:
      - id: k8s_troubleshooting:workload_runtime_failure:p01
        tool: k8s_logs
        arguments_template:
          pod: "{{pod}}"
          namespace: "{{namespace}}"
          tail: 300
        incident_time_window: incident
        expected_result_shape: "timestamped application exception or dependency error lines"
        supports_when: ["a scoped runtime exception is the earliest failure signal"]
        refutes_when: ["a Kubernetes, node, or dependency event precedes the application error"]
        support_signal_any: ["Traceback (most recent call last)", "Segmentation fault", "CUDA out of memory"]
        refute_signal_any: ["FailedMount", "FailedScheduling", "ImagePullBackOff"]
        source_group: workload_logs
    match:
      any: [traceback, "panic:", "segmentation fault", importerror, "permission denied", "exit code 1"]
    conclusion:
      family: workload_runtime_error
      summary: "The workload reached runtime but application code or its dependency failed."
      confidence: "provisional until logs identify the first application exception or unavailable dependency"
      disconfirm:
        - "A lifecycle, node, storage, GPU, or network failure predates the application error."
      next_steps:
        - "Identify the first failing request/rank/process and correlate it with the latest deployment or configuration change."
        - "Separate application exceptions from dependency timeouts and infrastructure errors using timestamps."
        - "Fix or roll back the evidence-backed application/configuration change, then verify a stable runtime window."

  - id: rollout_or_lifecycle
    <<: *lifecycle
    question: "Did a deployment, DaemonSet, Helm, scheduler, or platform revision begin before the scoped symptom and match its blast radius? Healthy rollouts progress within their availability budget. If failure persists after the revision settles or affects unrelated targets, follow the typed workload or infrastructure evidence instead."
    verify: "Compare the alert start time with Deployment/DaemonSet/Helm revision changes and rollout completion status."
    interpretation: "Expected replacement churn during a healthy rollout is different from a rollout that is stuck because a new pod cannot become ready."
    avoid: "Do not call a transient rollout a node or scheduler incident without a persistent failed condition."
    probes:
      - id: k8s_troubleshooting:rollout_or_lifecycle:p01
        tool: k8s_read
        arguments_template:
          kind: deployments
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "namespace Deployment generations and available/updated replica status"
        supports_when: ["a generation change and unavailable replacement replicas align with the alert"]
        refutes_when: ["no rollout changed near the alert or all replacements are available"]
        support_signal_any: ["ProgressDeadlineExceeded", "ReplicaSetUpdated"]
        refute_signal_any: ["Available=True"]
        source_group: kubernetes_api
    match:
      any: [rollout, rollingupdate, "helm upgrade", "revision change", "container creating"]
    conclusion:
      family: platform_lifecycle_change
      summary: "The event coincides with a Kubernetes workload rollout or platform lifecycle change."
      confidence: "provisional until the new revision or lifecycle event is shown to precede the first failure"
      disconfirm:
        - "No relevant change occurred before the incident or the prior revision fails identically."
      next_steps:
        - "Confirm the rollout/release generation and whether replacement replicas become Ready within the expected window."
        - "If it is stuck, follow the first failed pod event rather than the rollout status alone."
        - "Treat it as expected lifecycle behavior only after availability and completion are verified."

  - id: runai_control_plane_failure
    question: "Did a shared Run:ai controller, backend, or cluster-sync component log the first reconcile/dependency failure for the incident? Healthy reconciliation converges the same resource without retry storms. If no controller-side error precedes the pod symptom, continue with Kubernetes or workload evidence."
    verify: "Scope whether the same failure affects multiple workloads or clusters, then follow the named component's dependency chain before inspecting individual pods."
    interpretation: "Run:ai backend and cluster-sync failures sit above workload scheduling and can create stale or inconsistent workload state."
    avoid: "Do not edit generated workload objects until the owning controller and backend state agree."
    probes:
      - id: k8s_troubleshooting:runai_control_plane_failure:p01
        tool: k8s_read
        arguments_template:
          kind: events
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "timestamped Run:ai controller/reconciliation warnings in the affected namespace"
        supports_when: ["the first warning names cluster-sync, runai-backend, or a reconciliation dependency"]
        refutes_when: ["the earliest event is a pod-local failure unrelated to Run:ai control plane"]
        source_group: kubernetes_api
    match:
      any: [runai-backend, cluster-sync, "runai scheduler unavailable", "database error", "reconcile failed"]
    branches:
      - match:
          any: [cluster-sync, "out of sync", "cluster disconnected", "reconcile failed"]
        next: runai_cluster_sync_failure
      - match:
          any: [runai-backend, "database error", postgresql, "connection pool"]
        next: runai_backend_failure

  - id: runai_cluster_sync_failure
    <<: *runai_control_plane
    probes: [{<<: *probe_runai_control_plane, id: k8s_troubleshooting:runai_cluster_sync_failure:p01}]
    question: "Did cluster-sync fail to reconcile the affected desired state with a typed API, backend, authorization, or dependency error? Healthy sync converges and records success. If it succeeds or the first failure is API server-side, route to Kubernetes control plane or identity instead."
    verify: "Correlate cluster-sync logs, connectivity/authentication to the control plane, and the last successfully synchronized resource version."
    interpretation: "Stale UI/workload state can be a synchronization failure even when Kubernetes objects continue running."
    match:
      any: [cluster-sync, "out of sync", "cluster disconnected", "reconcile failed"]
    conclusion:
      family: runai_control_plane_error
      confidence: "high only when cluster-sync reports the same object/revision as the incident"
      summary: "Run:ai cluster-sync cannot reconcile cluster state with the control plane."
      disconfirm:
        - "cluster-sync is healthy and the Kubernetes object itself carries the same failed state"
      next_steps:
        - "Capture the first reconciliation/auth/connectivity error and affected object identity."
        - "Verify control-plane reachability, token time validity, and resource-version progression."
        - "Recover synchronization, then confirm the UI and Kubernetes object converge."

  - id: runai_backend_failure
    <<: *runai_control_plane
    probes: [{<<: *probe_runai_control_plane, id: k8s_troubleshooting:runai_backend_failure:p01}]
    question: "Did Run:ai backend requests fail because the service or its database dependency was unavailable before workload state became stale? Healthy backend calls complete and controllers converge. If the response is Unauthorized or API-server failure, investigate identity or Kubernetes control plane first."
    verify: "Check backend readiness, request error rates, database connectivity/latency, and whether failures span independent clusters."
    interpretation: "A multi-cluster or API-wide failure points to shared backend state rather than a single Kubernetes cluster."
    match:
      any: [runai-backend, "database error", postgresql, "connection pool"]
    conclusion:
      family: runai_control_plane_error
      summary: "A Run:ai backend or database dependency failure disrupts platform operations."
      confidence: "high only when Run:ai backend/database logs or health checks show the same dependency failure"
      disconfirm:
        - "Run:ai backend and database are healthy while Kubernetes scheduling, workload, or network fails first."
      next_steps:
        - "Identify the first failing backend endpoint and its owning dependency."
        - "Check database saturation, connection exhaustion, migrations, and recent backend rollout."
        - "Verify recovery from both the backend API and one affected cluster."

  - id: gpu_stack_failure
    question: "Which NVIDIA layer emitted the first typed signal on the affected node: XID, driver, runtime handler, device plugin, fabric manager, or Operator reconciliation? Healthy nodes advertise GPUs and initialize all operands. Follow the first node-scoped signal, not a downstream CUDA or scheduling symptom."
    verify: "Compare host `nvidia-smi`, allocatable `nvidia.com/gpu`, device-plugin logs, toolkit runtime handler, validator state, and kernel XID timestamps on the same node."
    interpretation: "Driver, runtime, device plugin, fabric initialization, and physical GPU faults produce different Kubernetes symptoms."
    avoid: "Do not restart every GPU Operator operand; preserve XID and driver evidence and isolate the failing layer first."
    probes:
      - id: k8s_troubleshooting:gpu_stack_failure:p01
        tool: k8s_read
        arguments_template:
          kind: nodes
          name: "{{node}}"
        incident_time_window: incident
        expected_result_shape: "target node nvidia.com/gpu capacity/allocatable and condition state"
        supports_when: ["GPU allocatable capacity is absent or the node condition changed with the incident"]
        refutes_when: ["the node advertises healthy GPU capacity and a workload-level error occurred first"]
        source_group: kubernetes_api
    match:
      any: ["nvrm: xid", "xidcriticalerror", "fallen off the bus", "failed to initialize nvml", "driver/library version mismatch", "no runtime for \"nvidia\"", "nvidia.com/gpu: 0", "system not yet initialized", clusterpolicy]
      literal_any: ["no runtime for \"nvidia\"", "nvidia.com/gpu: 0"]
    branches:
      - match:
          any: ["nvrm: xid", xidcriticalerror, "fallen off the bus", "gpu is lost"]
        next: gpu_xid_failure
      - match:
          literal_any: ["no runtime for \"nvidia\""]
        next: gpu_runtime_handler_failure
      - match:
          any: ["nvidia.com/gpu: 0", "no devices found", nvidia-device-plugin]
          literal_any: ["nvidia.com/gpu: 0"]
        next: gpu_device_plugin_failure
      - match:
          any: ["failed to initialize nvml", "driver/library version mismatch", "nvidia driver is not loaded"]
        next: gpu_driver_failure
      - match:
          any: ["system not yet initialized", "fabric state", nvidia-fabricmanager]
        next: gpu_fabric_initialization_failure
      - match:
          any: [clusterpolicy, "operator validator", "driver-validation", "cuda-validation"]
        next: gpu_operator_reconciliation_failure

  - id: gpu_xid_failure
    <<: *gpu_hardware
    question: "Did the affected node record a kernel NVRM XID before the workload's CUDA, scheduling, or device-plugin failure? Healthy GPU nodes have no incident-era XID. If no matching node XID exists, inspect runtime, fabric, application, or pressure evidence instead."
    verify: "Capture the first XID code, GPU UUID/PCI address, node, timestamp, preceding XIDs, and whether the device plugin marked that GPU unhealthy."
    interpretation: "The first XID in the chain is usually more causal than later CUDA/NCCL failures in every rank."
    avoid: "Do not reset or reboot before collecting dmesg/NVRM, device-plugin, DCGM, and topology evidence."
    probes:
      - id: k8s_troubleshooting:gpu_xid_failure:p01
        tool: logql_query
        arguments_template:
          query: "{namespace=\"{{namespace}}\"} |~ \"(?i)(nvrm|xid|fallen off the bus|gpu is lost)\""
        incident_time_window: incident
        expected_result_shape: "timestamped NVRM/XID lines for the affected workload namespace"
        supports_when: ["the first XID precedes CUDA or NCCL symptoms"]
        refutes_when: ["no XID is present in the scoped log window and a different failure precedes it"]
        support_signal_any: ["NVRM", "Xid", "fallen off the bus", "GPU is lost"]
        refute_signal_any: ["NVIDIA driver initialized"]
        source_group: loki
    match:
      any: ["nvrm: xid", xidcriticalerror, "fallen off the bus", "gpu is lost"]
    conclusion:
      family: gpu_hardware_error
      summary: "An NVIDIA XID or inaccessible GPU is the earliest hardware/driver-layer failure."
      confidence: "high only when XID, NVML, or device-access failure predates workload and NCCL symptoms on the node"
      disconfirm:
        - "GPU health is clean or peer, fabric, scheduler, or application failure occurs first."
      disconfirm:
        - "the XID predates this incident and the GPU remained healthy throughout the failure window"
      next_steps:
        - "Use the XID catalog and causal chain, not a generic GPU restart playbook."
        - "Cordon the node and drain GPU workloads if the device is unhealthy or the fault repeats."
        - "Run the code-specific reset, hardware isolation, or support workflow after evidence capture."

  - id: gpu_runtime_handler_failure
    <<: *gpu_hardware
    probes: [{<<: *probe_gpu_hardware, id: k8s_troubleshooting:gpu_runtime_handler_failure:p01}]
    question: "Did the target node's active CRI configuration lack or reject the NVIDIA runtime handler before container creation? Healthy GPU nodes accept the configured handler and create the container. If the handler works, investigate image, driver/device plugin, or workload runtime evidence next."
    verify: "Check toolkit daemonset logs and the active containerd/CRI-O configuration for the `nvidia` runtime handler on the affected node."
    interpretation: "The GPU and driver may be healthy while Kubernetes cannot create a GPU container sandbox."
    match:
      literal_any: ["no runtime for \"nvidia\""]
    conclusion:
      family: gpu_hardware_error
      summary: "The node container runtime lacks the NVIDIA runtime handler required by GPU pods."
      confidence: "high only when kubelet or runtime configuration reports a missing NVIDIA handler"
      disconfirm:
        - "The handler is registered and a driver, device plugin, image, or workload error occurs first."
      disconfirm:
        - "the active CRI configuration contains the handler and a GPU test pod starts on the same node"
      next_steps:
        - "Inspect nvidia-container-toolkit logs before editing CRI configuration."
        - "Verify the runtime handler in the configuration actually loaded by containerd or CRI-O."
        - "Restart only the affected runtime/toolkit path and validate with one GPU pod."

  - id: gpu_device_plugin_failure
    <<: *gpu_hardware
    question: "Does the host/driver still expose GPUs while Kubernetes allocatable GPU resources disappear or the device plugin fails on this node? Healthy node inventory and Kubernetes allocatable count agree. If both are absent, investigate driver/hardware; if both remain present, return to scheduling or workload evidence."
    verify: "Compare host `nvidia-smi -L`, node capacity/allocatable, and the device-plugin pod/log on that exact node."
    interpretation: "Host-visible GPUs plus zero allocatable GPUs isolates the failure above the driver and at device registration/health."
    probes:
      - id: k8s_troubleshooting:gpu_device_plugin_failure:p01
        tool: k8s_read
        arguments_template:
          kind: nodes
          name: "{{node}}"
        incident_time_window: incident
        expected_result_shape: "target node capacity and allocatable nvidia.com/gpu fields"
        supports_when: ["capacity/allocatable GPU fields are absent or zero on the affected node"]
        refutes_when: ["the node advertises expected allocatable GPUs during the incident"]
        support_signal_any: ["nvidia.com/gpu: 0", "XidCriticalError"]
        refute_signal_any: ["nvidia.com/gpu"]
        source_group: kubernetes_api
    match:
      any: ["nvidia.com/gpu: 0", "no devices found", nvidia-device-plugin]
      literal_any: ["nvidia.com/gpu: 0"]
    conclusion:
      family: gpu_hardware_error
      summary: "The NVIDIA device plugin is not registering healthy GPUs with Kubernetes."
      confidence: "high only when allocatable GPU capacity or device-plugin logs show registration failure on the node"
      disconfirm:
        - "Allocatable GPUs are healthy and scheduler capacity, driver, runtime, or workload fails first."
      next_steps:
        - "Confirm host GPUs and driver health first."
        - "Inspect device-plugin registration and XidCriticalError messages."
        - "Restart the node's device-plugin pod only after fixing its driver/runtime dependency."

  - id: gpu_driver_failure
    <<: *gpu_hardware
    probes: [{<<: *probe_gpu_hardware, id: k8s_troubleshooting:gpu_driver_failure:p01}]
    question: "Did the target node show an absent, incompatible, or unhealthy loaded NVIDIA driver before GPU workload failure? Healthy driver and userspace versions initialize together. If the driver is healthy, continue to runtime handler, device plugin, fabric, or application evidence."
    verify: "Compare loaded kernel module, userspace NVML library, driver daemonset state, kernel version, and the last driver rollout/reboot."
    interpretation: "An NVML mismatch often means userspace changed while the old kernel module stayed loaded."
    match:
      any: ["failed to initialize nvml", "driver/library version mismatch", "nvidia driver is not loaded"]
    conclusion:
      family: gpu_hardware_error
      summary: "The NVIDIA kernel driver or NVML userspace stack is unavailable or mismatched."
      confidence: "high only when nvidia-smi, NVML, or kernel logs show a mismatch or unavailable device"
      disconfirm:
        - "Driver and NVML are healthy and device plugin, fabric, scheduler, or application fails first."
      next_steps:
        - "Drain the node before driver/module recovery."
        - "Align the loaded module and userspace driver versions; reboot when an in-place upgrade left stale modules."
        - "Verify `nvidia-smi` and a CUDA validator before uncordoning."

  - id: gpu_fabric_initialization_failure
    <<: *network_fabric
    probes: [{<<: *probe_network_fabric, id: k8s_troubleshooting:gpu_fabric_initialization_failure:p01}]
    question: "Did fabric manager, NVSwitch, or NVLink initialization fail on the affected node before multi-GPU work began? Healthy fabric initialization completes before collective traffic. If it is healthy, inspect NCCL rank/bootstrap/transport evidence or a local GPU/runtime fault."
    verify: "Read `nvidia-smi -q` Fabric State, Fabric Manager status/logs, and validator output on the same HGX/DGX node."
    interpretation: "A healthy driver is insufficient on NVSwitch systems until Fabric Manager configures the memory fabric."
    match:
      any: ["system not yet initialized", "fabric state", nvidia-fabricmanager]
    conclusion:
      family: network_fabric_error
      summary: "GPU fabric initialization or Fabric Manager prevents GPU validation and peer communication."
      confidence: "high only when Fabric Manager or GPU fabric state is unhealthy before peer or NCCL failures"
      disconfirm:
        - "Fabric state is healthy or GPU XID, driver, NIC, peer process, or application failure occurs first."
      next_steps:
        - "Confirm Fabric State and Fabric Manager version/service health."
        - "Use the documented stop-apps, recover fabric, validate, restart-apps order."
        - "Retest GPU peer communication before returning the node to distributed jobs."

  - id: gpu_operator_reconciliation_failure
    <<: *gpu_hardware
    question: "Which GPU Operator operand or validation stage failed to converge on the affected node, and did that failure predate the workload? Healthy operands report ready after a rollout settles. If the component is healthy or changed later, avoid attributing the incident to the Operator."
    verify: "Inspect ClusterPolicy state and find the first non-ready operand in dependency order: driver, toolkit, device plugin, GFD, DCGM, validators."
    interpretation: "Later operands often fail because an earlier node prerequisite did not become healthy."
    probes:
      - id: k8s_troubleshooting:gpu_operator_reconciliation_failure:p01
        tool: k8s_read
        arguments_template:
          kind: pods
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "GPU Operator operand pod phase and readiness in the scoped namespace"
        supports_when: ["a driver, toolkit, device-plugin, GFD, DCGM, or validator pod is not Ready first"]
        refutes_when: ["all scoped GPU Operator operands are Ready and a node/workload failure predates them"]
        support_signal_any: ["CrashLoopBackOff", "ImagePullBackOff"]
        refute_signal_any: ["Ready=True"]
        source_group: kubernetes_api
    match:
      any: [clusterpolicy, "operator validator", "driver-validation", "cuda-validation"]
    conclusion:
      family: gpu_hardware_error
      confidence: "provisional until the first failed operand is identified"
      disconfirm:
        - "All GPU Operator operands are Ready and a lower-level driver, runtime, device-plugin, fabric, or workload failure occurs first."
      summary: "GPU Operator reconciliation has not produced a complete healthy GPU stack."
      next_steps:
        - "Follow the first non-ready operand rather than the loudest validator."
        - "Compare one failing GPU node with one healthy GPU node."
        - "Route the exact operand error back through driver, runtime, device-plugin, or fabric branches."

  - id: distributed_training_failure
    question: "Which rank or layer fails first: application peer exit, bootstrap interface, memory registration, or IB/RDMA/NVLink transport? Healthy ranks establish communication before collectives begin. Preserve the first rank's timestamp; peer timeout messages elsewhere are downstream until proven otherwise."
    verify: "Align per-rank logs by timestamp and identify the first rank/error before reviewing the later all-rank timeout storm."
    interpretation: "NCCL timeout is a distributed symptom; one application/GPU failure can make every healthy peer report a network timeout."
    avoid: "Do not tune NCCL environment variables before low-level GPU, interface, memory, and fabric checks pass."
    probes:
      - id: k8s_troubleshooting:distributed_training_failure:p01
        tool: logql_query
        arguments_template:
          query: "{namespace=\"{{namespace}}\"} |~ \"(?i)(nccl|xid|ibv|rank)\""
        incident_time_window: incident
        expected_result_shape: "timestamped rank, XID, or RDMA failure lines"
        supports_when: ["a first-rank, XID, or transport error precedes collective timeout"]
        refutes_when: ["only downstream collective timeouts exist in the scoped window"]
        source_group: loki
    match:
      any: ["nccl warn", "nccl error", "collective operation timeout", "allreduce timed out", infiniband, rdma, "ibv_reg_mr failed", "ibv_create_qp failed", nvlink]
    branches:
      - match:
          any: ["one rank", "first rank", "rank crashed", "rank exited", "peer failure"]
        next: distributed_peer_failure
      - match:
          any: ["ibv_reg_mr failed", "ibv_create_qp failed", memlock, "/dev/shm", "shared memory"]
        next: nccl_memory_registration_failure
      - match:
          any: [infiniband, rdma, "link down", "link flap", "packet_seq_err", "local_ack_timeout_err", "ibv_modify_qp failed"]
        next: nccl_fabric_transport_failure
      - match:
          any: ["bootstrap", "socket ifname", "failed to initialize any net plugin", "connection timed out"]
        next: nccl_bootstrap_failure
      - match:
          any: ["nccl warn", "nccl error", "collective operation timeout", "allreduce timed out"]
        next: nccl_unresolved_collective_failure

  - id: distributed_peer_failure
    <<: *workload_runtime
    question: "Did one rank emit a traceback, OOM, signal, or nonzero exit before other ranks reported a collective timeout? Healthy ranks remain alive through the same collective. If no earlier rank exit exists, continue with bootstrap, registration, and fabric transport evidence."
    verify: "Find the minimum failure timestamp across ranks and inspect that rank's application, CUDA, OOM, and XID evidence."
    interpretation: "The surviving ranks are victims waiting at a collective, not independent root causes."
    probes:
      - id: k8s_troubleshooting:distributed_peer_failure:p01
        tool: k8s_describe
        arguments_template:
          kind: pods
          name: "{{pod}}"
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "affected rank pod termination state, exit code, OOM, and node assignment"
        supports_when: ["the rank pod terminated or failed before the collective timeout"]
        refutes_when: ["the rank remained healthy until after the distributed timeout"]
        support_signal_any: ["OOMKilled", "Error", "ExitCode"]
        refute_signal_any: ["Running"]
        source_group: kubernetes_api
    match:
      any: ["one rank", "first rank", "rank crashed", "rank exited", "peer failure"]
    conclusion:
      family: workload_runtime_error
      summary: "A single rank or peer failed first and caused downstream collective timeouts."
      confidence: "high only when rank-specific logs identify one peer failure before collective timeout propagation"
      disconfirm:
        - "All ranks fail simultaneously or fabric, GPU, bootstrap, or scheduler evidence predates any peer failure."
      next_steps:
        - "Root-cause the first failed rank using its exit code and local node/GPU evidence."
        - "Confirm all other ranks timed out after that timestamp."
        - "Fix the initiating rank failure before changing fabric-wide NCCL settings."

  - id: nccl_memory_registration_failure
    <<: *network_fabric
    question: "Did the first NCCL error name shared-memory or pinned-memory registration/allocation failure before transport retries? Healthy ranks allocate required memory and proceed to connection setup. If an earlier application OOM or node pressure event exists, treat that as the primary cause instead."
    verify: "Check the exact ibv/shm error, pod `/dev/shm` size, memlock limit, and whether the same node pair passes outside the workload."
    interpretation: "Memory registration failure is a host/container limit issue even though NCCL reports it through the network transport."
    probes:
      - id: k8s_troubleshooting:nccl_memory_registration_failure:p01
        tool: k8s_describe
        arguments_template:
          kind: pods
          name: "{{pod}}"
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "pod memory limits, shared-memory mount, and termination state"
        supports_when: ["the pod spec or state shows a memory/shared-memory constraint consistent with the ibv error"]
        refutes_when: ["no memory constraint exists and a link/XID error occurs first"]
        support_signal_any: ["ibv_reg_mr failed", "ibv_create_qp failed"]
        refute_signal_any: ["NVRM: Xid", "NCCL_SYSTEM_ERROR"]
        source_group: kubernetes_api
    match:
      any: ["ibv_reg_mr failed", "ibv_create_qp failed", memlock, "/dev/shm", "shared memory"]
    conclusion:
      family: network_fabric_error
      summary: "NCCL cannot register pinned/shared memory required by its transport."
      confidence: "high only when NCCL reports memory-registration errors and host memory, driver, and transport evidence aligns"
      disconfirm:
        - "The first cause is peer exit, fabric reachability, GPU XID, or bootstrap rather than registration."
      next_steps:
        - "Record memlock and shared-memory limits from the actual training container."
        - "Apply the smallest approved limit/shared-memory correction."
        - "Re-run a focused NCCL test on the same nodes before the full job."

  - id: nccl_fabric_transport_failure
    <<: *network_fabric
    probes: [{<<: *probe_network_fabric, id: k8s_troubleshooting:nccl_fabric_transport_failure:p01}]
    question: "Does the affected node or rank show a typed IB/RoCE/NVLink transport failure before the collective timeout, rather than only a timeout string? Healthy links establish queues and complete transfers. If no low-level signal exists, return to the first rank exit or bootstrap failure."
    verify: "Check link state/rate, point-to-point bandwidth and latency, and counters for the exact rails and node pair used by the failed ranks."
    interpretation: "Growing retry/error counters or a degraded link localizes a collective failure below Kubernetes networking."
    match:
      any: [infiniband, rdma, "link down", "link flap", "packet_seq_err", "local_ack_timeout_err", "ibv_modify_qp failed"]
    conclusion:
      family: network_fabric_error
      summary: "The InfiniBand/RoCE transport path is degraded or misconfigured for the affected ranks."
      confidence: "high only when NCCL/verbs logs and NIC, RDMA, or fabric counters identify the transport path"
      disconfirm:
        - "Transport checks are healthy and peer, GPU, DNS/bootstrap, or application failure starts earlier."
      next_steps:
        - "Use ibstat/ibstatus plus bandwidth and latency tests on the failing pair."
        - "Inspect RDMA, NIC, and switch counters for the implicated rail."
        - "Isolate the node/rail and repair link, GID, lossless-network, or cabling evidence found."

  - id: nccl_bootstrap_failure
    <<: *network_fabric
    question: "Can every rank resolve and connect through the selected bootstrap interface before the collective begins? Healthy ranks agree on reachable addresses and ports. If bootstrap succeeds, investigate transport/registration; if DNS or pod networking fails first, follow the cluster-network branch."
    verify: "Capture NCCL INIT/BOOTSTRAP/NET logs, chosen interface, DNS/IP reachability, and allowed TCP port range between ranks."
    interpretation: "Bootstrap fails before high-speed collectives and may use a different network path from RDMA data traffic."
    probes:
      - id: k8s_troubleshooting:nccl_bootstrap_failure:p01
        tool: logql_query
        arguments_template:
          query: "{namespace=\"{{namespace}}\"} |~ \"(?i)(nccl.*(init|bootstrap|socket|net)|connection timed out)\""
        incident_time_window: incident
        expected_result_shape: "timestamped NCCL INIT/BOOTSTRAP/NET lines"
        supports_when: ["bootstrap/interface selection or connection failure precedes collective setup"]
        refutes_when: ["bootstrap completes and a later RDMA or peer failure appears first"]
        support_signal_any: ["NCCL WARN Bootstrap", "NCCL WARN NET/Socket"]
        refute_signal_any: ["Bootstrap : Using"]
        source_group: loki
    match:
      any: [bootstrap, "socket ifname", "failed to initialize any net plugin", "connection timed out"]
    conclusion:
      family: network_fabric_error
      summary: "NCCL bootstrap or network-interface selection prevents communicator formation."
      confidence: "high only when NCCL bootstrap logs identify interface selection, resolution, or connect failure"
      disconfirm:
        - "Bootstrap completes and a later collective, peer, GPU, or transport failure is first."
      next_steps:
        - "Confirm the selected interface is reachable between all ranks."
        - "Check host networking/firewall and port-range policy before forcing NCCL_SOCKET_IFNAME."
        - "Validate communicator initialization on the same node set."

  - id: nccl_unresolved_collective_failure
    <<: *insufficient
    probes: [{<<: *probe_insufficient, id: k8s_troubleshooting:nccl_unresolved_collective_failure:p01}]
    question: "Does the available collective timeout still lack a first rank, bootstrap, memory, link, or application failure signal? Healthy diagnosis identifies an earlier typed event. Preserve rank logs and node evidence; do not label the fabric until a discriminator is present."
    verify: "Collect timestamped logs for every rank plus node/GPU events and run a small nccl-tests reproduction on the same topology."
    interpretation: "A generic NCCL timeout alone cannot distinguish application, GPU, host limit, bootstrap, or fabric causes."
    match:
      any: ["nccl warn", "nccl error", "collective operation timeout", "allreduce timed out"]
    conclusion:
      family: insufficient_evidence
      confidence: "low"
      disconfirm:
        - "A timestamped peer, GPU, bootstrap, or fabric failure clearly predates the collective timeout."
      summary: "The collective failed, but current evidence does not identify the initiating rank or transport layer."
      next_steps:
        - "Enable timestamped NCCL WARN/INFO for INIT, BOOTSTRAP, and NET subsystems."
        - "Find the first rank/error and compare affected versus healthy node pairs."
        - "Do not promote a fabric root cause until a low-level test or counter supports it."

  - id: runai_scheduling_failure
    question: "Did the Run:ai scheduler first report quota/fair-share, preemption/reclaim, gang placement, or binder handoff behavior for this workload? Healthy allocation records a successful policy decision and bind. Use the exact scheduler event; default-scheduler predicates belong to the Kubernetes scheduling branch."
    verify: "Identify schedulerName, pod group, project/department node-pool queue, deserved versus over-quota use, priority/preemptibility, and scheduler decision logs."
    interpretation: "Run:ai scheduling policy and kube-scheduler predicates are separate control paths and require different evidence."
    avoid: "Do not call expected reclaim/preemption a platform outage."
    probes:
      - id: k8s_troubleshooting:runai_scheduling_failure:p01
        tool: k8s_read
        arguments_template:
          kind: podgroups
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "scoped Run:ai PodGroup phase, min-members, and scheduling conditions"
        supports_when: ["a PodGroup condition records a quota, gang, or binding decision"]
        refutes_when: ["no relevant PodGroup exists and default-scheduler reports the first failure"]
        source_group: kubernetes_api
    match:
      any: ["runai-scheduler-default", "pod group", podgroup, "gang schedul", fairshare, "over-quota", "over quota", reclaimed, preemptor, "failed to bind"]
    branches:
      - match:
          any: [reclaimed, reclaiming, preemptor, "preempted by higher priority", fairshare]
        next: runai_reclaim_or_preemption
      - match:
          any: ["pod group", podgroup, "gang schedul", minmembers, "sub-group"]
        next: runai_gang_scheduling
      - match:
          any: ["failed to bind", "bind error", "binding rejected", binder]
        next: runai_binding_failure
      - match:
          any: ["over-quota", "over quota", "deserved quota", "max gpu device allocation", "project quota"]
        next: runai_quota_constraint

  - id: runai_reclaim_or_preemption
    <<: *runai_scheduling
    probes: [{<<: *probe_runai_scheduling, id: k8s_troubleshooting:runai_reclaim_or_preemption:p01}]
    question: "Did Run:ai record preemption or reclaim for this workload before its pods were terminated or rescheduled, and which policy/queue caused it? Healthy workload history has no matching policy action. If no action exists, inspect kubelet eviction, normal rollout, or scheduling evidence first."
    verify: "Compare victim and preemptor project/department, node pool, priority, preemptibility, and deserved/over-quota allocation at the decision timestamp."
    interpretation: "Priority preemption and fairness-based reclaim are expected but distinct scheduler decisions."
    match:
      any: [reclaimed, reclaiming, preemptor, "preempted by higher priority", fairshare]
    conclusion:
      family: runai_scheduling_quota
      summary: "Run:ai preempted or reclaimed a preemptible workload according to priority or fairshare policy."
      confidence: "high only when Run:ai events identify reclaim or preemption for this workload and queue"
      disconfirm:
        - "No reclaim decision occurred or Kubernetes scheduling, quota, node, or workload failure occurs first."
      next_steps:
        - "Name the exact policy decision and the workload/queue that received the resource."
        - "If stability is required, place the workload within deserved quota and use the approved non-preemptible policy."
        - "Adjust ranks, quota, or over-quota weights only after reviewing multi-tenant impact."

  - id: runai_gang_scheduling
    <<: *runai_scheduling
    probes: [{<<: *probe_runai_scheduling, id: k8s_troubleshooting:runai_gang_scheduling:p01}]
    question: "Can every required pod or sub-group satisfy gang placement simultaneously under the configured Run:ai policy? Healthy gang scheduling binds the complete group together. If individual pods fail a Kubernetes predicate first, follow capacity, taint, affinity, topology, or PVC evidence instead."
    verify: "Check pod-group hierarchy, min-members, aggregate requests, topology constraints, and the first member that cannot be placed."
    interpretation: "One impossible member keeps the entire distributed workload Pending by design."
    match:
      any: ["pod group", podgroup, "gang schedul", minmembers, "sub-group"]
    conclusion:
      family: runai_scheduling_quota
      summary: "A Run:ai gang or sub-group placement constraint keeps the distributed workload Pending."
      confidence: "high only when Run:ai scheduler events name the gang or subgroup constraint"
      disconfirm:
        - "The workload is not gang-scheduled or Kubernetes predicate, quota, node, or PVC evidence blocks it first."
      next_steps:
        - "Find the first unschedulable member and its exact predicate."
        - "Compare the group's aggregate request with contiguous capacity in the eligible node pool."
        - "Fix that predicate/capacity constraint; do not submit members independently."

  - id: runai_binding_failure
    <<: *runai_scheduling
    probes: [{<<: *probe_runai_scheduling, id: k8s_troubleshooting:runai_binding_failure:p01}]
    question: "Did placement succeed but the Run:ai binder fail to hand off the chosen node to the workload, with a typed binder/controller event? Healthy placement ends in a bound pod. If binding never began, investigate quota/gang policy or default scheduler predicates first."
    verify: "Correlate scheduler decision, binder logs, pod binding event, and GPU-fraction/toolkit state on the selected node."
    interpretation: "A valid placement decision can still fail during resource reservation and Kubernetes binding."
    match:
      any: ["failed to bind", "bind error", "binding rejected", binder]
    conclusion:
      family: runai_scheduling_quota
      summary: "Run:ai selected a node but binding or resource reservation failed."
      confidence: "high only when Run:ai binding/reservation events identify the node and failed resource operation"
      disconfirm:
        - "No Run:ai binding attempt exists or Kubernetes scheduling, node readiness, or workload startup fails first."
      next_steps:
        - "Capture the selected node and exact binder rejection."
        - "Check binder plus node-local Run:ai toolkit state for fractional GPU workloads."
        - "Retry after the reservation/binding state is reconciled."

  - id: runai_quota_constraint
    <<: *runai_scheduling
    question: "Which Run:ai project, queue, fair-share, or resource limit blocks this allocation, and was it exhausted at the incident time? Healthy policy has headroom or an explicit successful allocation. If default-scheduler or Kubernetes ResourceQuota emitted the first event, use that separate path."
    verify: "Evaluate project and department deserved quota, over-quota eligibility, ranks/weights, resource limit, physical capacity, and over-subscription per node pool."
    interpretation: "Unused cluster GPUs do not guarantee this queue is entitled to or can place them."
    probes:
      - id: k8s_troubleshooting:runai_quota_constraint:p01
        tool: k8s_read
        arguments_template:
          kind: projects
          name: "{{project}}"
        incident_time_window: incident
        expected_result_shape: "target Run:ai project quota and allocation status"
        supports_when: ["project status shows the quota or entitlement dimension cited by the scheduler"]
        refutes_when: ["project quota has headroom and another predicate blocked placement first"]
        support_signal_any: ["OverQuota", "PreemptLowerPriority"]
        refute_signal_any: ["Allocated"]
        source_group: kubernetes_api
    match:
      any: ["over-quota", "over quota", "deserved quota", "max gpu device allocation", "project quota"]
    conclusion:
      family: runai_scheduling_quota
      summary: "Run:ai queue entitlement or limits prevent the workload from receiving requested resources."
      confidence: "high only when Run:ai queue policy or entitlement identifies the denied resource request"
      disconfirm:
        - "Queue entitlement has capacity or Kubernetes placement, node health, or another policy is first."
      next_steps:
        - "Identify the exact project/department and node-pool limit."
        - "Separate entitlement from physical fragmentation and workload topology."
        - "Change quota/limit only with the intended tenant fairness impact documented."

  - id: authorization_failure
    question: "Did the exact request fail as Unauthorized/authentication or Forbidden/RBAC, and which subject, credential, verb, and resource were involved? Healthy scoped calls authenticate and authorize. Capture the response class first; API unavailability or webhook errors point to the control-plane branch instead."
    verify: "Identify the issuer, authenticated subject, exact API/resource/verb, namespace, and credential/certificate expiry from the rejection."
    interpretation: "Authentication establishes identity; authorization decides permission. Their remedies are different."
    avoid: "Do not grant cluster-admin to diagnose a missing narrow permission."
    probes:
      - id: k8s_troubleshooting:authorization_failure:p01
        tool: k8s_read
        arguments_template:
          kind: events
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "scoped Forbidden/Unauthorized event messages with subject and resource tuple"
        supports_when: ["the event records the same denied subject, verb, resource, or credential error"]
        refutes_when: ["the API event shows an unrelated scheduling or runtime failure first"]
        support_signal_any: ["Forbidden", "Unauthorized", "cannot list resource", "certificate has expired"]
        source_group: kubernetes_api
    match:
      any: [forbidden, unauthorized, "cannot list resource", "cannot create resource", saml, oidc, "invalid token", "certificate has expired"]
    branches:
      - match:
          any: [forbidden, "cannot list resource", "cannot create resource", "cannot get resource"]
        next: kubernetes_rbac_failure
      - match:
          any: [unauthorized, saml, oidc, "invalid token", "token used before issued", "certificate has expired"]
        next: identity_or_credential_failure

  - id: kubernetes_rbac_failure
    <<: *platform_auth
    probes: [{<<: *probe_platform_auth, id: k8s_troubleshooting:kubernetes_rbac_failure:p01}]
    question: "Does a Kubernetes API response name Forbidden for the same authenticated subject, verb, resource, and namespace that failed? Healthy RBAC allows that exact scoped operation. If credentials are invalid or the API is unavailable before authorization, route to identity or control plane instead."
    verify: "Use the rejection tuple and `kubectl auth can-i` impersonation for the exact service account/user and namespace."
    interpretation: "A precise Forbidden response proves the API is reachable and identity is known, but permission is absent."
    match:
      any: [forbidden, "cannot list resource", "cannot create resource", "cannot get resource"]
    conclusion:
      family: platform_auth_error
      summary: "Kubernetes RBAC denies the required operation for the authenticated subject."
      confidence: "high only when the API response names Forbidden and the same subject, resource, and verb"
      disconfirm:
        - "The request is authorized or authentication, admission, network, or API availability fails before RBAC."
      next_steps:
        - "Confirm the exact denied verb/resource/subresource and namespace."
        - "Trace RoleBinding/ClusterRoleBinding to the subject and correct only the missing permission."
        - "Re-run `auth can-i` and the original operation after the least-privilege change."

  - id: identity_or_credential_failure
    <<: *platform_auth
    probes: [{<<: *probe_platform_auth, id: k8s_troubleshooting:identity_or_credential_failure:p01}]
    question: "Did token, OIDC, SAML, certificate, audience, issuer, or clock validation fail before RBAC evaluation? Healthy credentials validate for the requested endpoint and time. If a valid identity is then Forbidden, investigate least-privilege RBAC rather than rotating credentials blindly."
    verify: "Check issuer/discovery metadata, audience, clock, expiry/not-before, SAML attributes, and the component validating the token/certificate."
    interpretation: "A token can be structurally valid but rejected because issuer, audience, time, or required identity claims differ."
    match:
      any: [unauthorized, saml, oidc, "invalid token", "token used before issued", "certificate has expired"]
    conclusion:
      family: platform_auth_error
      summary: "Identity-provider configuration or credential validation prevents authentication."
      confidence: "high only when token, OIDC, certificate, or identity-provider validation fails for the request"
      disconfirm:
        - "Credentials validate successfully and RBAC, admission, API availability, or workload behavior fails later."
      next_steps:
        - "Capture the validator's exact reason without exposing token contents."
        - "Compare issuer/audience/claims/time against the configured identity provider."
        - "Rotate or correct the credential/configuration, then verify one scoped login/API request."

  - id: observability_failure
    question: "Does direct scoped Kubernetes/GPU state remain healthy while the alert's raw or derived metric is stale, missing, or contradictory at the same timestamp? Healthy telemetry matches live target state. If direct state is unhealthy too, investigate the workload or node instead of the dashboard."
    verify: "Compare raw source metrics and Kubernetes state with exporter, scrape target, aggregation, query, and dashboard values at the same timestamp."
    interpretation: "A broken measurement path can produce an incident without a workload failure."
    avoid: "Do not restart a healthy workload to repair a dashboard or exporter."
    probes:
      - id: k8s_troubleshooting:observability_failure:p01
        tool: promql_query
        arguments_template:
          query: "kube_pod_status_phase{namespace=\"{{namespace}}\",pod=\"{{pod}}\"}"
        incident_time_window: incident
        expected_result_shape: "raw pod phase series for the affected target"
        supports_when: ["raw series is absent/stale while Kubernetes direct state is healthy or differs"]
        refutes_when: ["raw series agrees with Kubernetes state and the alert is a real workload failure"]
        source_group: prometheus
    match:
      any: ["no metrics", "metrics missing", "stale metrics", "thanos-receive", "dcgm_fi_dev", "target down", "dashboard shows"]
    branches:
      - match:
          any: ["thanos-receive", "target down", "scrape failed", "remote write", "metrics missing"]
        next: metrics_pipeline_failure
      - match:
          any: ["dashboard shows", "stale metrics", "gpu number is 0", "dcgm_fi_dev"]
        next: observed_state_mismatch

  - id: metrics_pipeline_failure
    <<: *observability
    question: "Which hop first stopped carrying fresh samples: exporter, scrape target, remote write, receiver, storage, query, or dashboard? Healthy samples advance end-to-end for the alert target. Compare timestamps in sequence and remediate the first stale hop, not the last empty query."
    verify: "Walk source exporter → scrape target → remote-write/receiver → query → dashboard and compare last-sample timestamps."
    interpretation: "The first stale hop owns the observability failure; later empty queries are downstream symptoms."
    probes:
      - id: k8s_troubleshooting:metrics_pipeline_failure:p01
        tool: promql_query
        arguments_template:
          query: "kube_pod_status_phase{namespace=\"{{namespace}}\",pod=\"{{pod}}\"}"
        incident_time_window: incident
        expected_result_shape: "raw target pod phase series and sample timestamp"
        supports_when: ["the raw series is absent or stale despite an existing target pod"]
        refutes_when: ["the raw series is current and only a derived dashboard query is wrong"]
        support_signal_any: ["stale", "absent"]
        refute_signal_any: ["Running"]
        source_group: prometheus
    match:
      any: ["thanos-receive", "target down", "scrape failed", "remote write", "metrics missing"]
    conclusion:
      family: observability_accuracy
      summary: "A metrics collection, transport, or storage hop stopped delivering fresh samples."
      confidence: "high only when missing/stale series is traced to a failed scrape, transport, receiver, or storage hop"
      disconfirm:
        - "Raw source metrics are fresh and the alert is caused by query logic, labels, or threshold configuration."
      next_steps:
        - "Locate the first hop whose last-sample timestamp stops advancing."
        - "Check exporter health, scrape error, receiver/storage capacity, and recent config changes at that hop."
        - "Verify data freshness end-to-end after recovery."

  - id: observed_state_mismatch
    <<: *observability
    question: "Does the exact dashboard value/query disagree with a direct Kubernetes or GPU read for the same target and incident time? Healthy derived values match live state within expected scrape delay. If they agree, return to the real workload/node failure rather than opening an observability incident."
    verify: "Compare the exact dashboard query/window with live object state and raw exporter series, including labels and staleness."
    interpretation: "A healthy direct state plus stale/missing derived series is an accuracy incident, not resource loss."
    probes:
      - id: k8s_troubleshooting:observed_state_mismatch:p01
        tool: k8s_read
        arguments_template:
          kind: pods
          name: "{{pod}}"
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "live target pod phase and readiness state"
        supports_when: ["direct Kubernetes state disagrees with the alert/dashboard value"]
        refutes_when: ["direct Kubernetes state matches the reported unhealthy value"]
        support_signal_any: ["Running", "Ready=True"]
        refute_signal_any: ["Failed", "NotReady"]
        source_group: kubernetes_api
    match:
      any: ["dashboard shows", "stale metrics", "gpu number is 0", "dcgm_fi_dev"]
    conclusion:
      family: observability_accuracy
      summary: "Derived dashboard or metric state disagrees with the live cluster/GPU state."
      confidence: "high only when a direct live Kubernetes or GPU read contradicts the derived metric at the same time"
      disconfirm:
        - "The live state matches the derived unhealthy value or the mismatch is an expected scrape/window delay."
      next_steps:
        - "Document the raw/live truth and the mismatching derived value."
        - "Inspect label joins, query windows, exporter coverage, and stale-series handling."
        - "Correct the measurement path and close the alert without disrupting healthy workloads."

  - id: insufficient_k8s_evidence
    <<: *insufficient
    question: "Is there an incident-era, target-verified event, state transition, previous log, or change that identifies the first failure layer? Healthy diagnosis can name one. If evidence remains generic or unscoped, collect the minimum discriminator and keep the result insufficient rather than promoting keywords or probe text."
    verify: "Collect pod describe/events, current and previous logs, node name/conditions, and the nearest recent change before selecting an owner."
    interpretation: "An unfamiliar or sparse alert is not proof of a Kubernetes root cause."
    probes:
      - id: k8s_troubleshooting:insufficient_k8s_evidence:p01
        tool: k8s_describe
        arguments_template:
          kind: pods
          name: "{{pod}}"
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "target pod status, last state, and chronological Events"
        supports_when: ["a first failing control point appears in the pod status or Events"]
        refutes_when: ["the target does not exist or no incident-era signal is available"]
        support_signal_any: ["FailedScheduling", "OOMKilled", "ImagePullBackOff", "FailedMount"]
        refute_signal_any: ["Unknown"]
        source_group: kubernetes_api
    match:
      always: true
    conclusion:
      family: insufficient_evidence
      summary: "The available evidence does not identify a Kubernetes failure layer yet."
      confidence: "low until an incident-era event, state transition, log, or change identifies the first failed control point"
      disconfirm:
        - "A scoped timestamped signal already identifies scheduler, storage, node, network, GPU, control-plane, or workload failure."
      next_steps:
        - "Preserve the oldest event and exact error text rather than restarting the workload."
        - "Collect pod phase/container states, node conditions, and a short change timeline."
        - "Re-enter the decision tree from the first observed failing control point."

  - id: pod_network_failure
    <<: *cluster_network
    question: "Did the affected pod first fail sandbox creation, CNI setup, or DNS resolution before application startup? Healthy pods create a sandbox and resolve required names. Use the typed event to choose CNI, DNS, endpoints, or policy; if sandbox succeeds, do not blame CNI for a later application timeout."
    probes:
      - id: k8s_troubleshooting:pod_network_failure:p01
        tool: k8s_describe
        arguments_template:
          kind: pods
          name: "{{pod}}"
          namespace: "{{namespace}}"
        incident_time_window: incident
        expected_result_shape: "pod sandbox/CNI event reason and affected node"
        supports_when: ["a sandbox or CNI event occurs before the container starts"]
        refutes_when: ["the pod sandbox was created and a later DNS/service/application signal failed first"]
        support_signal_any: ["FailedCreatePodSandBox", "NetworkPluginNotReady"]
        refute_signal_any: ["PodReadyToStartContainers=True"]
        source_group: kubernetes_api
    match:
      any:
        - failed to create pod sandbox
        - failed to setup network for sandbox
        - cni plugin
        - network plugin
        - coredns
        - no such host
    conclusion:
      family: cluster_network_error
      summary: "Pod startup or reachability is blocked by cluster networking."
      confidence: "high only when sandbox, CNI, DNS, or dataplane evidence predates container or application failure"
      disconfirm:
        - "Pod networking is healthy and storage, image, runtime, endpoint, node, or workload evidence occurs first."
      next_steps:
        - "Check the CNI daemonset on the target node and recent sandbox events."
        - "If DNS is implicated, check CoreDNS pods and resolve kubernetes.default from a pod."
        - "Inspect NetworkPolicy, IPAM exhaustion, MTU, or kube-proxy only if the event points there."

  - id: storage_backend_failure
    question: "Does the first storage signal name a backend server or filesystem rather than a Kubernetes object transition? A healthy backend permits the affected node to use an already valid claim; stale handles, access denial, read-only filesystems, and I/O latency must be timestamped before pod retries. Follow the exact backend signature next."
    verify: "Read the PVC/PV state alongside the exact CSI or workload error. Bound/attached objects do not clear NFS, Ceph, or filesystem health; distinguish object lifecycle events from server-side responses."
    interpretation: "This router separates k8s_storage_error (PVC/PV/CSI object control path) from storage_backend_error (NFS/Ceph/filesystem server path)."
    avoid: "Do not turn a generic mount retry or a Bound PVC into proof of backend health without the affected node's exact error."
    match:
      any: ["stale file handle", "read-only file system", "nfs server", cephfs, "ceph health", "input/output error", "mount access denied", "storage latency", provisioningfailed]
    branches:
      - match:
          any: ["stale file handle", "nfs server not responding", "nfs server"]
        next: backend_nfs_stale_handle
      - match:
          any: ["mount access denied", "access denied by server", "permission denied"]
        next: backend_mount_access_denied
      - match:
          any: [provisioningfailed, "provisioner failed", "create volume failed", "ceph provision"]
        next: backend_provisioner_failure
      - match:
          any: ["input/output error", "read-only file system", "storage latency", "ceph health"]
        next: backend_latency_or_filesystem

  - id: backend_nfs_stale_handle
    <<: *storage_backend
    probes: [{<<: *probe_storage_backend, id: k8s_troubleshooting:backend_nfs_stale_handle:p01}]
    question: "Did the affected node receive an NFS stale-handle or server-not-responding error before the pod failed? Healthy mounts keep a valid file handle across the incident; if the exact NFS error is present, inspect export/server state, otherwise return to CSI/PVC object transitions."
    match:
      any: ["stale file handle", "nfs server not responding", "nfs server"]
    conclusion:
      family: storage_backend_error
      summary: "The backing NFS server or export invalidated the affected node's file handle."
      confidence: "high only when the incident-era mount/CSI/workload error names a stale handle or NFS server response"
      disconfirm: ["PVC/PV object failure predates any NFS error, or the affected node has no matching NFS/server signature."]
      next_steps: ["Capture the export, server, and affected-node error timestamps.", "Restore export/server availability or remount only under the storage recovery procedure.", "Confirm I/O from the affected node before retrying the workload."]

  - id: backend_mount_access_denied
    <<: *storage_backend
    probes: [{<<: *probe_storage_backend, id: k8s_troubleshooting:backend_mount_access_denied:p01}]
    question: "Did the backend deny mount access for the affected node, identity, export, or path? Healthy backend policy admits the exact node/path used by the PV; a server-side access-denied response requires export or credential investigation, while a Kubernetes admission denial follows the auth path instead."
    match:
      any: ["mount access denied", "access denied by server", "permission denied"]
    conclusion:
      family: storage_backend_error
      summary: "The backing storage server denied the affected node or mount path."
      confidence: "high only when CSI/kubelet/workload evidence records a backend mount access-denied response"
      disconfirm: ["The denial is Kubernetes RBAC/admission, or no backend server response is present for the target mount."]
      next_steps: ["Capture the exact server/export/path and client identity without exposing credentials.", "Correct the narrow backend export or credential policy.", "Verify the target node can access the intended path before restarting the workload."]

  - id: backend_provisioner_failure
    <<: *storage_backend
    probes: [{<<: *probe_storage_backend, id: k8s_troubleshooting:backend_provisioner_failure:p01}]
    question: "Did a PVC provisioner fail because its backing storage service rejected or could not create the requested volume? Healthy provisioner retries create a bound PV; inspect the provisioner error for NFS/Ceph/backend capacity or authorization before treating ProvisioningFailed as a Kubernetes object-only fault."
    match:
      any: [provisioningfailed, "provisioner failed", "create volume failed", "ceph provision"]
    conclusion:
      family: storage_backend_error
      summary: "The PVC provisioner reached a backing-storage failure while creating the volume."
      confidence: "high only when the provisioner event/log includes a backend server, capacity, authorization, or filesystem error"
      disconfirm: ["The StorageClass/PVC configuration is invalid without a backend response, or binding succeeds before the incident."]
      next_steps: ["Preserve the full provisioner error and StorageClass parameters.", "Check backing-store capacity, health, and provisioner credentials/server reachability.", "Retry provisioning only after the backend condition recovers."]

  - id: backend_latency_or_filesystem
    <<: *storage_backend
    probes: [{<<: *probe_storage_backend, id: k8s_troubleshooting:backend_latency_or_filesystem:p01}]
    question: "Did the backing store become read-only, return I/O errors, or exceed the incident's storage latency window for the affected path? Healthy storage completes the same operation on a peer; a backend signature must precede application timeout or mount retry before assigning server-side ownership."
    match:
      any: ["input/output error", "read-only file system", "storage latency", "ceph health"]
    conclusion:
      family: storage_backend_error
      summary: "Backing-store filesystem health or latency prevents the target workload from using storage."
      confidence: "high only when read-only, I/O, Ceph health, or latency evidence is scoped to the affected backend/path during the incident"
      disconfirm: ["The backend is healthy for the same path and an earlier PVC, mount, network, or application signal explains the failure."]
      next_steps: ["Capture backend health and latency for the affected pool/export/path.", "Resolve read-only, capacity, quorum, or latency condition through the storage owner.", "Verify bounded I/O on the target path before retrying the workload."]
