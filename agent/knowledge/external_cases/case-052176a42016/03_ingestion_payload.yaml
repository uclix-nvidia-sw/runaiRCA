incident:
  title: CreateContainer timeout followed by stale container-name reservation conflict
    during workload startup
  masked_summary: A new interactive workload on one GPU node had a roughly 120-second
    CreateContainer timeout. Retries then failed because the container name remained
    reserved until stale state was removed. NFS unresponsive/recovery signals and
    directory-access stalls overlapped the event; Support favored node-level NFS/storage
    instability over a Run:ai lifecycle defect, but no post-update validation was
    supplied.
  status: unresolved
  occurred_at: '2026-06-02'
  resolved_at: null
  family: storage_backend_error
  family_confidence: medium
  observed_mechanism: NFS/storage access instability overlapped a main-container CreateContainer
    timeout; the incomplete create retained the name reservation, causing retry conflicts
    until stale state was removed.
  observed_mechanism_confidence: medium
  confirmed_mechanism: The repeated reservation conflicts were a downstream effect
    of the timed-out/incomplete CreateContainer attempt retaining the name until stale-container
    removal.
  confirmed_mechanism_confidence: medium
