incident:
  title: Reclaim-path slice-bounds panic stopped Run:ai scheduling
  masked_summary: Run:ai 2.22.27 repeatedly panicked in the KAI scheduler proportion
    plugin during reclaim attempts for masked 128-GPU and 64-GPU workloads, interrupting
    scheduling and leaving jobs pending. Support diagnosed a reclaim-mechanism scheduler
    bug and proposed an upgrade, but no upgrade result or post-fix validation was
    supplied before administrative closure.
  status: unresolved
  occurred_at: '2025-09-20'
  resolved_at: null
  family: runai_control_plane_error
  family_confidence: high
  observed_mechanism: Multiple quoted reclaim attempts terminated with a slice-bounds
    panic in proportionPlugin.getVictimResources; the scheduler restarted and new
    scheduling was interrupted.
  observed_mechanism_confidence: high
  confirmed_mechanism: Support's final diagnosis attributed the scheduler panic and
    pending jobs to a bug in the scheduler reclaim mechanism.
  confirmed_mechanism_confidence: medium
searchable_context:
  normalized_symptoms:
  - runai-scheduler-default enters CrashLoopBackOff during reclaim
  - new jobs are not scheduled and remain pending
  - same slice-bounds panic recurs across different GPU requests
  - missing PyTorchJob message appears after scheduler crash as a secondary symptom
  metric_signatures: []
  error_signatures:
  - 'runtime error: slice bounds out of range [:4] with capacity 1'
  - proportionPlugin).getVictimResources
  issue_references: []
  canonical_component_tokens:
  - runai-scheduler-default
  - KAI scheduler proportion plugin
  - pod-grouper
  version_tokens:
  - Run:ai control plane 2.22.27
  - Run:ai cluster 2.22.27
  - Kubernetes v1.32.5
  - Support-recommended 2.22.50 upgrade not validated
  - customer-planned 2.23.10 upgrade not validated
  trigger_tokens:
  - scheduler reclaim phase
  - 64-GPU reclaim request
  - 128-GPU reclaim request
  - proportion plugin victim-resource calculation
  retrieval_keywords:
