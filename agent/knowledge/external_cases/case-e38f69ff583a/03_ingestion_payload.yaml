incident:
  title: Thanos Receive OOMKilled; stable after CPU resource increase
  masked_summary: Run:ai Thanos Receive repeatedly exceeded a 64 GB memory limit under
    a large reported metrics ingestion workload. Increasing CPU request/limit while
    leaving memory unchanged was followed by reported stability, but the original
    memory-growth trigger was not confirmed.
  status: mitigated
  occurred_at: null
  resolved_at: null
  family: observability_accuracy
  family_confidence: high
  observed_mechanism: Repeated Thanos Receive OOMKilled coexisted with a large ingestion
    workload; additional CPU with unchanged memory was followed by stability, supporting
    CPU-limited processing as a contributing mechanism.
  observed_mechanism_confidence: medium
  confirmed_mechanism: null
  confirmed_mechanism_confidence: low
