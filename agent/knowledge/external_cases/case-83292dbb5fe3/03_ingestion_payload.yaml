incident:
  title: Negative CPU compute utilization caused by duplicate node-exporter collection
  masked_summary: CPU compute utilization in the Resource Allocation dashboard was
    negative. Support diagnosed simultaneous ServiceMonitor and PodMonitor discovery
    for node-exporter, which collected CPU idle-time metrics twice. The customer reported
    disabling the PodMonitor and then seeing a positive value.
  status: resolved
  occurred_at: '2026-03-17'
  resolved_at: '2026-03-20T09:47:00'
  family: observability_accuracy
  family_confidence: medium
  observed_mechanism: A negative CPU utilization display was followed by a positive
    display after the customer reported disabling the node-exporter PodMonitor.
  observed_mechanism_confidence: medium
  confirmed_mechanism: Support attributed the negative value to duplicate collection
    of node-exporter CPU idle-time metrics through both a ServiceMonitor and a PodMonitor;
    the doubled idle count drove the utilization formula negative.
  confirmed_mechanism_confidence: medium
