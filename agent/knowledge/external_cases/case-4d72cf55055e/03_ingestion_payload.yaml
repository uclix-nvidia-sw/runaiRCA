incident:
  title: Workloads UI request burst and slow workloads_view queries exhausted PostgreSQL
    connections
  masked_summary: 여러 Workloads Web UI 검색/필터 refresh가 장시간 실행된 workloads_view queries와
    겹쳐 backend PostgreSQL connections가 소진되었다. workloads service restart는 즉시 복구했지만
    예방 변경의 적용과 재검증은 확인되지 않았다.
  status: mitigated
  occurred_at: '2026-05-06'
  resolved_at: null
  family: runai_control_plane_error
  family_confidence: high
  observed_mechanism: workloads_view full-text/sort queries waited on BufFileWrite
    while connections remained held, and continued workload-list requests accumulated
    until SQLSTATE 53300.
  observed_mechanism_confidence: medium
  confirmed_mechanism: Support final analysis correlated the burst to Workloads Web
    UI search/filter refreshes, including one approximately one-second browser session;
    slow disk-spilling queries caused connection accumulation and max_connections
    exhaustion.
  confirmed_mechanism_confidence: medium
