incident:
  title: Scheduler consolidation reallocated a running distributed workload
  masked_summary: Two scheduler consolidation events selected a lower-priority distributed
    workload as the victim for incoming workloads from higher-priority projects. Support
    attributed the behavior to priority hierarchy plus over-quota configuration, but
    the diagnostic archive is unavailable and no corrective action or recurrence check
    is documented.
  status: unresolved
  occurred_at: '2025-09-25'
  resolved_at: null
  family: runai_scheduling_quota
  family_confidence: high
  observed_mechanism: Scheduler consolidation entries listed the distributed workload
    master and workers as reallocation victims, and the customer reported stop/restart
    behavior.
  observed_mechanism_confidence: high
  confirmed_mechanism: Support attributed victim selection to project priority hierarchy
    combined with over-quota configuration in a shared department queue.
  confirmed_mechanism_confidence: medium
