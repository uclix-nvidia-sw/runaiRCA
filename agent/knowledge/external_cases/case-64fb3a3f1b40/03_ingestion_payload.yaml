incident:
  title: Long-stuck terminating fractional-GPU pod sustained a pipeline-only scheduler
    loop
  masked_summary: Two 0.5-GPU workloads repeatedly entered Pipelined/Pending on a
    node reported at 8/8 GPU allocation. Support concluded that a different 0.5-GPU
    pod stuck Terminating for 4d4h counted as releasing for fit, while existing shared
    GPU usage added a dominant 1,000-point score; idle-only allocation then failed
    and the cycle repeated for about 53 minutes. Force-delete was proposed but no
    action result or Engineering response was supplied before administrative closure.
  status: unresolved
  occurred_at: '2026-04-10'
  resolved_at: null
  family: runai_scheduling_quota
  family_confidence: high
  observed_mechanism: Two fractional-GPU workloads were pipelined to a fully allocated
    node, and Support reported repeated allocation-then-pipeline cycles while another
    fractional-GPU pod remained Terminating for 4d4h.
  observed_mechanism_confidence: medium
  confirmed_mechanism: Support concluded that releasing GPU memory let fit pass, shared
    GPU usage contributed the dominant 1,000-point score, and absent idle capacity
    forced repeated pipeline-only scheduling without a dedicated single-workload timeout.
  confirmed_mechanism_confidence: medium
