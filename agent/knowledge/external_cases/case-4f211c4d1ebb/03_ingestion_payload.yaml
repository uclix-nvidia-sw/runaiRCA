  title: Run:ai v2.23.31 all-blocked storage policy selector fallback
  masked_summary: An all-blocked storage policy on v2.23.31 was reported to expose
    all storage options in the workload form. Differential testing did not reproduce
    the behavior on v2.24.74. Engineering planned a fix for v2.23.71, but no affected-environment
    post-fix validation was supplied.
