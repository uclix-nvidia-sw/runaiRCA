incident:
  title: runai-go-operator-tls-secret ownership conflict during runai-cluster upgrade
  masked_summary: A runai-cluster 2.24.65 to 2.24.67 Helm upgrade failed on a managed-by
    label field-ownership conflict for an operator TLS Secret. Deleting the Secret
    and retrying was followed by automatic recreation and successful upgrade completion.
    Support described a known Helm-upgrade interaction and a future permanent-fix
    effort, but no Engineering final RCA or fixed release was supplied.
  status: mitigated
  occurred_at: null
  resolved_at: null
  family: platform_lifecycle_change
  family_confidence: high
  observed_mechanism: Helm apply failed because helm-hooks-handler held ownership
    of the app.kubernetes.io/managed-by label on runai-go-operator-tls-secret.
  observed_mechanism_confidence: high
  confirmed_mechanism: Support attributed the failure to an internal pre-upgrade process
    and Helm contending for the same metadata label on the TLS Secret.
  confirmed_mechanism_confidence: medium
searchable_context:
  normalized_symptoms:
  - runai-cluster Helm upgrade failed on Kubernetes Secret field ownership conflict
  - operator TLS Secret deletion followed by automatic recreation and successful upgrade
    retry
