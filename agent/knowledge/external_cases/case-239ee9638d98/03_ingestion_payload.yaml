incident:
  title: Distributed training Web UI rejected locked master hostPath policy on Run:ai
    2.23.x
  masked_summary: A distributed training Web UI submission was rejected at masterSpec.storage.hostPath
    under the tested locked-policy and master-toggle conditions on 2.23.30, 2.23.31,
    and 2.23.39, while API or CLI submission succeeded; customer validation showed
    UI and API success on 2.23.60.
  status: resolved
  occurred_at: '2026-02-02'
  resolved_at: '2026-03-23'
  family: runai_control_plane_error
  family_confidence: high
  observed_mechanism: The Web UI path rejected the distributed workload at masterSpec.storage.hostPath
    when the master-setup toggle was enabled under the tested policy conditions; the
    API or CLI path and toggle-disabled UI path succeeded.
  observed_mechanism_confidence: high
  confirmed_mechanism: null
  confirmed_mechanism_confidence: low
