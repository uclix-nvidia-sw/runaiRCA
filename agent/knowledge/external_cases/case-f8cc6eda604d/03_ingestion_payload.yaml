incident:
  title: CDI-prefixed GPU identifier suppressed fractional GPU metrics
  masked_summary: On Run:AI 2.24.58 with GPU Operator 25.10.0 and CDI enabled, fractional
    workloads ran successfully but fractional GPU metrics were absent. A quoted metrics
    comparison showed a CDI-prefixed GPU identifier in the failing path instead of
    a pure UUID. Disabling CDI restored metrics as a workaround. Support relayed Engineering
    confirmation and later announced fixes in 2.23.62 and 2.24.67; a comparative 2.24.67
    test succeeded with CDI enabled, but affected-customer-environment revalidation
    was not reported.
  status: resolved
  occurred_at: '2026-03-16'
  resolved_at: '2026-04-16T19:26:00'
  family: observability_accuracy
  family_confidence: high
  observed_mechanism: Fractional metrics were absent when runai_pod_gpu_info carried
    a CDI-prefixed GPU value, appeared after CDI was disabled in a tested environment,
    and later appeared with CDI enabled after a comparative environment was upgraded
    to 2.24.67.
  observed_mechanism_confidence: high
  confirmed_mechanism: The CDI-prefixed GPU identifier emitted with GPU Operator 25.10.0
    did not match the pure GPU UUID expected by the Run:AI metrics pipeline, preventing
    fractional metrics from being populated.
  confirmed_mechanism_confidence: medium
