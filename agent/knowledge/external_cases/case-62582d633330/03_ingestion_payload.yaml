incident:
  title: Thanos Receive WAL write failed with stale NFS file handle during metric
    gap
  masked_summary: A customer reported an approximately 12-hour Run:AI metric-collection
    gap and quoted repeated Thanos Receive errors in which committing samples failed
    during WAL writes with stale NFS file handle. Support preliminarily pointed to
    the storage side and proposed NFS checks and remount/restart. The customer requested
    closure while planning further investigation; no NFS configuration confirmation,
    executed mitigation, recovery verification, permanent resolution, or Engineering
    confirmation was supplied.
  status: unresolved
  occurred_at: '2025-09-30'
  resolved_at: null
  family: storage_backend_error
  family_confidence: medium
  observed_mechanism: During the reported metric-collection gap, repeated quoted Thanos
    Receive errors showed commit-samples failures while writing the WAL because of
    a stale NFS file handle.
  observed_mechanism_confidence: medium
  confirmed_mechanism: null
  confirmed_mechanism_confidence: low
