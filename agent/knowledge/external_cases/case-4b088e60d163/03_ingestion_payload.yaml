incident:
  title: PVC canAdd policy gates existing-PVC use without native lifecycle separation
  masked_summary: A Run:ai 2.24.65 policy set storage.pvc.instances.canAdd to false
    to block new PVC creation, and the customer reported that existing PVCs could
    not be mounted. NVIDIA Support diagnosed designed policy behavior that gates PVC
    workload entries without distinguishing new creation from existing use. Support
    proposed an explicit defaults allow list, but no execution or result was supplied
    and the native feature request remained open at administrative closure.
  status: unresolved
  occurred_at: '2026-04-12'
  resolved_at: null
  family: runai_control_plane_error
  family_confidence: medium
  observed_mechanism: With no PVC instances listed in policy defaults and storage.pvc.instances.canAdd
    set to false, the customer reported that existing PVCs could not be mounted.
  observed_mechanism_confidence: medium
  confirmed_mechanism: NVIDIA Support diagnosed that canAdd gates addition of PVC
    entries to a workload without natively distinguishing new-PVC creation from existing-PVC
    use; Support stated that explicit default-listed PVC names are allowed while unlisted
    names remain blocked.
  confirmed_mechanism_confidence: medium
