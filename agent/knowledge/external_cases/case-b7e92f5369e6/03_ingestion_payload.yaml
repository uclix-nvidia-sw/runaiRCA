incident:
  title: DataVolume-backed workload blocked by NFS export access denial
  masked_summary: A workload using a cloned DataVolume failed at the CSI/NFS mount
    step with an access-denied response, while direct use of the source PVC reportedly
    worked. Support attributed the difference to access rules on the newly provisioned
    storage export. The case was closed without a verified fix because the feature
    would not be used.
  status: unresolved
  occurred_at: '2026-03-16'
  resolved_at: null
  family: storage_backend_error
  family_confidence: medium
  observed_mechanism: A DataVolume-backed workload reached the Kubernetes/CSI NFS
    mount step and the NFS server rejected the newly provisioned export with an access-denied
    response, while direct use of the source PVC was reported to mount successfully.
  observed_mechanism_confidence: medium
  confirmed_mechanism: null
  confirmed_mechanism_confidence: low
