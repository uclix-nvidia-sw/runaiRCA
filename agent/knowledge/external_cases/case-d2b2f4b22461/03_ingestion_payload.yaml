incident:
  title: NCCL NVLS invalid argument after Fabric Manager/GPU registration desynchronization
  masked_summary: On an HGX H200 Kubernetes node, NCCL NVLS multicast initialization
    failed persistently with CUDA invalid argument. Support diagnosed Fabric Manager
    restart without GPU reset/reboot, leaving GPU registration handles out of sync.
    The node was rebooted after evidence capture, but post-recovery NVLS validation
    was deferred.
  status: mitigated
  occurred_at: '2026-05-28'
  resolved_at: null
  family: network_fabric_error
  family_confidence: high
  observed_mechanism: NVLS multicast setup failed with CUDA invalid argument while
    the non-NVLS path remained usable; failure persisted until recovery.
  observed_mechanism_confidence: high
  confirmed_mechanism: Fabric Manager restarted while GPUs remained initialized; absent
    GPU reset/reboot, GPUs did not re-register and multicast-team setup used handles
    the new session did not recognize.
  confirmed_mechanism_confidence: medium
