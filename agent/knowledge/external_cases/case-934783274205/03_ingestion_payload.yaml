incident:
  title: Repeated Workspace-does-not-exist records during cluster-agent workload status
    synchronization
  masked_summary: The runai-backend-backend pod repeatedly logged that a masked Workspace
    identifier did not exist at WorkloadsDao:132. Support diagnosed a cluster-agent
    workload-status synchronization attempt after the corresponding backend workload
    record had ceased to exist and characterized the record as non-impacting cosmetic
    noise. The customer planned resource cleanup and monitoring but provided no execution
    or recurrence result before requesting closure.
  status: unresolved
  occurred_at: '2026-03-19'
  resolved_at: null
  family: runai_control_plane_error
  family_confidence: medium
  observed_mechanism: Repeated backend DAO lookups for a masked Workspace identifier
    returned "does not exist" at WorkloadsDao:132.
  observed_mechanism_confidence: high
  confirmed_mechanism: Support's final diagnosis was that the cluster agent attempted
    to synchronize current workload status after the corresponding workload record
    no longer existed in the backend database.
  confirmed_mechanism_confidence: medium
