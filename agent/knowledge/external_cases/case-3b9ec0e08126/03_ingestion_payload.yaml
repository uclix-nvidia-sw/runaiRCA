incident:
  title: Recurring GPU dashboard corruption after ephemeral-storage eviction and duplicate
    pod GPU metrics
  masked_summary: A workload with no ephemeral-storage request was diagnosed as being
    evicted and restarted under node storage pressure. Restarted GPU pods produced
    duplicate per-pod GPU series, runai_pod_info_unique failed with many-to-many matching,
    and GPU dashboards became incorrect. One pod deletion temporarily restored the
    dashboard, but the issue recurred and the proposed storage fix was not revalidated.
  status: unresolved
  occurred_at: '2026-01-27'
  resolved_at: null
  family: node_kubelet_pressure
  family_confidence: medium
  observed_mechanism: A quoted Prometheus failure contained two runai_pod_gpu_info_fixed
    series for one masked pod UUID; deleting the failed pod restored the dashboard
    once, recurrence followed, and Support later quoted an eviction with 36591904Ki
    used and an ephemeral-storage request of zero.
  observed_mechanism_confidence: high
  confirmed_mechanism: Support linked a missing ephemeral-storage request to node-pressure
    eviction and restart churn, restart churn to duplicate GPU metrics, and duplicate
    metrics to runai_pod_info_unique failure and incorrect dashboards. Fractional
    GPU was a likelihood-increasing factor rather than the direct cause.
  confirmed_mechanism_confidence: medium
