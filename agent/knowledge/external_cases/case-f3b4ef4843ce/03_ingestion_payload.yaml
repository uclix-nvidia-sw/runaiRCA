incident:
  title: PostgreSQL 17 psql query incompatibility in Run:ai database paths
  masked_summary: 'In a customer-reported PostgreSQL 17 environment, Run:ai connection-test
    and upgrade paths issued psql \l and returned "ERROR: column d.daticulocale does
    not exist." A manual \dn substitution reportedly worked, while Support relayed
    that only PostgreSQL 16 was supported. No downgrade or permanent product resolution
    was verified.'
  status: mitigated
  occurred_at: '2026-03-11'
  resolved_at: null
  family: runai_control_plane_error
  family_confidence: medium
  observed_mechanism: In the customer-reported PostgreSQL 17 environment, psql \l
    in database connection-test and upgrade paths produced the quoted d.daticulocale
    missing-column error, while manual substitution with \dn reportedly worked.
  observed_mechanism_confidence: medium
  confirmed_mechanism: Run:ai was being used with PostgreSQL 17 while Support's relayed
    Engineering response and final answer defined PostgreSQL 16 as the only supported
    version.
  confirmed_mechanism_confidence: medium
