incident:
  title: GPU utilization values above 100 percent displayed in native Analytics
  masked_summary: A Run:ai 2.22.27 environment showed random, sub-minute GPU utilization
    outliers above 100 percent in native Analytics. A custom Grafana clamp mitigated
    display impact. Product planned a native UI cap in 2.26 without backporting, but
    deployment was not validated before case closure.
  status: mitigated
  occurred_at: '2025-08-26'
  resolved_at: null
  family: observability_accuracy
  family_confidence: high
  observed_mechanism: Out-of-range DCGM_FI_DEV_GPU_UTIL samples were present in Prometheus
    and appeared as extreme native Analytics spikes.
  observed_mechanism_confidence: medium
  confirmed_mechanism: Support concluded the out-of-range metric reached native dashboards,
    Helm reconciliation prevented persistent manual rule edits, and the planned product
    handling was a 100-percent UI cap in 2.26; the lower-level invalid-value source
    remained unconfirmed.
  confirmed_mechanism_confidence: medium
