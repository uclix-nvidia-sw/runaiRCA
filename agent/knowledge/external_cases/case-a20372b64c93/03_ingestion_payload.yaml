incident:
  title: external-workload-integrator restarts after Run:ai 2.23.30 upgrade
  masked_summary: After a production Run:ai control-plane and cluster upgrade from
    2.23.17 to 2.23.30, external-workload-integrator repeatedly restarted. NVIDIA
    Support diagnosed a known 2.23.30 nil pointer dereference bug and proposed 2.23.31
    as the permanent fix. Upgrade execution and post-fix verification were not supplied.
  status: unresolved
  occurred_at: '2026-01-28'
  resolved_at: null
  family: runai_control_plane_error
  family_confidence: medium
  observed_mechanism: After the 2.23.30 upgrade, the external-workload-integrator
    process was reported to panic and the pod restart count increased from 8 to 9.
  observed_mechanism_confidence: medium
  confirmed_mechanism: NVIDIA Support's final diagnosis attributed the crashes to
    a known nil pointer dereference bug in Run:ai 2.23.30 and stated that it was fixed
    in 2.23.31.
  confirmed_mechanism_confidence: medium
