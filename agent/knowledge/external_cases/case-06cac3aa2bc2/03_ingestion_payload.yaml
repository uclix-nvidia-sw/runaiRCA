  - Backend reports processor does not start
  - Reports collector startup bucket check returns Access Denied
  - Storage access works through workload and AWS CLI paths but backend requests lack
    Authorization
  - Same configuration works on 2.23.60 and fails on 2.24.58
  - Reports generate after S3_ACCESS_KEY is changed to S3.ACCESS_KEY
  metric_signatures: []
  error_signatures:
