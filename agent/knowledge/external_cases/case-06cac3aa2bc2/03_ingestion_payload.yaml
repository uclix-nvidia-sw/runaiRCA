incident:
  title: Run:ai v2.24 reports collector failed with the pre-v2.24 S3 Secret key name
  masked_summary: Report jobs remained Pending because the backend reports collector
    failed its startup bucket check with Access Denied. Other credential paths could
    access the storage, but S3-side reporting indicated the backend request lacked
    an Authorization header. Support relayed Engineering's v2.24 change from S3_ACCESS_KEY
    to S3.ACCESS_KEY, and the customer confirmed successful report generation after
    updating both backend Secrets in the internal reproduction context; later validation
    in the original customer environment was not reported.
  status: resolved
  occurred_at: '2026-03-05'
  resolved_at: '2026-04-01'
  family: runai_control_plane_error
  family_confidence: high
  observed_mechanism: The backend reports collector stopped during its startup BucketExists
    or HeadBucket check with Access Denied, so the reports processor did not start
    and report jobs remained Pending; other credential paths could access the storage.
  observed_mechanism_confidence: high
  confirmed_mechanism: Run:ai v2.24 expected the S3 secret key name S3.ACCESS_KEY,
    while the backend Secrets used S3_ACCESS_KEY; the credential was not applied to
    report-storage requests, which lacked an Authorization header and failed the startup
    bucket check until both Secrets were corrected.
  confirmed_mechanism_confidence: medium
