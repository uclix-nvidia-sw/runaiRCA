  - Workspace remains inaccessible for a significant delay before eventual success
  - Redis session clearing reports a cluster-Service DNS lookup I/O timeout
  - Symptom recurs after an earlier DNS or host-resolution configuration change
  - Access succeeds after DNS eventually resolves following several restarts
  metric_signatures: []
  error_signatures:
