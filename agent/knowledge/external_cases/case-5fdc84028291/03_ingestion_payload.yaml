incident:
  title: Workspace authentication proxy startup delayed by cluster DNS lookup timeouts
  masked_summary: A workspace authentication proxy repeatedly restarted and delayed
    notebook access while lookup of a cluster-local Redis Service name timed out.
    An earlier DNS or host-resolution change only mitigated the issue because it recurred.
    Support diagnosed cluster DNS instability and proposed CoreDNS, Cilium, and cross-subnet
    checks. The customer later said the issue appeared resolved and was due to DNS
    configuration, but did not identify the final action or demonstrate permanence.
  status: resolved
  occurred_at: '2026-03-13'
  resolved_at: '2026-03-24'
  family: cluster_network_error
  family_confidence: high
  observed_mechanism: The workspace proxy repeatedly initialized and delayed access
    while a Redis session-clear path reported a cluster-Service DNS lookup I/O timeout;
    access succeeded after several restarts, and the symptom later recurred after
    an earlier DNS or host-resolution change.
  observed_mechanism_confidence: high
  confirmed_mechanism: DNS-resolution timeouts prevented the workspace proxy from
    resolving the cluster-local Redis Service during startup, causing crashes or restarts
    until DNS resolution recovered.
  confirmed_mechanism_confidence: medium
