incident:
  title: Prometheus Operator discovery and Service namespace configuration mismatch
  masked_summary: Support diagnosed a Prometheus Operator Deployment name that did
    not match Run:ai's discovery pattern and a prometheus-operated Service outside
    the default lookup namespace. Two configuration changes were proposed, but no
    execution or technical result was reported before administrative closure.
  status: unresolved
  occurred_at: '2026-03-03'
  resolved_at: null
  family: observability_accuracy
  family_confidence: medium
  observed_mechanism: Customer reported a Prometheus integration issue; Support identified
    a nonmatching operator Deployment name, a nondefault Prometheus Service namespace,
    and the error phrase Prometheus Operator not found.
  observed_mechanism_confidence: medium
  confirmed_mechanism: Support diagnosed that the Deployment-name mismatch prevented
    Prometheus Operator discovery and that the Service namespace mismatch prevented
    use of Run:ai's default prometheus-operated address.
  confirmed_mechanism_confidence: medium
