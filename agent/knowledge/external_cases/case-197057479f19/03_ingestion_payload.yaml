incident:
  title: PodGroup status-update retry loop stalled node-pool transitions
  masked_summary: Four masked workloads on Run:ai 2.23.31 stopped transitioning between
    prioritized node pools and remained Pending after persistent PodGroup status-update
    conflicts. Support relayed Engineering's diagnosis that the scheduler retried
    an uncleaned update payload indefinitely, preventing the scheduling condition
    update and Pod Group Assigner handoff. A fixed version and workaround were proposed
    but not executed or validated before administrative closure.
  status: unresolved
  occurred_at: '2026-04-16'
  resolved_at: null
  family: runai_control_plane_error
  family_confidence: high
  observed_mechanism: A quoted PodGroup conflict and Support's review of unavailable
    diagnostics showed normal node-pool transitions ending around 09:42 UTC, then
    reconcile-only assigner activity and no matching scheduler advancement on April
    17.
  observed_mechanism_confidence: medium
  confirmed_mechanism: Support relayed Engineering's conclusion that conflict handling
    failed to clean the status-update payload, causing indefinite retry, a stale scheduling
    condition, and stopped Pod Group Assigner transitions.
  confirmed_mechanism_confidence: medium
searchable_context:
  normalized_symptoms:
  - multiple workloads remain Pending after node-pool capacity appears available
  - primary-to-secondary node-pool transitions stop after repeated PodGroup status
    conflicts
  - Pod Group Assigner reconciles without handling or successful assignment
  - stop/resume leaves the PodGroup scheduling state unchanged
  metric_signatures: []
  error_signatures:
  - status_updater/concurrency.go:106 [status-updater] Failed to update pod group
    status
  - 'Operation cannot be fulfilled on podgroups.scheduling.run.ai "<podgroup>": the
    object has been modified; please apply your changes to the latest version and
    try again'
  issue_references: []
