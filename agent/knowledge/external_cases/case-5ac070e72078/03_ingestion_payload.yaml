incident:
  title: RoCE multi-node training failed on Kubernetes secondary network; later TCPStore
    startup delay
  masked_summary: In an RKE2 cluster, multi-node NCCL/RDMA connections failed on a
    Multus MacVLAN secondary network. The original failure was reported resolved after
    a switch routing correction. A later repeated 10-minute rendezvous timeout over
    the control network eventually disappeared without a confirmed remediation.
  status: resolved
  occurred_at: '2026-03-05'
  resolved_at: null
  family: network_fabric_error
  family_confidence: medium
  observed_mechanism: Inter-node reachability on the pod secondary network failed
    before RDMA QP establishment; a later phase showed repeated TCPStore waits on
    the control path.
  observed_mechanism_confidence: medium
  confirmed_mechanism: Switch routing configuration blocked the MacVLAN secondary-network
    path used for the original RoCE/RDMA communication.
  confirmed_mechanism_confidence: medium
