# ---------------------------------------------------------------------------
# The families below complete the RANKED universe to match failure_modes.yaml.
# They previously existed only as signature-promotion targets, so the planner
# hypotheses / ranked candidates (the "categories" operators see) could never
# name them even though the ontology carried their knowledge. Keywords are
# hardware/error-string signatures — NOT generic infra words, which would match
# the pipeline's own probe/summary text (see METADATA_VALUE_KEYS).
# ---------------------------------------------------------------------------

- family: gpu_hardware_error
  canonical_agent: system
  agents:
    - system
    - loki
    - kubernetes
  keywords:
    - "xid"
    - "nvrm"
    - "fallen off the bus"
    - "no runtime for \"nvidia\""
    - "xidcriticalerror"
    - "inforom"
    - "nouveau"
    - "gpu is lost"
  planner_keywords:
    - "xid"
    - "nvidia"
    - "gpu"
    - "dcgm"
  reason: alert points at a GPU hardware/driver fault (NVIDIA XID)

