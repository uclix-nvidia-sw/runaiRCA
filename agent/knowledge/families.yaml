- family: node_kubelet_pressure
  canonical_agent: kubernetes
  agents:
    - kubernetes
    - prometheus
  keywords:
    - diskpressure
    - memorypressure
    - pidpressure
    - node pressure
    - evict
    - kubelet
    - device plugin
    - node condition
  planner_keywords:
    - diskpressure
    - memorypressure
    - pidpressure
    - kubelet
    - node
    - evict
  reason: alert points at node/kubelet resource pressure

- family: runai_scheduling_quota
  canonical_agent: prometheus
  agents:
    - prometheus
    - kubernetes
    - runai
  keywords:
    - preempt
    - reclaim
    - pod group
    - podgroup
    - gang
    - fairshare
    - over-quota
    - over quota
    - requested gpus
    - quota
    - idleness
  planner_keywords:
    - quota
    - queue
    - preempt
    - reclaim
    - fairshare
    - gang
    - over-quota
  reason: "alert points at Run:ai scheduling / GPU quota (preempt/reclaim)"

- family: k8s_scheduling_error
  canonical_agent: kubernetes
  agents:
    - kubernetes
    - prometheus
  keywords:
    - failedscheduling
    - unschedulable
    - untolerated taint
    - node affinity/selector
    - topology spread
    - anti-affinity
    - exceeded quota
    - default-scheduler
    - 0/
  planner_keywords:
    - failedscheduling
    - unschedul
    - taint
    - affinity
    - topology
  reason: "alert points at kube-scheduler placement (taint/affinity/quota)"

