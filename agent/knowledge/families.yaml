- family: node_kubelet_pressure
  canonical_agent: kubernetes
  agents:
    - kubernetes
    - prometheus
  keywords:
    # HARD node-resource signals only. The SOFT co-occurrence tokens (kubelet,
    # device plugin, node condition) fire on any GPU-Operator/device-plugin
    # rollout — the DaemonSet restarts and "kubelet" is mentioned — with NO node
    # pressure, and used to give this family a medium score (the recurring
    # node-pressure mis-attribution). They stay in planner_keywords for hypothesis
    # recall but must not SCORE the family. A genuine pressure incident always
    # carries one of these hard tokens.
    - diskpressure
    - memorypressure
    - pidpressure
    - node pressure
    - evict
  planner_keywords:
    - diskpressure
    - memorypressure
    - pidpressure
    - kubelet
    - node
    - evict
  reason: alert points at node/kubelet resource pressure

- family: runai_scheduling_quota
  canonical_agent: prometheus
  agents:
    - prometheus
    - kubernetes
    - runai
  keywords:
    - preempt
    - reclaim
    - pod group
    - podgroup
    - gang
    - fairshare
    - over-quota
    - over quota
    - requested gpus
    - quota
    - idleness
  planner_keywords:
    - quota
    - queue
    - preempt
    - reclaim
    - fairshare
    - gang
    - over-quota
  reason: "alert points at Run:ai scheduling / GPU quota (preempt/reclaim)"

- family: k8s_scheduling_error
  canonical_agent: kubernetes
  agents:
    - kubernetes
    - prometheus
  keywords:
    - failedscheduling
    - unschedulable
    - untolerated taint
    - node affinity/selector
    - topology spread
    - anti-affinity
    - exceeded quota
    - default-scheduler
    # the kube-scheduler predicate breakdown ("0/N nodes are available: ..."). A
    # bare "0/" matched benign transient states (a pod showing "0/1" containers
    # ready, a deployment at "0/3" available, even date strings) — require the
    # scheduler phrase so only a real placement failure scores.
    - nodes are available
  planner_keywords:
    - failedscheduling
    - unschedul
    - taint
    - affinity
    - topology
  reason: "alert points at kube-scheduler placement (taint/affinity/quota)"

