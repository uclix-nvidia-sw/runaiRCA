# NVIDIA XID GPU-error catalog — generated from the Xid-Catalog xlsx (one-time parse).
# Data file consumed by ontology/load_xids.py and app RCA. 'Unused' XIDs are dropped.
# severity is derived from the immediate-action bucket:
#   RESET_GPU/RESTART_BM/RESTART_VM/CONTACT_SUPPORT/XID_154/WORKFLOW_* => fatal, else non-fatal.
# Degenerate self-referential resolution rows (class == action text) are dropped.

xids:
  - code: 8
    mnemonic: "ROBUST_CHANNEL_FIFO_ERROR_IDLE_TIMEOUT"
    description: "GPU stopped processing"
    severity: "non-fatal"
    gpu_models: [A100, H100, B100, GB200]
    immediate_action: "RESTART_APP"
    investigatory_action: "CONTACT_SUPPORT"
    trigger: ""
  - code: 11
    mnemonic: "ROBUST_CHANNEL_GR_ERROR_MISSING_HW"
    description: "Invalid or corrupted push buffer stream"
    severity: "non-fatal"
    gpu_models: [A100, H100, B100, GB200]
    immediate_action: "RESTART_APP"
    investigatory_action: "CHECK_APP/CUDA"
    trigger: ""
  - code: 13
    mnemonic: "ROBUST_CHANNEL_GR_EXCEPTION / ROBUST_CHANNEL_GR_ERROR_SW_NOTIFY"
    description: "Graphics Engine Exception"
    severity: "non-fatal"
    gpu_models: [A100, H100, B100, GB200]
    immediate_action: "RESTART_APP"
    investigatory_action: "WORKFLOW_XID_13"
    trigger: "This event is logged for general user application faults. Typically this is an out-of-bounds error where the user has walked past the end of an array, but could also be an illegal instruction, illegal register, or other case. In rare cases, it’s possible for a hardware failure or system software bugs to materialize as XID 13. When this event is logged, NVIDIA recommends the following: 1. Run the application in cuda-gdb or the Compute Sanitizer memcheck tool , or 2. Run the application with CUDA_DEVICE_WAITS_ON_EXCEPTION=1 and then attach later with cuda-gdb, or 3. File a bug if the previous two come back inconclusive to eliminate potential NVIDIA driver or hardware bug. NOTE: The Compute Sanitizer memcheck tool instruments the running application and reports which line of code performed the illegal read."
  - code: 25
    mnemonic: "ROBUST_CHANNEL_GR_ILLEGAL_NOTIFY"
    description: "Invalid or illegal push buffer stream"
    severity: "non-fatal"
    gpu_models: [A100, H100, B100, GB200]
    immediate_action: "RESTART_APP"
    investigatory_action: "CHECK_APP/CUDA"
    trigger: ""
  - code: 31
    mnemonic: "ROBUST_CHANNEL_FIFO_ERROR_MMU_ERR_FLT"
    description: "GPU memory page fault"
    severity: "non-fatal"
    gpu_models: [A100, H100, B100, GB200]
    immediate_action: "RESTART_APP"
    investigatory_action: "WORKFLOW_XID_31"
    trigger: "This event is logged when a fault is reported by the MMU, such as when an illegal address access is made by an applicable unit on the chip. Typically these are application-level bugs, but can also be driver bugs or hardware bugs. When this event is logged, NVIDIA recommends the following: 1. Run the application in cuda-gdb or the Compute Sanitizer memcheck tool, or 2. Run the application with CUDA_DEVICE_WAITS_ON_EXCEPTION=1 and then attach later with cuda-gdb, or 3. File a bug if the previous two come back inconclusive to eliminate potential NVIDIA driver or hardware bug. NOTE: The Compute Sanitizer memcheck tool instruments the running application and reports which line of code performed the illegal read."
  - code: 32
    mnemonic: "ROBUST_CHANNEL_PBDMA_ERROR"
    description: "Invalid or corrupted push buffer stream"
    severity: "non-fatal"
    gpu_models: [A100, H100, B100, GB200]
    immediate_action: "RESTART_APP"
    investigatory_action: "CHECK_APP/CUDA"
    trigger: "This event is logged when a fault is reported by the DMA controller which manages the communication stream between the NVIDIA driver and the GPU over the PCI-E bus. These failures primarily involve quality issues on PCI, and are generally not caused by user application actions."
