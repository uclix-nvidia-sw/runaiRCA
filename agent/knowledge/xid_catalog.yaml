    severity: "non-fatal"
    gpu_models: [A100]
    immediate_action: "IGNORE"
    investigatory_action: "CONTACT_SUPPORT"
    trigger: "This event is logged when the GPU driver fails to update the InfoROM due to violation of the provisioned InfoROM wear limit that was set for the GPU using NVFlash using nvflash --=elsessionstart. In most cases this is not indicative of a driver or flash failure, but rather the intentional use of the InfoROM wear protection feature as set by NVFlash. Recovery steps: The GPU can be recovered from Xid 93 by clearing InfoROM erase limit using ./nvflash –-elsessionclear. If clearing the limit using nvflash doesn’t help, report the issue to NVIDIA."
  - code: 94
    mnemonic: "ROBUST_CHANNEL_CONTAINED_ERROR"
    description: "Contained memory error"
    severity: "non-fatal"
    gpu_models: [A100, H100, B100, GB200]
    immediate_action: "RESTART_APP"
    investigatory_action: "IGNORE (sympathetic)"
    trigger: "These events (94/95) are logged when GPU drivers handle errors in GPUs that support error containment, starting with NVIDIA A100 GPUs. For Xid 94, these errors are contained to one application, and the application that encountered this error must be restarted. All other applications running at the time of the Xid are unaffected. It is recommended to reset the GPU when convenient. Applications can continue to be run until the reset can be performed. One possible cause of containment errors is the handling of ECC memory errors. Review the NVIDIA GPU Memory Error Management manual: https://docs.nvidia.com/deploy/a100-gpu-mem-error-mgmt/index.html#row-remapping for coverage of ECC-triggered containment errors. Xid 45 will be seen in relation to this error."
