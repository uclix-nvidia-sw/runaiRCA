    immediate_action: "WORKFLOW_XID_45"
    investigatory_action: "Solo: RESTART_FM Not Solo: IGNORE (follow other Xid)"
    trigger: "This event is logged when the user application aborts and the kernel driver tears down the GPU application running on the GPU. Control-C, GPU resets, sigkill are all examples where the application is aborted and this event is created. In many cases, this is not indicative of a bug but rather a user or system action."
